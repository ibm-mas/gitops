{{- if .Values.cis_compliance.use_postdelete_hooks }}

# Generate a suffix for all the resources so there are no name clashes if >1 config is deleted at the same time
{{ $cr_names := "ocp4,rhcos4" }}
{{ $cr_kind := "profilebundles" }}
{{ $cr_api_version := "compliance.openshift.io" }}
{{ $role_name := "postdelete-delete-profilebundles-r" }}
{{ $sa_name := "postdelete-delete-profilebundles-sa" }}
{{ $rb_name := "postdelete-delete-profilebundles-rb"}}
{{ $np_name := "postdelete-delete-profilebundles-np" }}
{{ $job_name := "postdelete-delete-profilebundles-job" }}
{{ $ns := "openshift-compliance" }}
{{ $cleanup_ns := "postdelete-openshift-compliance" }}


---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $cleanup_ns }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
  labels:
    argocd.argoproj.io/managed-by: {{ .Values.argoapp_namespace }}

---
# Permit outbound communication by the Job pods
# (Needed to communicate with the K8S HTTP API and AWS SM)
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ $np_name }}
  namespace: {{ $cleanup_ns }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
spec:
  podSelector:
    matchLabels:
      app: {{ $job_name }}
  egress:
    - {}
  policyTypes:
    - Egress

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $role_name }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
rules:
  - verbs:
      - delete
      - get
      - list
      - watch
    apiGroups:
      - {{ $cr_api_version }}
    resources:
      - {{ $cr_kind }}
  - verbs:
      - delete
      - get
      - list
      - watch
    apiGroups:
      - project.openshift.io
    resources:
      - projects


---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ $sa_name }}
  namespace: {{ $cleanup_ns }}
  annotations:
    argocd.argoproj.io/hook: PostDelete

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $rb_name }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
subjects:
  - kind: ServiceAccount
    name: {{ $sa_name }}
    namespace: {{ $cleanup_ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $role_name }}


---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $job_name }}
  namespace: {{ $cleanup_ns }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
spec:
  template:
    metadata:
      labels:
        app: {{ $job_name }}
    spec:
      containers:
        - name: run
          # TODO: use a dedicated image with a smaller footprint for this sort of thing?
          # Just using cli for now since it has all the deps we need to talk with AWS SM
          image: quay.io/ibmmas/cli:7.10.0-pre.gitops
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: CR_NAMESPACE
              value: {{ $ns }}
            - name: CR_NAMES
              value: {{ $cr_names }}

            - name: CR_API_VERSION
              value: {{ $cr_api_version }}

            - name: CR_KIND
              value: {{ $cr_kind }}

          volumeMounts: []
          command:
            - /bin/sh
            - -c
            - |

              set -e

              function delete_oc_resource(){
                RESOURCE=$1
                NAMESPACE=$2
                echo
                echo "------------------------------------------------------------------"
                echo "Check if resource $RESOURCE is present in namespace $NAMESPACE "

                # don't want a non-zero rc from oc delete to cause the job to fail
                # so, temporarily set +e
                set +e
                RESOURCE_NAME=$(oc get $RESOURCE -n $NAMESPACE -o=jsonpath="{.metadata.name}")
                set -e
                if [[ -z "${RESOURCE_NAME}" ]]; then
                  echo "$RESOURCE not found, skipping"
                  return 0
                fi

                echo "oc delete resource $RESOURCE in namespace $NAMESPACE "

                # don't want a non-zero rc from oc delete to cause the job to fail (since we then want to try patching out the finalizers)
                # so, temporarily set +e
                set +e
                oc delete $RESOURCE -n $NAMESPACE --timeout=300s --wait=true
                return_code=$?
                set -e

                if [ $return_code -ne 0 ]; then
                  echo "oc delete timed out after 300s, forcing delete by removing finalizers"
                  echo "oc patch $RESOURCE -n $NAMESPACE"

                  # NOTE: set -e, so job will exit if this fails (which is what we want)
                  oc patch $RESOURCE -n $NAMESPACE --type="json" -p '[{"op": "remove", "path":"/metadata/finalizers"}]' 2>/dev/null
                fi

                echo "Verify that resource $RESOURCE is now absent in namespace $NAMESPACE "
                # don't want a non-zero rc from oc delete to cause the job to fail
                # so, temporarily set +e
                set +e
                RESOURCE_NAME=$(oc get $RESOURCE -n $NAMESPACE -o=jsonpath="{.metadata.name}")
                set -e
                if [[ -n "${RESOURCE_NAME}" ]]; then
                  echo "$RESOURCE still present, failing job"
                  exit 1
                fi

                echo "... verified"
                return 0
                
              }

              for CR_NAME in ${CR_NAMES//,/ }; do
                delete_oc_resource "${CR_KIND}.${CR_API_VERSION}/${CR_NAME}" "${CR_NAMESPACE}"
              done

              oc delete project "${CR_NAMESPACE}"



      restartPolicy: Never
      serviceAccountName: {{ $sa_name }}
      volumes: []
  backoffLimit: 4
{{- end }}
