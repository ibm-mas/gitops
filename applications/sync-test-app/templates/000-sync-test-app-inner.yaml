---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sync-test-app-inner-{{ .Values.name }}
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "000"
    healthCheckTimeout: "1800"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
  - group: '*'
    kind: ServiceAccount
    jsonPointers:
    - /imagePullSecrets
  project: mas
  destination:
      server: 'https://kubernetes.default.svc'
      namespace: 'default'
  source:
    repoURL: https://github.com/ibm-mas/gitops
    path: applications/sync-test-app-inner
    targetRevision: "mascore1839"
    plugin:
      env:
        - name: HELM_VALUES
          value: |
            { "name": "{{ .Values.name }}"}
        - name: ARGOCD_APP_NAME
          value: droapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true