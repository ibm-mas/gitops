{{- $aws_secret := "aws" }}
{{- $ns := .Values.dro_namespace }}
---
kind: Secret
apiVersion: v1
metadata:
  name: {{ $aws_secret }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "138"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
data:
  aws_access_key_id: {{ .Values.sm_aws_access_key_id | default "" | b64enc }}
  aws_secret_access_key: {{ .Values.sm_aws_secret_access_key | default "" | b64enc }}
type: Opaque
---
{{- if and (eq .Values.dns_provider "cis") (not (empty .Values.cis_crn)) (not (empty .Values.dro_public_domain)) }}
{{- $_cli_image_digest := "sha256:14c852062a8c6149820d9aa7b8315d83f25bb29172b0f318e4fe10af613533f3" }}
{{- $_job_name_prefix := "ibm-dro-dns" }}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}
{{- $_job_config_values := omit .Values "junitreporter" }}
{{- $_job_version := "v3" }}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}
---
# NetworkPolicy to allow egress traffic for AWS Secrets Manager and IBM Cloud API
# (Needed to communicate with the K8S HTTP API and AWS SM)
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: ibm-dro-dns-netpol
  namespace: {{ .Values.dro_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "137"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  podSelector:
    matchLabels:
      app: "postsync-ibm-dro-dns-job"
  egress:
    - {}
  policyTypes:
    - Egress

{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash )}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: {{ .Values.dro_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "138"
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
    metadata:
      labels:
        app: "postsync-ibm-dro-dns-job"
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      restartPolicy: Never
      containers:
        - name: run
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          env:
            - name: ACCOUNT_ID
              value: {{ .Values.account_id }}
            - name: CLUSTER_ID
              value: {{ .Values.cluster_id }}
            - name: REGION_ID
              value: {{ .Values.region_id }}
            - name: DRO_PUBLIC_DOMAIN
              value: '{{ .Values.dro_public_domain }}'
            - name: OCP_CLUSTER_DOMAIN
              value: '{{ .Values.ocp_cluster_domain }}'
            - name: CIS_CRN
              value: '{{ .Values.cis_crn }}'
            - name: AVP_TYPE
              value: "aws"
            - name: IBMCLOUD_HOME
              value: /tmp/bluemix
          volumeMounts:
            - name: aws
              mountPath: /etc/mas/creds/aws
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |

              set -e

              echo "Reading AWS credentials..."
              SM_AWS_ACCESS_KEY_ID=$(cat /etc/mas/creds/aws/aws_access_key_id)
              SM_AWS_SECRET_ACCESS_KEY=$(cat /etc/mas/creds/aws/aws_secret_access_key)

              export SM_AWS_REGION=${REGION_ID}

              source /mascli/functions/gitops_utils
              sm_login

              echo "Fetching IBM API key from AWS Secrets Manager"
              SECRET_NAME_CIS="${ACCOUNT_ID}/${CLUSTER_ID}/cis"

              SECRET_JSON=$(sm_get_secret "${SECRET_NAME_CIS}")

              echo "Fetching OCP ingress from AWS Secrets Manager"
              export PUBLIC_ELB_DNS_NAME_FILE="/tmp/public-elb-dns-name-file.json"
              
              # Try to get public-elb secret, but don't fail if it doesn't exist
              if sm_get_secret_file ${ACCOUNT_ID}/${CLUSTER_ID}/public-elb ${PUBLIC_ELB_DNS_NAME_FILE} 2>/dev/null; then
                export OCP_INGRESS=$(jq -r .dns ${PUBLIC_ELB_DNS_NAME_FILE})
                echo "Using OCP_INGRESS from public-elb secret: ${OCP_INGRESS}"
              else
                echo "public-elb secret not found, will use cis-proxy-route fallback"
                export OCP_INGRESS=""
              fi

              # If OCP_INGRESS is not set or null, use cis-proxy-route fallback
              if [[ -z "${OCP_INGRESS}" || "${OCP_INGRESS}" == "null" ]]; then
                echo "Using cis-proxy-route fallback with OCP_CLUSTER_DOMAIN: ${OCP_CLUSTER_DOMAIN}"
                export OCP_INGRESS="cis-proxy-route.${OCP_CLUSTER_DOMAIN}"
                echo "OCP_INGRESS set to: ${OCP_INGRESS}"
              fi

              IBM_APIKEY=$(echo ${SECRET_JSON} | jq -r '.ibm_apikey')

              if [[ -z "${IBM_APIKEY}" || "${IBM_APIKEY}" == "null" ]]; then
                echo "Failed to fetch ibm_apikey from ${SECRET_NAME_CIS}"
                exit 1
              fi

              echo "Setting IBM CLI home to writable location..."
              export IBMCLOUD_HOME=/tmp/bluemix
              mkdir -p ${IBMCLOUD_HOME}

              echo "Disabling version check..."
              ibmcloud config --check-version=false

              echo "Logging into IBM Cloud..."
              ibmcloud login --apikey ${IBM_APIKEY} -r us-east

              echo "Installing CIS plugin..."
              ibmcloud plugin install cis -f

              echo "Setting CIS instance..."
              ibmcloud cis instance-set ${CIS_CRN}

              echo "Fetching DOMAIN_ID..."
              DOMAIN_ID=$(ibmcloud cis domains --output json | jq -r ".[] | select(.name==\"${DRO_PUBLIC_DOMAIN}\") | .id")

              echo "domain id : ${DOMAIN_ID}"

              if [[ -z "${DOMAIN_ID}" || "${DOMAIN_ID}" == "null" ]]; then
                echo "ERROR: Could not find Domain ID for name: ${DRO_PUBLIC_DOMAIN}"
                exit 1
              fi

              RECORD_NAME="dro.${CLUSTER_ID}"

              FULL_RECORD_NAME="${RECORD_NAME}.${DRO_PUBLIC_DOMAIN}"

              echo ""
              echo "Checking if DNS record already exists..."

              EXISTING_RECORD=$(ibmcloud cis dns-records "${DOMAIN_ID}" \
                --name "${FULL_RECORD_NAME}" \
                --output json)

              RECORD_COUNT=$(echo "${EXISTING_RECORD}" | jq 'length')

              if [[ "${RECORD_COUNT}" -gt 0 ]]; then

                RECORD_ID=$(echo "${EXISTING_RECORD}" | jq -r '.[0].id')
                EXISTING_CONTENT=$(echo "${EXISTING_RECORD}" | jq -r '.[0].content')
                EXISTING_NAME=$(echo "${EXISTING_RECORD}" | jq -r '.[0].name')
                EXISTING_PROXIED=$(echo "${EXISTING_RECORD}" | jq -r '.[0].proxied')

                echo "DNS record found!"
                echo "  Record ID: ${RECORD_ID}"
                echo "  Record Name: ${EXISTING_NAME}"
                echo "  Existing content: ${EXISTING_CONTENT}"
                echo "  Existing proxied: ${EXISTING_PROXIED}"

                if [[ "${EXISTING_CONTENT}" != "${OCP_INGRESS}" ]] || [[ "${EXISTING_PROXIED}" != "true" ]]; then

                  echo "Dns entry has changed. Updating DNS record..."

                  UPDATE_OUTPUT=$(ibmcloud cis dns-record-update "${DOMAIN_ID}" "${RECORD_ID}" \
                    --type CNAME \
                    --name "${RECORD_NAME}" \
                    --content "${OCP_INGRESS}" \
                    --proxied true 2>&1)

                  UPDATE_RC=$?

                  echo "Update output:"
                  echo "${UPDATE_OUTPUT}"

                  if [[ ${UPDATE_RC} -eq 0 ]]; then
                    echo "DNS record updated successfully!"
                  else
                    echo "ERROR: DNS record update failed"
                    exit 1
                  fi

                else
                  echo "DNS record content and proxy setting are already correct. No update needed."
                fi

              else

                echo "DNS record does not exist. Creating new record..."

                CREATE_OUTPUT=$(ibmcloud cis dns-record-create "${DOMAIN_ID}" \
                  --type CNAME \
                  --name "${RECORD_NAME}" \
                  --content "${OCP_INGRESS}" \
                  --proxied true 2>&1)

                CREATE_RC=$?

                echo "Create output:"
                echo "${CREATE_OUTPUT}"

                if [[ ${CREATE_RC} -eq 0 ]]; then
                  echo "DNS record created successfully!"
                else
                  echo "ERROR: DNS record creation failed"
                  exit 1
                fi

              fi

              echo ""
              echo "Ordering edge certificate for ${FULL_RECORD_NAME}..."
              
              CERT_ORDER_OUTPUT=$(ibmcloud cis certificate-order "${DOMAIN_ID}" \
                --hostnames "${FULL_RECORD_NAME}" 2>&1)
              
              CERT_ORDER_RC=$?
              
              echo "Certificate order output:"
              echo "${CERT_ORDER_OUTPUT}"
              
              if [[ ${CERT_ORDER_RC} -eq 0 ]]; then
                echo "Edge certificate ordered successfully!"
              else
                echo "WARNING: Edge certificate order failed or certificate may already exist"
              fi

      volumes:
        - name: aws
          secret:
            secretName: aws
            defaultMode: 420
{{- end }}



