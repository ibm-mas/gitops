---
falcon_operator_channel: certified-1.0
falcon_operator_cloud_region: autodiscover
falcon_operator_client_id: xxx
falcon_operator_client_secret: xxx
falcon_operator_node_sensor:
  node:
    terminationGracePeriod: 30
    resources:             
      requests:             
        cpu: "1000m"         
        memory: "2Gi"     
      limits:               
        cpu: "3000m"        
        memory: "4Gi"    
  falcon:
    trace: err