
{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}


---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: instana-agent-db2-config
  namespace: instana-agent
  annotations:
    argocd.argoproj.io/sync-wave: "056"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  # schedule: "*/15 * * * *" # every 15 minutes
  schedule: "0 */3 * * *" # every 3 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2  # Reduced from 5 to limit retries
      activeDeadlineSeconds: 600  # Kill job after 10 minutes to prevent indefinite runs
      template:
        metadata:
          labels:
            app: instana-agent-db2-config
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 12 }}
{{- end }}
        spec:
          restartPolicy: Never
          serviceAccountName: instana-agent-db2-config
          volumes:
            - name: instana-db2-jks
              persistentVolumeClaim:
                claimName: instana-db2-jks
            - name: aws
              secret:
                secretName: aws
                defaultMode: 420
                optional: false

          # This container runs first to configure the Instana agent CR with the config for the DB2 instance.
          # Additionally, it writes the DB2 certificate to a persistent volume.
          initContainers:
            - name: update-agent-cr
              image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
              imagePullPolicy: IfNotPresent              
              volumeMounts:
                - name: instana-db2-jks
                  mountPath: /jks/
                - name: aws
                  mountPath: /etc/mas/creds/aws
              resources:
                limits:
                  cpu: 200m
                  memory: 512Mi
                requests:
                  cpu: 10m
                  memory: 64Mi
              env:
                - name: ACCOUNT_ID
                  value: {{ .Values.account_id }}
                - name: REGION_ID
                  value: {{ .Values.region_id }}
                - name: CLUSTER_ID
                  value: {{ .Values.cluster_id }}
                - name: AVP_TYPE
                  value: "aws"
                - name: JDBC_SECRET_NAME_PATTERN
                  value: ".*/jdbc/.*/config"
                - name: DB2_PLUGIN_REMOTE_TEMPLATE
                  value: |
                    {
                      "host": "",
                      "port": "50001",
                      "tabschema": "db2inst1",
                      "user": "",
                      "password": "",
                      "availabilityZone": "",
                      "sslTrustStorePassword": "changeit",
                      "sslTrustStoreLocation": "/jks/db2-ca-certs.jks",
                      "poll_rate": 60,
                      "loginTimeout": 45,
                      "databases": []
                    }
              command:
                - /bin/sh
                - -c
                - |
                  set -eo pipefail
                  source /mascli/functions/gitops_utils
        
                  function get_all_jdbc_secret_names() {
                    sm_list_cluster_secrets "${ACCOUNT_ID}" "${CLUSTER_ID}" | grep -e "${JDBC_SECRET_NAME_PATTERN}"
                  }
                  
                  # Secret name is of form: ${ACCOUNT_ID}/${CLUSTER_ID}/${MAS_INSTANCE_ID}/jdbc/${DB2_INSTANCE_NAME}/config
                  function get_mas_instance_id() {
                    local secret_name="${1}"
                    local mas_instance_id=$(echo "${secret_name}" | sed -e 's_[^/]*/[^/]*/\([^/]*\)/jdbc/.*_\1_')
                    echo "${mas_instance_id}"
                  }

                  function set_yaml_string_field() {
                    yaml="${1}"
                    key="${2}"
                    value="${3}"
                    echo "${yaml}" | yq eval -o=yaml -P ".${key} = \"${value}\""
                  }

                  function set_yaml_array_field() {
                    local yaml="${1}"
                    export key=".${2}"
                    export value="${3}"
                    echo "${yaml}" | yq 'eval(strenv(key)) += [strenv(value)]'
                  }

                  # fields: jdbc_connection_url, jdbc_instance_name, ca_b64, db2_dbname, db2_namespace
                  function extract_secret_value() {
                    local secret="${1}"
                    local key="${2}"
                    echo "${secret}" | yq .${key}
                  }

                  function create_jdbc_remote() {
                    local secret_name="${1}"
                    local db2_username="${2}"
                    local db2_password="${3}"
                    local jdbc_secret=$(sm_get_secret "${secret_name}")
                    local url=$(extract_secret_value "${jdbc_secret}" jdbc_connection_url)           
                    local yaml=$(set_yaml_string_field "${DB2_PLUGIN_REMOTE_TEMPLATE}" host $(echo "${url}" | cut -d'/' -f3 | cut -d':' -f1))
                    local yaml=$(set_yaml_string_field "${yaml}" user ${db2_username})   
                    local yaml=$(set_yaml_string_field "${yaml}" password ${db2_password})
                    local yaml=$(set_yaml_string_field "${yaml}" availabilityZone "${CLUSTER_ID}:db2")
                    local db_name=$(extract_secret_value "${jdbc_secret}" db2_dbname)              
                    local yaml=$(set_yaml_array_field "${yaml}" databases "${db_name}")  
                    echo "${yaml}"
                  }

                  function update_remotes_list() {
                    local remotes_list="${1}"
                    export jdbc_remote="${2}"
                    echo "${remotes_list}" | yq '."com.instana.plugin.db2".remote += [env(jdbc_remote)]'
                  }

                  function generate_updated_agent_config() {
                    local instana_cr="${1}"
                    local jdbc_remotes="${2}"
                    export jdbc_items=$(echo "${jdbc_remotes}" | yq '."com.instana.plugin.db2".remote')
                    local config_yaml=$(echo "${instana_cr}" | yq .spec.agent.configuration_yaml)
                    echo "${config_yaml}" | yq '."com.instana.plugin.db2".remote = env(jdbc_items)'
                  }

                  function generate_updated_instana_cr() {
                    local instana_cr="${1}"
                    export config_yaml="${2}"
                    export labels=$(echo "${instana_cr}" | yq '.metadata.labels')
                    export annotations=$(echo "${instana_cr}" | yq '.metadata.annotations')
                    export resource_version=$(echo "${instana_cr}" | yq '.metadata.resourceVersion')
                    annotations=$(echo "${annotations}" | yq 'del(."kubectl.kubernetes.io/last-applied-configuration")')
                    echo "${instana_cr}" | yq '.spec.agent.configuration_yaml = strenv(config_yaml)' | yq 'del(.metadata)' \
                      | yq '.metadata.name = "instana-agent"' | yq '.metadata.namespace = "instana-agent"' \
                      | yq '.metadata.labels = env(labels)' | yq '.metadata.annotations = env(annotations)' \
                      | yq '.metadata.resourceVersion = strenv(resource_version)'
                  }

                  function get_instana_cr() {
                    curl -ksS -X GET -H 'Accept: application/yaml' \
                      -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                      https://kubernetes.default.svc.cluster.local/apis/instana.io/v1/namespaces/instana-agent/agents/instana-agent
                  }

                  function submit_instana_cr() {
                    local updated_cr_yaml="${1}"
                    echo "${updated_cr_yaml}" | curl -iksS -o /dev/null -X PUT --data-binary @- -H 'Content-Type: application/yaml' \
                      -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                      https://kubernetes.default.svc.cluster.local/apis/instana.io/v1/namespaces/instana-agent/agents/instana-agent
                  }

                  function write_cert_file() {
                    local secret_name="${1}"
                    local jdbc_secret=$(sm_get_secret "${secret_name}")
                    local jdbc_instance_name=$(extract_secret_value "${jdbc_secret}" jdbc_instance_name)
                    # local pem_cert=$(extract_secret_value "${jdbc_secret}" ca_b64 | base64 --decode)     
                    # echo "${pem_cert}" > "/jks/${jdbc_instance_name}.pem"
                    #JDBC instance validation
                    if [[ -z "${jdbc_instance_name}" || "${jdbc_instance_name}" == "null" ]]; then
                     echo "[WARN] Skipping certificate file creation for ${secret_name} - jdbc_instance_name is null or empty"
                     return 1
                    fi
                    
                    echo "[INFO] Writing certificate file for jdbc_instance_name: ${jdbc_instance_name}"
                    local pem_cert=$(extract_secret_value "${jdbc_secret}" ca_b64 | base64 --decode)

                    # Certificate validation
                    if [[ -z "${pem_cert}" || "${pem_cert}" == "null" ]]; then
                     echo "[WARN] Skipping certificate file creation for ${secret_name} - ca_b64 is null or empty"
                     return 1
                    fi

                    echo "${pem_cert}" > "/jks/${jdbc_instance_name}.pem"
                    echo "[INFO] Successfully wrote certificate file: /jks/${jdbc_instance_name}.pem"

                  }

                  function get_db2_credentials() {
                    local jdbc_secret_name="${1}"
                    local jdbc_secret=$(sm_get_secret "${jdbc_secret_name}")
                    local jdbc_instance_name=$(extract_secret_value "${jdbc_secret}" jdbc_instance_name)
                    local mas_instance_id=$(get_mas_instance_id "${jdbc_secret_name}")
                    local db2_secret=$(sm_get_secret ${ACCOUNT_ID}/${CLUSTER_ID}/${mas_instance_id}/jdbc/${jdbc_instance_name}/credentials)
                    local db2_username=$(extract_secret_value "${db2_secret}" username)
                    local db2_password=$(extract_secret_value "${db2_secret}" password)
                    echo "${db2_username} ${db2_password}"
                  }

                  # Validate AWS credentials exist before proceeding
                  if [[ ! -f /etc/mas/creds/aws/aws_access_key_id ]] || [[ ! -f /etc/mas/creds/aws/aws_secret_access_key ]]; then
                    echo "[ERROR] AWS credentials not found. Cannot proceed."
                    exit 1
                  fi

                  SM_AWS_ACCESS_KEY_ID=$(cat /etc/mas/creds/aws/aws_access_key_id)
                  SM_AWS_SECRET_ACCESS_KEY=$(cat /etc/mas/creds/aws/aws_secret_access_key)
                  SM_AWS_REGION=${REGION_ID}
                  
                  # Validate credentials are not empty
                  if [[ -z "${SM_AWS_ACCESS_KEY_ID}" ]] || [[ -z "${SM_AWS_SECRET_ACCESS_KEY}" ]]; then
                    echo "[ERROR] AWS credentials are empty. Cannot proceed."
                    exit 1
                  fi
                  
                  if ! sm_login; then
                    echo "[ERROR] Failed to login to AWS Secrets Manager. Check credentials and permissions."
                    exit 1
                  fi

                  echo '[INFO] Starting Instana agent configuration update for DB2 ...'
                  # To understand which account are we working on
                  echo "[DEBUG] Account ID: ${ACCOUNT_ID}, Cluster ID: ${CLUSTER_ID}, Region: ${REGION_ID}"
                  
                  # Cleaning all old/null PEM files before we start.
                  echo "[INFO] Cleaning up old PEM files from /jks/"
                  find /jks/ -name "*.pem" -type f -delete 2>/dev/null || true
                  echo "[INFO] Cleanup completed"

                  remotes_list=$(yq eval -n '."com.instana.plugin.db2".remote = []')
                  
                  # Get JDBC secrets with error handling
                  if ! secret_names=$(get_all_jdbc_secret_names); then
                    echo "[ERROR] Failed to retrieve JDBC secrets from Secrets Manager"
                    exit 1
                  fi
                  
                  # Check if any secrets were found
                  if [[ -z "${secret_names}" ]]; then
                    echo "[INFO] No JDBC secrets found matching pattern ${JDBC_SECRET_NAME_PATTERN}"
                    echo "[INFO] Nothing to process. Exiting successfully."
                    exit 0
                  fi
                  
                  num_secrets=$(echo "${secret_names}" | wc -l)
                  echo "[INFO] Found ${num_secrets} JDBC secrets"

                  # Initialize counters to track processing results
                  processed_count=0
                  skipped_count=0
                  secret_number=0

                  echo "[DEBUG] Starting to process secrets..."
                  for secret_name in ${secret_names}; do
                    secret_number=$((secret_number + 1))
                    echo "[INFO] [$secret_number/$num_secrets] Processing JDBC secret ${secret_name}"
                    
                    # Get DB2 credentials with error handling
                    echo "[DEBUG] Retrieving DB2 credentials for ${secret_name}"
                    if ! db2_credentials=$(get_db2_credentials "${secret_name}" 2>&1); then
                      echo "[WARN] Failed to get DB2 credentials for ${secret_name}: ${db2_credentials}"
                      skipped_count=$((skipped_count + 1))
                      continue
                    fi
                    echo "[DEBUG] Successfully retrieved DB2 credentials"
                    
                    db2_user=$(echo "${db2_credentials}" | awk '{print $1}')
                    db2_pass=$(echo "${db2_credentials}" | awk '{print $2}')

                    if [[ -z "${db2_user}" || "${db2_user}" == "null" ]]; then
                      echo "[WARN] Skipping JDBC secret ${secret_name} as username is null or empty"
                      skipped_count=$((skipped_count + 1))
                      continue
                    fi
                    if [[ -z "${db2_pass}" || "${db2_pass}" == "null" ]]; then
                      echo "[WARN] Skipping JDBC secret ${secret_name} as password is null or empty"
                      skipped_count=$((skipped_count + 1))
                      continue
                    fi
                    
                    echo "[DEBUG] Creating JDBC remote configuration for ${secret_name}"
                    if ! jdbc_remote=$(create_jdbc_remote "${secret_name}" "${db2_user}" "${db2_pass}" 2>&1); then
                      echo "[WARN] Failed to create JDBC remote configuration for ${secret_name}: ${jdbc_remote}"
                      skipped_count=$((skipped_count + 1))
                      continue
                    fi
                    
                    if write_cert_file "${secret_name}"; then
                     remotes_list=$(update_remotes_list "${remotes_list}" "${jdbc_remote}")
                     processed_count=$((processed_count + 1))
                     echo "[INFO] Successfully processed JDBC secret ${secret_name}"
                    else
                     echo "[WARN] Failed to write certificate file for ${secret_name}, skipping remote configuration"
                     skipped_count=$((skipped_count + 1))
                    fi
        
                  done
                  echo "[INFO] Processing summary: ${processed_count} secrets processed, ${skipped_count} secrets skipped"
                  if [[ ${processed_count} -eq 0 ]]; then
                    echo "[WARN] No secrets were processed. Skipping Instana agent configuration update."
                  else
                
                    echo "[INFO] Getting InstanaAgent custom resource"
                    if ! instana_cr=$(get_instana_cr); then
                      echo "[ERROR] Failed to get InstanaAgent custom resource"
                      exit 1
                    fi
                    
                    if [[ -z "${instana_cr}" ]]; then
                      echo "[ERROR] InstanaAgent custom resource is empty"
                      exit 1
                    fi
                    
                    echo "[DEBUG] Generating updated agent configuration with ${processed_count} DB2 remotes"
                    agent_config_yaml=$(generate_updated_agent_config "${instana_cr}" "${remotes_list}")
                    instana_cr=$(generate_updated_instana_cr "${instana_cr}" "${agent_config_yaml}")
                    echo '[INFO] Submitting updated Instana agent configuration to Kubernetes'
                    submit_instana_cr "${instana_cr}"
                    echo "[INFO] Successfully updated Instana agent configuration for DB2"
                  fi
                  echo "[INFO] Completed Instana agent configuration update for DB2"
                  echo "[INFO] Total execution time: $SECONDS seconds"

          # This container runs second and creates the JKS file for Instana agent from DB2 PEM certificate.
          containers:
            - name: update-jks
              image: registry.redhat.io/ubi8/openjdk-17:latest
              volumeMounts:
                - name: instana-db2-jks
                  mountPath: /jks/
              args:
                - /bin/bash
                - '-c'
                - |
                  readonly CERTS_DIR=/jks
                  readonly JKS_PATH="${CERTS_DIR}/db2-ca-certs.jks"
                  echo "[INFO] Starting JKS keystore update process"
                  cert_count=0

                  for cert in ${CERTS_DIR}/*.pem; do
                  # Skip if no PEM files found 
                  if [[ ! -f "${cert}" ]]; then
                    echo "[WARN] No DB2 CA PEM certificates found in ${CERTS_DIR}"
                    break
                  fi

                  #   echo "[INFO] Importing DB2 CA PEM certificate ${cert} to Instana agent JKS keystore ${JKS_PATH}"
                  #   keytool -list -keystore ${JKS_PATH} -alias ${cert%.*} -storepass changeit && keytool -delete -alias ${cert%.*} -keystore ${JKS_PATH} -storepass changeit
                  #   echo "yes" | keytool -importcert -alias ${cert%.*} -file ${cert} -keystore ${JKS_PATH} -storepass changeit
                  # done    
                  cert_name=$(basename "${cert}")
                  echo "[INFO] Processing certificate: ${cert_name}"

                  # Validate certificate file is not empty
                  if [[ ! -s "${cert}" ]]; then
                    echo "[WARN] Certificate file is empty: ${cert}"
                    continue
                  fi

                  echo "[DEBUG] Importing ${cert_name} to JKS keystore ${JKS_PATH}"
                  # Remove existing alias if present
                  keytool -list -keystore ${JKS_PATH} -alias ${cert%.*} -storepass changeit 2>/dev/null && \
                    keytool -delete -alias ${cert%.*} -keystore ${JKS_PATH} -storepass changeit
                  # Import certificate

                  if echo "yes" | keytool -importcert -alias ${cert%.*} -file ${cert} -keystore ${JKS_PATH} -storepass changeit; then
                    echo "[INFO] Successfully imported ${cert_name} to JKS keystore"
                    ((cert_count++))
                  else
                    echo "[ERROR] Failed to import ${cert_name} to JKS keystore"
                  fi
                  done
                  echo "[INFO] JKS keystore update completed. Imported ${cert_count} certificates"