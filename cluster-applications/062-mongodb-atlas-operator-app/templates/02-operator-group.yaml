---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: mongodb-atlas-operator-group
  namespace: {{ .Values.mongo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "02"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  targetNamespaces:
  - {{ .Values.mongo.namespace }}
