---
# MongoDB Atlas opereator Configuration Values

account:
  id: ""

cluster:
  id: ""
  name: ""

mongo:
  action: "install"
  operator_version: "7.0"  # Optional: Specify operator version (e.g., "v2.4.1"), leave empty for latest
  major_db_version: "7.0"
  vpc_id: ""
  subnet_ids: []
  project_id: ""
  organization_id: ""
  instance_size: "M10"
  node_count: "3"
  shards: "1"
  backup_enabled: "true"
  pit_enabled: "true"
  helm_repo: "https://github.com/mongodb/helm-charts"
  namespace: mongodb-atlas-system
  update_mongo_secret: "false"  # Set to true to create/update AWS Secrets Manager secret
  publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#public_api_key>"
  privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#private_api_key>"

region:
  id: ""

aws:
  vpcEndpointId: ""

junitreporter:
  reporter_name: ""
  cluster_id: ""
  devops_mongo_uri: ""
  devops_build_number: ""
  gitops_version: ""
  cli_image_repo: ""