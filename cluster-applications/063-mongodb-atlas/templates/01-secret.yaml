apiVersion: v1
kind: Secret
metadata:
  name: mongodb-atlas-operator-api-key
  namespace: {{ .Values.mongo.namespace }}
  labels:
    atlas.mongodb.com/type: credentials
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  orgId: {{ .Values.mongo.organization_id }}
  publicApiKey: {{ .Values.mongo.publicApiKey }}
  privateApiKey: {{ .Values.mongo.privateApiKey }}
