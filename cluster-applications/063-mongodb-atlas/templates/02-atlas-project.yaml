apiVersion: atlas.mongodb.com/v1
kind: AtlasProject
metadata:
  name: {{ .Values.mongo.project_id | lower | replace " " "-" }}
  namespace: {{ .Values.mongo.namespace }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: {{ .Values.mongo.project_id }}
  connectionSecretRef:
    name: mongodb-atlas-operator-api-key
  backupCompliancePolicyRef:
    name: {{ .Values.mongo.project_id | lower | replace " " "-" }}-backup-compliance
