# Password secret for master Atlas database user
# This secret will only be created if it doesn't exist (using ArgoCD's sync options)
# To reset the password, set mongo.reset_master_password: true in values
{{- $existing := (lookup "v1" "Secret" .Values.mongo.namespace (printf "%s-database-user-password" .Values.cluster.id)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cluster.id }}-database-user-password
  namespace: {{ .Values.mongo.namespace }}
  labels:
    atlas.mongodb.com/type: credentials
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "31"
{{- if not (.Values.mongo.reset_master_password) }}
    # Only create if it doesn't exist - don't update existing secret
    argocd.argoproj.io/sync-options: CreateOnly=true
{{- else }}
    # Reset flag is set - allow updates to regenerate password
    argocd.argoproj.io/sync-options: Replace=true
{{- end }}
{{- if $existing }}
    debug/password-first-char: "{{ index $existing.data "password" | b64dec | trunc 1 }}"
    debug/password-second-char: "{{ index $existing.data "password" | b64dec | trunc 2 }}"
{{- end }}
type: Opaque
stringData:
  password: |
  {{- if or (not $existing) .Values.mongo.reset_master_password }}
    {{ randAlphaNum 32 }}
  {{- else }}
    {{ index $existing.data "password" | b64dec }}
  {{- end }}
---
apiVersion: atlas.mongodb.com/v1
kind: AtlasDatabaseUser
metadata:
  name: {{ .Values.cluster.id }}-database-user
  namespace: {{ .Values.mongo.namespace }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  externalProjectRef:
    id: {{ .Values.mongo.project_id }}
  
  # Connection secret is required when using externalProjectRef
  connectionSecret:
    name: mongodb-atlas-operator-api-key
  
  username: {{ .Values.cluster.id }}-docdbadmin
  
  passwordSecretRef:
    name: {{ .Values.cluster.id }}-database-user-password
  
  databaseName: admin
  
  roles:
    - roleName: atlasAdmin
      databaseName: admin

