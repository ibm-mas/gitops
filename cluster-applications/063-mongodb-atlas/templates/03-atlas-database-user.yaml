# Password secret for master Atlas database user
# To reset the password, set mongo.reset_master_password: true in values
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cluster.id }}-database-user-password
  namespace: {{ .Values.mongo.namespace }}
  labels:
    atlas.mongodb.com/type: credentials
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "31"
{{- if not (.Values.mongo.reset_master_password) }}
    argocd.argoproj.io/sync-options: CreateOnly=true
{{- else }}
    argocd.argoproj.io/sync-options: Replace=true
{{- end }}
type: Opaque
stringData:
  password: {{ randAlphaNum 32 | quote }}
---
apiVersion: atlas.mongodb.com/v1
kind: AtlasDatabaseUser
metadata:
  name: {{ .Values.cluster.id }}-database-user
  namespace: {{ .Values.mongo.namespace }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  externalProjectRef:
    id: {{ .Values.mongo.project_id }}1
  
  # Connection secret is required when using externalProjectRef
  connectionSecret:
    name: mongodb-atlas-operator-api-key
  
  username: {{ .Values.cluster.id }}-docdbadmin
  
  passwordSecretRef:
    name: {{ .Values.cluster.id }}-database-user-password
  
  databaseName: admin
  
  roles:
    - roleName: atlasAdmin
      databaseName: admin

  scopes:
    - name: "{{ .Values.cluster.id }}-cluster"
      type: "CLUSTER"

