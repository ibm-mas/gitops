{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "sync-atlas-vpc-endpoint" }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
Included in $_job_hash (see below).
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Since jobs must be idemopotent, it's generally safe to pass in values here that are not
strictly necessary (i.e. including some values that don't actually influence job behaviour).
We may want to refine this further though for jobs that can take a long time to complete.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := omit .Values "junitreporter" }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource intead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}

{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash )}}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional descriminators
must be added to $_job_cleanup_group.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.
*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}

{{ $ns := .Values.mongo.namespace }}
{{ $sa_name := "atlas-vpc-endpoint-creator" }}
{{ $role_name := "atlas-vpc-endpoint-creator" }}
{{ $rb_name := "atlas-vpc-endpoint-creator" }}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa_name }}
  namespace: {{ $ns }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $role_name }}
  namespace: {{ $ns }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - patch
  - apiGroups:
      - atlas.mongodb.com
    resources:
      - atlasprivateendpoints
    verbs:
      - get
      - list
      - watch
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $rb_name }}
  namespace: {{ $ns }}
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $role_name }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa_name }}
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: {{ $ns }}
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-atlas
        app.kubernetes.io/instance: {{ .Values.cluster.id }}
    spec:
      serviceAccountName: {{ $sa_name }}
      restartPolicy: Never
      containers:
        - name: create-vpc-endpoint
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: CLUSTER_ID
              value: "{{ .Values.cluster.id }}"
            - name: VPC_ID
              value: "{{ .Values.mongo.vpc_id }}"
            - name: SUBNET_IDS
              value: "{{ join "," .Values.mongo.subnet_ids }}"
            - name: NAMESPACE
              value: "{{ .Values.mongo.namespace }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_secret_access_key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_default_region
          command:
            - /bin/bash
            - -c
            - |
              set -xe
              
              echo "Waiting for Atlas Private Endpoint to be ready..."
              
              # Wait for the AtlasPrivateEndpoint resource to have the service name
              MAX_RETRIES=60
              RETRY_COUNT=0
              
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                SERVICE_NAME=$(oc get atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} -o jsonpath='{.status.serviceName}' 2>/dev/null || echo "")
                
                if [ -n "$SERVICE_NAME" ]; then
                  echo "Atlas Private Endpoint service name found: $SERVICE_NAME"
                  break
                fi
                
                echo "Waiting for service name... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT + 1))
              done
              
              if [ -z "$SERVICE_NAME" ]; then
                echo "ERROR: Failed to get Atlas Private Endpoint service name after $MAX_RETRIES attempts"
                exit 1
              fi
              
              echo "Creating VPC Endpoint in AWS..."
              echo "Cluster ID: ${CLUSTER_ID}"
              echo "VPC ID: ${VPC_ID}"
              echo "Subnet IDs: ${SUBNET_IDS}"
              echo "AWS Region: ${AWS_REGION}"
              
              # Check for existing security group first
              echo "Checking for existing security group..."
              SG_ID=$(aws ec2 describe-security-groups \
                --filters "Name=group-name,Values=${CLUSTER_ID}-mongodb-atlas-vpce-sg" "Name=vpc-id,Values=${VPC_ID}" \
                --region ${AWS_REGION} \
                --output text --query 'SecurityGroups[0].GroupId' 2>/dev/null || echo "")
              
              if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
                echo "Found existing security group: $SG_ID"
              else
                # Create security group only if it doesn't exist
                echo "Creating new security group for VPC endpoint..."
                SG_ID=$(aws ec2 create-security-group \
                  --group-name ${CLUSTER_ID}-mongodb-atlas-vpce-sg \
                  --description "Security group for MongoDB Atlas VPC Endpoint" \
                  --vpc-id ${VPC_ID} \
                  --region ${AWS_REGION} \
                  --tag-specifications "ResourceType=security-group,Tags=[{Key=cluster-id,Value=${CLUSTER_ID}},{Key=Name,Value=${CLUSTER_ID}-mongodb-atlas-vpce-sg},{Key=managed-by,Value=argocd}]" \
                  --output text --query 'GroupId' 2>/dev/null || echo "")
                
                if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
                  echo "ERROR: Failed to create security group"
                  exit 1
                fi
                
                echo "Created new security group: $SG_ID"
              fi
              
              # Final validation
              if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
                echo "ERROR: Security group ID is invalid or empty"
                exit 1
              fi
              
              echo "Using VPC endpoint security group ID: $SG_ID"
              
              # Create or get worker nodes security group
              echo "Creating/checking worker nodes security group..."
              WORKER_SG_NAME="${CLUSTER_ID}-mongodb-worker-sg"
              WORKER_SG_ID=$(aws ec2 describe-security-groups \
                --filters "Name=group-name,Values=${WORKER_SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
                --region ${AWS_REGION} \
                --output text --query 'SecurityGroups[0].GroupId' 2>/dev/null || echo "")
              
              if [ -n "$WORKER_SG_ID" ] && [ "$WORKER_SG_ID" != "None" ]; then
                echo "Found existing worker security group: $WORKER_SG_ID"
              else
                # Create security group for worker nodes
                echo "Creating new security group for worker nodes..."
                WORKER_SG_ID=$(aws ec2 create-security-group \
                  --group-name ${WORKER_SG_NAME} \
                  --description "Security group for worker nodes to access MongoDB Atlas" \
                  --vpc-id ${VPC_ID} \
                  --region ${AWS_REGION} \
                  --tag-specifications "ResourceType=security-group,Tags=[{Key=cluster-id,Value=${CLUSTER_ID}},{Key=cluster-name,Value=${CLUSTER_ID}},{Key=Name,Value=${WORKER_SG_NAME}},{Key=managed-by,Value=argocd},{Key=purpose,Value=mongodb-worker-access}]" \
                  --output text --query 'GroupId' 2>/dev/null || echo "")
                
                if [ -z "$WORKER_SG_ID" ] || [ "$WORKER_SG_ID" = "None" ]; then
                  echo "ERROR: Failed to create worker security group"
                  exit 1
                fi
                
                echo "Created worker security group: $WORKER_SG_ID"
              fi
              
              # Add egress rule to worker security group to allow all TCP traffic to VPC endpoint security group
              echo "Adding egress rule to worker security group (all TCP ports)..."
              aws ec2 authorize-security-group-egress \
                --group-id $WORKER_SG_ID \
                --protocol tcp \
                --port 0-65535 \
                --destination-group $SG_ID \
                --region ${AWS_REGION} 2>/dev/null || echo "Egress rule may already exist"
              
              # Add ingress rule to VPC endpoint security group to allow all TCP traffic from worker security group
              echo "Adding ingress rule to VPC endpoint security group (all TCP ports)..."
              aws ec2 authorize-security-group-ingress \
                --group-id $SG_ID \
                --protocol tcp \
                --port 0-65535 \
                --source-group $WORKER_SG_ID \
                --region ${AWS_REGION} 2>/dev/null || echo "Ingress rule may already exist"
              
              echo "Security group rules configured successfully"
              
              # Check for existing VPC endpoint first (idempotency)
              echo "Checking for existing VPC endpoint..."
              EXISTING_VPC_ENDPOINT=$(aws ec2 describe-vpc-endpoints \
                --filters "Name=service-name,Values=$SERVICE_NAME" "Name=vpc-id,Values=${VPC_ID}" "Name=tag:cluster-id,Values=${CLUSTER_ID}" \
                --region ${AWS_REGION} \
                --output json 2>/dev/null || echo "")

              if [ -n "$EXISTING_VPC_ENDPOINT" ] && [ "$EXISTING_VPC_ENDPOINT" != "null" ]; then
                VPC_ENDPOINT_ID=$(echo "$EXISTING_VPC_ENDPOINT" | jq -r '.VpcEndpoints[0].VpcEndpointId // empty')
                VPC_ENDPOINT_STATE=$(echo "$EXISTING_VPC_ENDPOINT" | jq -r '.VpcEndpoints[0].State // empty')

                if [ -n "$VPC_ENDPOINT_ID" ] && [ "$VPC_ENDPOINT_ID" != "null" ] && [ "$VPC_ENDPOINT_ID" != "None" ]; then
                  echo "Found existing VPC endpoint: $VPC_ENDPOINT_ID (State: $VPC_ENDPOINT_STATE)"

                  # Check if the endpoint is in a usable state
                  if [ "$VPC_ENDPOINT_STATE" = "available" ] || [ "$VPC_ENDPOINT_STATE" = "pending" ] || [ "$VPC_ENDPOINT_STATE" = "pendingAcceptance" ]; then
                    echo "Reusing existing VPC endpoint in state: $VPC_ENDPOINT_STATE"
                  elif [ "$VPC_ENDPOINT_STATE" = "failed" ] || [ "$VPC_ENDPOINT_STATE" = "rejected" ]; then
                    echo "WARNING: Existing VPC endpoint is in failed state: $VPC_ENDPOINT_STATE"
                    echo "Deleting failed endpoint and will create a new one..."
                    aws ec2 delete-vpc-endpoints --vpc-endpoint-ids $VPC_ENDPOINT_ID --region ${AWS_REGION} 2>/dev/null || true
                    sleep 5
                    VPC_ENDPOINT_ID=""
                  else
                    echo "Existing VPC endpoint state: $VPC_ENDPOINT_STATE"
                  fi
                fi
              fi

              # Create VPC endpoint only if one doesn't exist
              if [ -z "$VPC_ENDPOINT_ID" ] || [ "$VPC_ENDPOINT_ID" = "None" ] || [ "$VPC_ENDPOINT_ID" = "null" ]; then
                echo "Creating new VPC endpoint..."

                # Convert comma-separated subnet IDs to space-separated for AWS CLI
                SUBNET_IDS_SPACE_SEPARATED=$(echo "${SUBNET_IDS}" | tr ',' ' ')
                echo "Subnet IDs (space-separated): $SUBNET_IDS_SPACE_SEPARATED"

                # Capture both stdout and stderr for better error reporting
                VPC_ENDPOINT_OUTPUT=$(aws ec2 create-vpc-endpoint \
                  --vpc-id ${VPC_ID} \
                  --vpc-endpoint-type Interface \
                  --service-name $SERVICE_NAME \
                  --subnet-ids ${SUBNET_IDS_SPACE_SEPARATED} \
                  --security-group-ids $SG_ID \
                  --region ${AWS_REGION} \
                  --tag-specifications "ResourceType=vpc-endpoint,Tags=[{Key=cluster-id,Value=${CLUSTER_ID}},{Key=Name,Value=${CLUSTER_ID}-mongodb-atlas-vpce},{Key=managed-by,Value=argocd}]" \
                  --output json 2>&1)

                VPC_ENDPOINT_CREATION_STATUS=$?

                if [ $VPC_ENDPOINT_CREATION_STATUS -eq 0 ]; then
                  VPC_ENDPOINT_ID=$(echo "$VPC_ENDPOINT_OUTPUT" | jq -r '.VpcEndpoint.VpcEndpointId // empty')
                  if [ -n "$VPC_ENDPOINT_ID" ] && [ "$VPC_ENDPOINT_ID" != "null" ]; then
                    echo "VPC endpoint created successfully!"
                    echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
                  else
                    echo "ERROR: VPC endpoint creation returned success but no VPC Endpoint ID found"
                    echo "AWS Response: $VPC_ENDPOINT_OUTPUT"
                    exit 1
                  fi
                else
                  echo "ERROR: Failed to create VPC endpoint"
                  echo "VPC ID: ${VPC_ID}"
                  echo "Service Name: $SERVICE_NAME"
                  echo "Subnet IDs: ${SUBNET_IDS}"
                  echo "Security Group ID: $SG_ID"
                  echo "Region: ${AWS_REGION}"
                  echo ""
                  echo "Creation error details:"
                  echo "$VPC_ENDPOINT_OUTPUT"
                  exit 1
                fi
              fi
              
              # Final validation that VPC_ENDPOINT_ID is valid
              if [ -z "$VPC_ENDPOINT_ID" ] || [ "$VPC_ENDPOINT_ID" = "None" ] || [ "$VPC_ENDPOINT_ID" = "null" ]; then
                echo "ERROR: VPC Endpoint ID is invalid or empty: '$VPC_ENDPOINT_ID'"
                exit 1
              fi
              
              echo "Validated VPC Endpoint ID: $VPC_ENDPOINT_ID"

              # Verify VPC endpoint was created successfully
              echo "Verifying VPC endpoint creation..."
              VPC_STATE=$(aws ec2 describe-vpc-endpoints \
                --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                --region ${AWS_REGION} \
                --query 'VpcEndpoints[0].State' \
                --output text 2>/dev/null || echo "")

              if [ -z "$VPC_STATE" ]; then
                echo "ERROR: Failed to retrieve VPC endpoint state"
                echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
                exit 1
              fi

              # Check for immediate failure states
              if [ "$VPC_STATE" = "failed" ] || [ "$VPC_STATE" = "rejected" ] || [ "$VPC_STATE" = "deleted" ]; then
                echo "ERROR: VPC endpoint is in failed state: $VPC_STATE"
                echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
                echo "Checking detailed status..."
                aws ec2 describe-vpc-endpoints \
                  --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                  --region ${AWS_REGION} \
                  --query 'VpcEndpoints[0]' \
                  --output json || echo "Failed to retrieve endpoint details"
                exit 1
              fi
              
              echo "VPC endpoint created successfully with state: $VPC_STATE"
              echo "Note: VPC endpoint will become 'available' after private link is established in later steps"
              
              # Attach worker security group to EC2 instances based on tags
              echo "Attaching worker security group to cluster worker EC2 instances..."
              for SUBNET_ID in ${SUBNET_IDS//,/ }; do
                echo "Processing subnet: $SUBNET_ID"
                
                # Get all running EC2 instances in the subnet
                ALL_INSTANCES=$(aws ec2 describe-instances \
                  --filters "Name=subnet-id,Values=$SUBNET_ID" "Name=instance-state-name,Values=running" \
                  --region ${AWS_REGION} \
                  --query 'Reservations[*].Instances[*].[InstanceId,Tags]' \
                  --output json 2>/dev/null || echo "[]")
                
                if [ "$ALL_INSTANCES" = "[]" ] || [ -z "$ALL_INSTANCES" ]; then
                  echo "No running instances found in subnet $SUBNET_ID"
                  continue
                fi
                
                # Filter instances based on tags
                WORKER_INSTANCES=""
                while IFS= read -r INSTANCE_DATA; do
                  INSTANCE_ID=$(echo "$INSTANCE_DATA" | jq -r '.[0]')
                  TAGS=$(echo "$INSTANCE_DATA" | jq -r '.[1]')
                  
                  # Check if cluster-name tag contains cluster ID
                  CLUSTER_NAME_TAG=$(echo "$TAGS" | jq -r '.[] | select(.Key=="cluster-name") | .Value' 2>/dev/null || echo "")
                  if [[ "$CLUSTER_NAME_TAG" == *"${CLUSTER_ID}"* ]]; then
                    WORKER_INSTANCES="$WORKER_INSTANCES $INSTANCE_ID"
                    echo "Instance $INSTANCE_ID matched by cluster-name tag: $CLUSTER_NAME_TAG"
                    continue
                  fi
                  
                  # Check if kubernetes.io/cluster/${CLUSTER_ID}-* tag exists with value "owned"
                  K8S_CLUSTER_TAG=$(echo "$TAGS" | jq -r --arg cluster_id "$CLUSTER_ID" '.[] | select(.Key | startswith("kubernetes.io/cluster/" + $cluster_id)) | select(.Value=="owned") | .Key' 2>/dev/null || echo "")
                  if [ -n "$K8S_CLUSTER_TAG" ]; then
                    WORKER_INSTANCES="$WORKER_INSTANCES $INSTANCE_ID"
                    echo "Instance $INSTANCE_ID matched by kubernetes cluster tag: $K8S_CLUSTER_TAG"
                  fi
                done < <(echo "$ALL_INSTANCES" | jq -c '.[][]')
                
                WORKER_INSTANCES=$(echo "$WORKER_INSTANCES" | xargs)  # Trim whitespace
                
                if [ -z "$WORKER_INSTANCES" ]; then
                  echo "No worker instances found matching cluster tags in subnet $SUBNET_ID"
                  continue
                fi
                
                echo "Found worker instances for cluster ${CLUSTER_ID}: $WORKER_INSTANCES"
                
                # Attach worker security group to each instance
                for INSTANCE_ID in $WORKER_INSTANCES; do
                  echo "Processing instance: $INSTANCE_ID"
                  
                  # Get current security groups for this instance
                  CURRENT_SGS=$(aws ec2 describe-instances \
                    --instance-ids $INSTANCE_ID \
                    --region ${AWS_REGION} \
                    --query 'Reservations[0].Instances[0].SecurityGroups[*].GroupId' \
                    --output text 2>/dev/null || echo "")
                  
                  # Check if worker security group is already attached
                  if echo "$CURRENT_SGS" | grep -q "$WORKER_SG_ID"; then
                    echo "Worker security group already attached to instance $INSTANCE_ID"
                    continue
                  fi
                  
                  # Add worker security group to the list
                  NEW_SGS="$CURRENT_SGS $WORKER_SG_ID"
                  NEW_SGS=$(echo "$NEW_SGS" | xargs)  # Trim whitespace
                  
                  echo "Attaching security groups to instance $INSTANCE_ID: $NEW_SGS"
                  aws ec2 modify-instance-attribute \
                    --instance-id $INSTANCE_ID \
                    --groups $NEW_SGS \
                    --region ${AWS_REGION} 2>/dev/null || echo "WARNING: Failed to attach security group to instance $INSTANCE_ID"
                done
              done
              
              echo "Worker security group attachment complete"
              
              # Store VPC endpoint ID in a secret for later use
              echo "Storing VPC endpoint and security group information in secret..."
              oc create secret generic ${CLUSTER_ID}-vpc-endpoint-info \
                --from-literal=vpcEndpointId=$VPC_ENDPOINT_ID \
                --from-literal=securityGroupId=$SG_ID \
                --from-literal=workerSecurityGroupId=$WORKER_SG_ID \
                --from-literal=serviceName=$SERVICE_NAME \
                -n ${NAMESPACE} \
                --dry-run=client -o yaml | oc apply -f -
              
              echo "VPC Endpoint creation completed successfully!"
              echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
              echo "VPC Endpoint Security Group ID: $SG_ID"
              echo "Worker Security Group ID: $WORKER_SG_ID"
