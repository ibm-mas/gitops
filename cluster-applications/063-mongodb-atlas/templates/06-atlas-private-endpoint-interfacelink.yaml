{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "sync-atlas-pe-link-patch" }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
Included in $_job_hash (see below).
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Since jobs must be idemopotent, it's generally safe to pass in values here that are not
strictly necessary (i.e. including some values that don't actually influence job behaviour).
We may want to refine this further though for jobs that can take a long time to complete.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := omit .Values "junitreporter" }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource intead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}

{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash )}}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional descriminators
must be added to $_job_cleanup_group.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.
*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}

{{ $ns := .Values.mongo.namespace }}
{{ $sa_name := "atlas-vpc-endpoint-creator" }}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: {{ $ns }}
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-atlas
        app.kubernetes.io/instance: {{ .Values.cluster.id }}
    spec:
      serviceAccountName: {{ $sa_name }}
      restartPolicy: Never
      containers:
        - name: patch-pe-link
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          imagePullPolicy: IfNotPresent
          env:
            - name: CLUSTER_ID
              value: "{{ .Values.cluster.id }}"
            - name: NAMESPACE
              value: "{{ .Values.mongo.namespace }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_secret_access_key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_default_region
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              echo "Retrieving VPC Endpoint ID from secret..."
              
              # Get VPC endpoint ID from the secret (should exist due to sync-wave ordering)
              VPC_ENDPOINT_ID=$(oc get secret ${CLUSTER_ID}-vpc-endpoint-info -n ${NAMESPACE} -o jsonpath='{.data.vpcEndpointId}' | base64 -d)
              
              if [ -z "$VPC_ENDPOINT_ID" ]; then
                echo "ERROR: VPC Endpoint ID not found in secret"
                exit 1
              fi
              
              echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"

              # Patch the AtlasPrivateEndpoint with the actual VPC endpoint ID (should exist due to sync-wave ordering)
              # Check current state of AtlasPrivateEndpoint
              echo "Checking current AtlasPrivateEndpoint configuration..."
              CURRENT_IDS=$(oc get atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} -o jsonpath='{.spec.awsConfiguration[0].id}' 2>/dev/null || echo "")
              
              if [ -n "$CURRENT_IDS" ]; then
                echo "AtlasPrivateEndpoint already has VPC endpoint IDs configured: $CURRENT_IDS"
                # Check if our VPC endpoint ID is already in the list
                if echo "$CURRENT_IDS" | grep -q "$VPC_ENDPOINT_ID"; then
                  echo "VPC Endpoint ID $VPC_ENDPOINT_ID is already configured, skipping patch"
                else
                  echo "WARNING: Different VPC endpoint IDs are configured. Current: $CURRENT_IDS, Expected: $VPC_ENDPOINT_ID"
                fi
              else
                echo "Patching AtlasPrivateEndpoint with VPC Endpoint ID..."
                echo "VPC Endpoint ID to patch: $VPC_ENDPOINT_ID"
                
                # Add the awsConfiguration array with the VPC endpoint ID
                # Structure: awsConfiguration: [{ id: "vpce-xxxxx" }]
                echo "Attempting to add awsConfiguration field..."
                set +e  # Don't exit on error
                oc patch atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} \
                  --type='json' \
                  -p="[{\"op\": \"add\", \"path\": \"/spec/awsConfiguration\", \"value\": [{\"id\": \"${VPC_ENDPOINT_ID}\"}]}]" 2>&1 | tee /tmp/patch_output.txt
                
                PATCH_STATUS=${PIPESTATUS[0]}
                PATCH_OUTPUT=$(cat /tmp/patch_output.txt 2>/dev/null || echo "")
                set -e  # Re-enable exit on error
                echo "Patch command exit status: $PATCH_STATUS"
                
                if [ $PATCH_STATUS -ne 0 ]; then
                  echo "ERROR: Failed to add awsConfiguration field"
                  echo "Patch output: $PATCH_OUTPUT"
                  echo ""
                  echo "Attempting alternative: replace awsConfiguration..."
                  
                  # Try replace operation
                  set +e
                  oc patch atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} \
                    --type='json' \
                    -p="[{\"op\": \"replace\", \"path\": \"/spec/awsConfiguration\", \"value\": [{\"id\": \"${VPC_ENDPOINT_ID}\"}]}]" 2>&1 | tee /tmp/patch_output2.txt
                  
                  PATCH_STATUS=${PIPESTATUS[0]}
                  PATCH_OUTPUT=$(cat /tmp/patch_output2.txt 2>/dev/null || echo "")
                  set -e
                  echo "Alternative patch command exit status: $PATCH_STATUS"
                  
                  if [ $PATCH_STATUS -ne 0 ]; then
                    echo "ERROR: Both patch methods failed"
                    echo "Patch output: $PATCH_OUTPUT"
                    echo ""
                    echo "Current AtlasPrivateEndpoint spec:"
                    oc get atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} -o yaml
                    exit 1
                  else
                    echo "✓ AtlasPrivateEndpoint patched successfully using 'replace' operation!"
                  fi
                else
                  echo "✓ AtlasPrivateEndpoint patched successfully using 'add' operation!"
                fi
              fi
              
              echo ""
              echo "Interface Endpoint ID configured: $VPC_ENDPOINT_ID"

              # Wait for the private endpoint to become available
              echo "Waiting for AtlasPrivateEndpoint status to become AVAILABLE..."
              RETRY_COUNT=0

              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                STATUS=$(oc get atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} -o jsonpath='{.status.status}' 2>/dev/null || echo "")

                if [ "$STATUS" = "AVAILABLE" ]; then
                  echo "AtlasPrivateEndpoint is now AVAILABLE!"
                  break
                fi

                echo "Current status: $STATUS. Waiting... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT + 1))
              done

              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "WARNING: AtlasPrivateEndpoint did not reach AVAILABLE status after $MAX_RETRIES attempts"
                echo "Current status: $(oc get atlasprivateendpoint ${CLUSTER_ID}-private-endpoint -n ${NAMESPACE} -o jsonpath='{.status.status}' 2>/dev/null || echo 'unknown')"
              fi
              
              # Verify VPC endpoint status after private link is established
              echo ""
              echo "Verifying VPC endpoint status after private link establishment..."
              
              VPC_ENDPOINT_STATE=$(aws ec2 describe-vpc-endpoints \
                --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                --region ${AWS_REGION} \
                --query 'VpcEndpoints[0].State' \
                --output text 2>/dev/null || echo "")
              
              if [ -z "$VPC_ENDPOINT_STATE" ]; then
                echo "WARNING: Could not retrieve VPC endpoint state"
              elif [ "$VPC_ENDPOINT_STATE" = "available" ]; then
                echo "✓ VPC endpoint is now AVAILABLE: $VPC_ENDPOINT_ID"
              elif [ "$VPC_ENDPOINT_STATE" = "pending" ] || [ "$VPC_ENDPOINT_STATE" = "pendingAcceptance" ]; then
                echo "✓ VPC endpoint is in transitional state: $VPC_ENDPOINT_STATE"
                echo "  VPC Endpoint ID: $VPC_ENDPOINT_ID"
                echo "  This is expected - endpoint will become available shortly"
              elif [ "$VPC_ENDPOINT_STATE" = "failed" ] || [ "$VPC_ENDPOINT_STATE" = "rejected" ]; then
                echo "ERROR: VPC endpoint is in failed state: $VPC_ENDPOINT_STATE"
                echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
                aws ec2 describe-vpc-endpoints \
                  --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                  --region ${AWS_REGION} \
                  --query 'VpcEndpoints[0]' \
                  --output json 2>/dev/null || echo "Failed to retrieve endpoint details"
                exit 1
              else
                echo "VPC endpoint state: $VPC_ENDPOINT_STATE"
                echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
              fi
              
              echo ""
              echo "Private endpoint interface link completed successfully!"
