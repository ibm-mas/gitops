{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "postsync-setup-atlas" }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
Included in $_job_hash (see below).
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Since jobs must be idemopotent, it's generally safe to pass in values here that are not
strictly necessary (i.e. including some values that don't actually influence job behaviour).
We may want to refine this further though for jobs that can take a long time to complete.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := omit .Values "junitreporter" }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource intead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}

{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash )}}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

When the auto_delete flag is not set on the root application, a CronJob in the cluster uses this label 
to identify old Job resources that should be pruned on behalf of ArgoCD.

Any Job resources in the same namespace that have the mas.ibm.com/job-cleanup-group with this value
will be considered to belong to the same cleanup group. All but the most recent (i.e. with the latest "creation_timestamp")
Jobs will be automatically deleted.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional descriminators
must be added to $_job_cleanup_group.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.

*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}

{{ $ns := .Values.mongo.namespace }}
{{- $sa_name := "atlas-post-sync" }}
{{- $role_name := "atlas-post-sync-role" }}
{{- $rolebinding_name := "atlas-post-sync-rolebinding" }}

---
# ServiceAccount for post-sync job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa_name }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}

---
# Role with permissions to read AtlasDeployment and manage secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $role_name }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
rules:
  # Permission to read AtlasDeployment resources
  - apiGroups:
      - atlas.mongodb.com
    resources:
      - atlasdeployments
    verbs:
      - get
      - list
      - watch
  # Permission to manage secrets for storing connection info
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - patch

---
# RoleBinding to bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $rolebinding_name }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $role_name }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa_name }}
    namespace: {{ $ns }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: {{ $ns }}
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        mas.ibm.com/job-cleanup-group: "{{ $_job_cleanup_group }}"
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ $sa_name }}
      restartPolicy: Never
      containers:
        - name: create-aws-secret
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: ACCOUNT_ID
              value: "{{ .Values.account.id }}"
            - name: CLUSTER_ID
              value: "{{ .Values.cluster.id }}"
            - name: PROJECT_ID
              value: "{{ .Values.mongo.project_id }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_secret_access_key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_default_region
            - name: NAMESPACE
              value: "{{ .Values.mongo.namespace }}"
            - name: UPDATE_MONGO_SECRET
              value: "{{ .Values.mongo.update_mongo_secret }}"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              echo "Waiting for AtlasDeployment to be ready..."
              
              # Wait for the AtlasDeployment to have connection strings in status
              MAX_RETRIES=60
              RETRY_COUNT=0
              
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                DEPLOYMENT_STATUS=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${NAMESPACE} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
                
                if [ "$DEPLOYMENT_STATUS" = "True" ]; then
                  echo "AtlasDeployment is ready!"
                  break
                fi
                
                echo "Waiting for AtlasDeployment to be ready... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT + 1))
              done
              
              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "ERROR: AtlasDeployment not ready after $MAX_RETRIES attempts"
                exit 1
              fi
              
              echo "Retrieving MongoDB shard hosts from AtlasDeployment status..."
              
              # Get the private endpoint endpoints (shard hosts) from AtlasDeployment status
              ENDPOINTS_JSON=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${NAMESPACE} -o jsonpath='{.status.connectionStrings.privateEndpoint[0].endpoints}' 2>/dev/null || echo "")
              
              if [ -z "$ENDPOINTS_JSON" ] || [ "$ENDPOINTS_JSON" = "null" ]; then
                echo "ERROR: Could not retrieve private endpoint endpoints from AtlasDeployment status"
                echo "AtlasDeployment connectionStrings status:"
                oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${NAMESPACE} -o jsonpath='{.status.connectionStrings}' | jq '.'
                exit 1
              fi
              
              echo "Endpoints retrieved successfully"
              echo "Endpoints JSON: $ENDPOINTS_JSON"
              
              # Parse endpoints to extract host:port pairs
              # The endpoints structure is an array of objects with "endpointId" and "providerName" fields
              # We need to get the actual shard hostnames from the srvConnectionString or standard connection string
              
              # Get the standard connection string which contains the actual shard hosts
              STANDARD_CONN_STRING=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${NAMESPACE} -o jsonpath='{.status.connectionStrings.privateEndpoint[0].connectionString}' 2>/dev/null || echo "")
              
              if [ -z "$STANDARD_CONN_STRING" ]; then
                echo "ERROR: Could not retrieve standard connection string from private endpoint"
                exit 1
              fi
              
              echo "Standard connection string retrieved"
              
              # Get username and password from database user secret
              MONGO_USERNAME=$(oc get secret ${CLUSTER_ID}-database-user-password -n ${NAMESPACE} -o jsonpath='{.data.username}' 2>/dev/null | base64 -d || echo "")
              MONGO_PASSWORD=$(oc get secret ${CLUSTER_ID}-database-user-password -n ${NAMESPACE} -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
              
              if [ -z "$MONGO_USERNAME" ] || [ -z "$MONGO_PASSWORD" ]; then
                echo "ERROR: Could not retrieve database user credentials"
                exit 1
              fi
              
              # Get CA certificate - download from MongoDB Atlas
              echo "Fetching MongoDB Atlas CA certificate..."
              CA_CERT=$(curl -s https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem || curl -s https://s3.amazonaws.com/rds-downloads/rds-combined-ca-bundle.pem)
              
              if [ -z "$CA_CERT" ]; then
                echo "ERROR: Could not download CA certificate"
                exit 1
              fi
              
              # Parse standard connection string to extract shard hosts
              echo "Parsing MongoDB shard hosts from connection string..."
              echo "Connection string: $STANDARD_CONN_STRING"
              
              # Extract hosts from connection string
              # Format: mongodb://host1:port1,host2:port2,host3:port3/?params
              HOSTS_STRING=$(echo "$STANDARD_CONN_STRING" | sed -n 's|mongodb://\([^/?]*\).*|\1|p')
              
              if [ -z "$HOSTS_STRING" ]; then
                echo "ERROR: Could not extract hosts from connection string"
                echo "Connection string: $STANDARD_CONN_STRING"
                exit 1
              fi
              
              echo "Extracted shard hosts: $HOSTS_STRING"
              
              # Create YAML info structure
              INFO_YAML=$(cat <<'EOFINFO'
              config:
                hosts:
              EOFINFO
              )
              
              # Parse and add each host
              IFS=',' read -ra HOSTS <<< "$HOSTS_STRING"
              for HOST_PORT in "${HOSTS[@]}"; do
                HOST=$(echo "$HOST_PORT" | cut -d':' -f1)
                PORT=$(echo "$HOST_PORT" | cut -d':' -f2)
                if [ -z "$PORT" ]; then
                  PORT="27017"
                fi
                INFO_YAML+=$(cat <<EOFHOST
              
                - host: $HOST
                  port: $PORT
              EOFHOST
              )
              done
              
              # Add remaining config with fetched CA certificate
              INFO_YAML+=$(cat <<EOFCONFIG
                configDb: admin
                authMechanism: DEFAULT
              certificates:
                - alias: ca
                  crt: |
              EOFCONFIG
              )
              
              # Append the CA certificate with proper indentation (20 spaces for YAML literal block)
              INFO_YAML+=$'\n'
              INFO_YAML+=$(echo "$CA_CERT" | sed 's/^/                    /')
              
              # Escape the YAML for JSON
              ESCAPED_INFO=${INFO_YAML//\"/\\\"}
              ESCAPED_INFO=${ESCAPED_INFO//$'\n'/\\n}
              
              # Prepare AWS Secrets Manager secret data
              TAGS="Key=account,Value=${ACCOUNT_ID} Key=cluster,Value=${CLUSTER_ID} Key=managed-by,Value=argocd"
              SECRET_JSON="{\"info\": \"$ESCAPED_INFO\", \"username\": \"$MONGO_USERNAME\", \"password\": \"$MONGO_PASSWORD\"}"
              SECRET_NAME="${ACCOUNT_ID}/${CLUSTER_ID}/mongo"
              
              echo "=========================================="
              echo "MongoDB Atlas Connection Secret Details"
              echo "=========================================="
              echo "Secret Name: $SECRET_NAME"
              echo "Region: ${AWS_REGION}"
              echo ""
              echo "Secret JSON Content:"
              echo "$SECRET_JSON" | jq '.' || echo "$SECRET_JSON"
              echo "=========================================="
              
              # Conditionally create/update AWS Secrets Manager secret
              if [ "${UPDATE_MONGO_SECRET}" = "true" ]; then
                echo ""
                echo "Creating/updating AWS Secrets Manager secret..."
                
                # Check if secret exists
                if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" --region ${AWS_REGION} &>/dev/null; then
                  echo "Updating existing AWS Secrets Manager secret..."
                  aws secretsmanager update-secret \
                    --secret-id "$SECRET_NAME" \
                    --secret-string "$SECRET_JSON" \
                    --region ${AWS_REGION}
                  echo "AWS Secrets Manager secret updated successfully!"
                else
                  echo "Creating new AWS Secrets Manager secret..."
                  aws secretsmanager create-secret \
                    --name "$SECRET_NAME" \
                    --description "MongoDB Atlas connection details for ${ACCOUNT_ID}/${CLUSTER_ID}" \
                    --secret-string "$SECRET_JSON" \
                    --region ${AWS_REGION} \
                    --tags ${TAGS}
                  echo "AWS Secrets Manager secret created successfully!"
                fi
              else
                echo ""
                echo "AWS Secrets Manager secret creation SKIPPED (update_mongo_secret=false)"
                echo "To enable secret creation, set mongo.update_mongo_secret=true in your configuration"
              fi
              
              echo "Post-sync job completed successfully!"
