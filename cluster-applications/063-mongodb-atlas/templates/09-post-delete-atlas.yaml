{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

{{ $job_name := "postdelete-cleanup-atlas-job" }}
{{ $sa_name := "atlas-vpc-endpoint-creator" }}
{{ $job_label := "postdelete-cleanup-atlas-job" }}
{{ $ns := .Values.mongo.namespace }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $job_name }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ $job_label }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ $sa_name }}
      restartPolicy: Never
      containers:
        - name: cleanup-resources
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: ACCOUNT_ID
              value: "{{ .Values.account.id }}"
            - name: CLUSTER_ID
              value: "{{ .Values.cluster.id }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_secret_access_key
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_default_region
            - name: NAMESPACE
              value: "{{ .Values.mongo.namespace }}"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              echo "Starting cleanup of MongoDB Atlas resources..."
              
              # Get VPC endpoint and security group info from secret
              if oc get secret ${CLUSTER_ID}-vpc-endpoint-info -n ${NAMESPACE} &>/dev/null; then
                VPC_ENDPOINT_ID=$(oc get secret ${CLUSTER_ID}-vpc-endpoint-info -n ${NAMESPACE} -o jsonpath='{.data.vpcEndpointId}' | base64 -d)
                SECURITY_GROUP_ID=$(oc get secret ${CLUSTER_ID}-vpc-endpoint-info -n ${NAMESPACE} -o jsonpath='{.data.securityGroupId}' | base64 -d)
                
                echo "VPC Endpoint ID: $VPC_ENDPOINT_ID"
                echo "Security Group ID: $SECURITY_GROUP_ID"
                
                # Delete VPC endpoint
                if [ -n "$VPC_ENDPOINT_ID" ]; then
                  echo "Deleting VPC endpoint..."
                  aws ec2 delete-vpc-endpoints \
                    --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                    --region ${AWS_REGION} 2>/dev/null || echo "VPC endpoint may already be deleted"
                  
                  # Wait for VPC endpoint to be deleted
                  echo "Waiting for VPC endpoint to be deleted..."
                  MAX_RETRIES=30
                  RETRY_COUNT=0
                  
                  while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                    if ! aws ec2 describe-vpc-endpoints \
                      --vpc-endpoint-ids $VPC_ENDPOINT_ID \
                      --region ${AWS_REGION} &>/dev/null; then
                      echo "VPC endpoint deleted successfully"
                      break
                    fi
                    
                    echo "Waiting for VPC endpoint deletion... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                    sleep 10
                    RETRY_COUNT=$((RETRY_COUNT + 1))
                  done
                fi
                
                # Delete security group
                if [ -n "$SECURITY_GROUP_ID" ]; then
                  echo "Deleting security group..."
                  
                  # First, remove all rules from the security group
                  echo "Removing security group rules..."
                  
                  # Remove ingress rules
                  aws ec2 describe-security-groups \
                    --group-ids $SECURITY_GROUP_ID \
                    --region ${AWS_REGION} \
                    --query 'SecurityGroups[0].IpPermissions' \
                    --output json > /tmp/ingress-rules.json 2>/dev/null || echo "[]" > /tmp/ingress-rules.json
                  
                  if [ -s /tmp/ingress-rules.json ] && [ "$(cat /tmp/ingress-rules.json)" != "[]" ]; then
                    aws ec2 revoke-security-group-ingress \
                      --group-id $SECURITY_GROUP_ID \
                      --ip-permissions file:///tmp/ingress-rules.json \
                      --region ${AWS_REGION} 2>/dev/null || echo "Ingress rules may already be removed"
                  fi
                  
                  # Remove egress rules
                  aws ec2 describe-security-groups \
                    --group-ids $SECURITY_GROUP_ID \
                    --region ${AWS_REGION} \
                    --query 'SecurityGroups[0].IpPermissionsEgress' \
                    --output json > /tmp/egress-rules.json 2>/dev/null || echo "[]" > /tmp/egress-rules.json
                  
                  if [ -s /tmp/egress-rules.json ] && [ "$(cat /tmp/egress-rules.json)" != "[]" ]; then
                    aws ec2 revoke-security-group-egress \
                      --group-id $SECURITY_GROUP_ID \
                      --ip-permissions file:///tmp/egress-rules.json \
                      --region ${AWS_REGION} 2>/dev/null || echo "Egress rules may already be removed"
                  fi
                  
                  # Delete the security group
                  sleep 5  # Wait a bit for rules to be fully removed
                  aws ec2 delete-security-group \
                    --group-id $SECURITY_GROUP_ID \
                    --region ${AWS_REGION} 2>/dev/null || echo "Security group may already be deleted"
                  
                  echo "Security group deleted successfully"
                fi
                
                # Delete the Kubernetes secret
                echo "Deleting VPC endpoint info secret..."
                oc delete secret ${CLUSTER_ID}-vpc-endpoint-info -n ${NAMESPACE} --ignore-not-found=true
              else
                echo "VPC endpoint info secret not found, skipping cleanup"
              fi
              
              # Note: AWS Secrets Manager secret is NOT deleted to preserve MongoDB connection details
              # Secret name: ${ACCOUNT_ID}/${CLUSTER_ID}/mongo
              echo "AWS Secrets Manager secret preserved (not deleted)"
              
              # Delete ConfigMap
              echo "Deleting MongoDB Atlas info ConfigMap..."
              oc delete configmap ${CLUSTER_ID}-mongodb-atlas-info -n ${NAMESPACE} --ignore-not-found=true
              
              echo "Cleanup completed successfully!"
              echo "Note: MongoDB Atlas connection secret in AWS Secrets Manager was preserved"
