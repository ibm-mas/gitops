# MongoDB Atlas Configuration Values
# These values are populated from the cluster configuration

account:
  id: ""

cluster:
  id: ""
  name: ""

mongo:
  action: "install"
  major_db_version: "7.0"
  vpc_id: ""
  subnet_ids: []
  project_id: ""
  organization_id: ""
  instance_size: "M10"
  node_count: "3"
  shards: "1"
  backup_enabled: "true"
  pit_enabled: "true"
  helm_repo: "https://github.com/mongodb/helm-charts"
  namespace: mongodb-atlas-system
  update_mongo_secret: "false"  # Set to true to create/update AWS Secrets Manager secret
  orgId: "xxx"
  publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongo#public_api_key>"
    privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongo#private_api_key>"

region:
  id: ""

aws:
  vpcEndpointId: ""