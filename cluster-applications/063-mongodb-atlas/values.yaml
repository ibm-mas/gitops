# MongoDB Atlas Configuration Values
# These values are populated from the cluster configuration

account:
  id: ""

cluster:
  id: ""
  name: ""

mongo:
  action: "install"
  major_db_version: "7.0"
  vpc_id: ""
  subnet_ids: []
  cidr_ranges: []  # Array of CIDR ranges for VPC endpoint security group ingress rules
  project_id: ""
  organization_id: ""
  instance_size: "M10"
  node_count: "3"
  shards: "1"
  backup_enabled: "true"
  pit_enabled: "true"
  helm_repo: "https://github.com/mongodb/helm-charts"
  namespace: mongodb-atlas-system
  update_mongo_secret: "false"  # Set to true to create/update AWS Secrets Manager secret
  publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#public_api_key>"
  privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#private_api_key>"
  backup_compliance:
    authorized_email: "prajapati.yogeshkumar@ibm.com"
    authorized_user_first_name: "yogesh"
    authorized_user_last_name: "prajapati"
    point_in_time_enabled: true
    restore_window_days: 7
    on_demand_policy:
      retention_unit: "days"
      retention_value: 3
    scheduled_policy_items:
      - frequency_interval: 6
        frequency_type: "hourly"
        retention_unit: "days"
        retention_value: 7
      - frequency_interval: 1
        frequency_type: "daily"
        retention_unit: "days"
        retention_value: 7
      - frequency_interval: 1
        frequency_type: "weekly"
        retention_unit: "weeks"
        retention_value: 4
      - frequency_interval: 1
        frequency_type: "monthly"
        retention_unit: "months"
        retention_value: 12
      - frequency_interval: 1
        frequency_type: "yearly"
        retention_unit: "years"
        retention_value: 1

region:
  id: ""

aws:
  vpcEndpointId: ""

junitreporter:
  reporter_name: ""
  cluster_id: ""
  devops_mongo_uri: ""
  devops_build_number: ""
  gitops_version: ""
  cli_image_repo: ""