# MongoDB Atlas Configuration Values
# These values are populated from the cluster configuration
mongo:
  action: "install"
  major_db_version: "7.0"
  vpc_id: ""
  subnet_ids: []
  cidr_ranges: []  # Array of CIDR ranges for VPC endpoint security group ingress rules
  project_id: ""
  organization_id: ""
  instance_size: "M10"
  node_count: "3"
  shards: "1"
  backup_enabled: "true"
  pit_enabled: "true"
  cross_region_copy_backup:
    regions:  # Array of regions to copy backups to
      - region: "US_EAST_1"  # e.g., "US_EAST_1", "US_WEST_2", "EU_WEST_1"
        shouldCopyOplogs: true  # Whether to copy oplogs (required for point-in-time restore)
        frequencies:  # Which backup types to copy (affects cost)
          - MONTHLY  # Cost-effective: Only monthly backups copied
          # - WEEKLY  # Add for more frequent backups (increases cost)
          # - DAILY   # Add for maximum redundancy (highest cost)
      # - region: "US_WEST_2"  # Add additional regions as needed
      #   shouldCopyOplogs: true
      #   frequencies:
      #     - MONTHLY
    backup_policy_items:  # Custom backup retention policies
      - frequencyType: hourly
        frequencyInterval: 6
        retentionUnit: days
        retentionValue: 7
      - frequencyType: daily
        frequencyInterval: 1
        retentionUnit: days
        retentionValue: 7
      - frequencyType: weekly
        frequencyInterval: 1
        retentionUnit: weeks
        retentionValue: 4
      - frequencyType: monthly
        frequencyInterval: 1
        retentionUnit: months
        retentionValue: 12
      - frequencyType: yearly
        frequencyInterval: 1
        retentionUnit: years
        retentionValue: 1
    restoreWindowDays: 7
  helm_repo: "https://github.com/mongodb/helm-charts"
  namespace: mongodb-atlas-system
  update_mongo_secret: "false"  # Set to true to create/update AWS Secrets Manager secret
  publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#public_api_key>"
  privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:xxx/xxx/mongoatlas#private_api_key>"
  vpcEndpointId: ""

aws_region: "xx-xxx"
cluster_id: "xxx"