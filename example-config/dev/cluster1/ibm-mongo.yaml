merge-key: "dev/cluster1"
mongo:
    action: "install"
    major_db_version: "7.0"
    vpc_id: "vpc-xxxxx"
    subnet_ids:
      - "subnet-xxxxx"
      - "subnet-yyyyy"
      - "subnet-zzzzz"
    cidr_ranges:
      - "10.0.0.0/16"
      - "172.16.0.0/12"
    project_id: "project-xxx"
    organization_id: "org-id-xxxxx"
    instance_size: "M10"
    node_count: "3"
    shards: "1"
    backup_enabled: true
    pit_enabled: true
    helm_repo: "https://github.com/mongodb/helm-charts"
    namespace: "mongodb-atlas-system"
    orgId: "xxx"
    publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:dev/cluster1/mongoatlas#public_api_key>"
    privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:dev/cluster1/mongoatlas#private_api_key>"
    backup_compliance:
      authorized_email: "x.y@ibm.com"
      authorized_user_first_name: "x"
      authorized_user_last_name: "y"
      point_in_time_enabled: true
      restore_window_days: 7
      on_demand_policy:
        retention_unit: "days"
        retention_value: 3
      scheduled_policy_items:
        - frequency_interval: 6
          frequency_type: "hourly"
          retention_unit: "days"
          retention_value: 7
        - frequency_interval: 1
          frequency_type: "daily"
          retention_unit: "days"
          retention_value: 7
        - frequency_interval: 1
          frequency_type: "weekly"
          retention_unit: "weeks"
          retention_value: 4
        - frequency_interval: 1
          frequency_type: "monthly"
          retention_unit: "months"
          retention_value: 12
        - frequency_interval: 1
          frequency_type: "yearly"
          retention_unit: "years"
          retention_value: 1
