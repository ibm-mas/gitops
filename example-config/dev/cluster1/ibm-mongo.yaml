merge-key: "dev/cluster1"
mongo:
    action: "install"
    major_db_version: "7.0"
    vpc_id: "vpc-xxxxx"
    subnet_ids:
      - "subnet-xxxxx"
      - "subnet-yyyyy"
      - "subnet-zzzzz"
    project_id: "project-xxx"
    organization_id: "org-id-xxxxx"
    instance_size: "M10"
    node_count: "3"
    shards: "1"
    backup_enabled: true
    pit_enabled: true
    helm_repo: "https://github.com/mongodb/helm-charts"
    namespace: "mongodb-atlas-system"
    orgId: "xxx"
    publicApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:dev/cluster1/mongoatlas#public_api_key>"
    privateApiKey: "<path:arn:aws:secretsmanager:us-east-1:xxxxxxxxxxxx:secret:dev/cluster1/mongoatlas#private_api_key>"
