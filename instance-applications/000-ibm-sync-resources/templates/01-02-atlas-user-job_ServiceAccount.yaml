---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-user-job
  namespace: mas-{{ .Values.instance_id }}-syncres
  annotations:
    argocd.argoproj.io/sync-wave: "01"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}


---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: atlas-user-job-role
  namespace: mas-{{ .Values.instance_id }}-syncres
  annotations:
    argocd.argoproj.io/sync-wave: "01"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
rules:
  # Permission to read Atlas resources
  - apiGroups:
      - atlas.mongodb.com
    resources:
      - atlasdeployments
      - atlasdatabaseusers
    verbs:
      - get
      - list
      - watch
  # Permission to read secrets for password retrieval
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: atlas-user-job-rolebinding
  namespace: mas-{{ .Values.instance_id }}-syncres
  annotations:
    argocd.argoproj.io/sync-wave: "02"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
subjects:
  - kind: ServiceAccount
    name: atlas-user-job
    namespace: mas-{{ .Values.instance_id }}-syncres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-user-job-role

---
# Role to access Atlas resources and secrets in mongodb-atlas-system namespace
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: atlas-user-job-{{ .Values.instance_id }}-mongodb-role
  namespace: mongodb-atlas-system
  annotations:
    argocd.argoproj.io/sync-wave: "01"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
rules:
  # Permission to read Atlas resources
  - apiGroups:
      - atlas.mongodb.com
    resources:
      - atlasdeployments
      - atlasdatabaseusers
    verbs:
      - get
      - list
      - watch
  # Permission to read secrets (for password retrieval)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list

---
# RoleBinding to grant service account access to mongodb-atlas-system namespace
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: atlas-user-job-{{ .Values.instance_id }}-mongodb-rolebinding
  namespace: mongodb-atlas-system
  annotations:
    argocd.argoproj.io/sync-wave: "02"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
subjects:
  - kind: ServiceAccount
    name: atlas-user-job
    namespace: mas-{{ .Values.instance_id }}-syncres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atlas-user-job-{{ .Values.instance_id }}-mongodb-role
