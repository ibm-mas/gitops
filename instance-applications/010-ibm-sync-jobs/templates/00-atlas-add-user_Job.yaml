{{- if .Values.mongo }}

{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "atlas-add-user" }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
Included in $_job_hash (see below).
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Since jobs must be idemopotent, it's generally safe to pass in values here that are not
strictly necessary (i.e. including some values that don't actually influence job behaviour).
We may want to refine this further though for jobs that can take a long time to complete.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := omit .Values "junitreporter" }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource intead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}

{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash )}}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

When the auto_delete flag is not set on the root application, a CronJob in the cluster uses this label 
to identify old Job resources that should be pruned on behalf of ArgoCD.

Any Job resources in the same namespace that have the mas.ibm.com/job-cleanup-group with this value
will be considered to belong to the same cleanup group. All but the most recent (i.e. with the latest "creation_timestamp")
Jobs will be automatically deleted.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional descriminators
must be added to $_job_cleanup_group.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.

*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}


---

# Username of generated user will always be "masinst_${MAS_INSTANCE_ID}"
# Password will be retrieved from the AtlasDatabaseUser password secret
# This job creates/updates a secret with instance-level user credentials for Atlas MongoDB
# The job is idempotent and will update the secret whenever the AtlasDatabaseUser is synced
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: mas-{{ .Values.instance_id }}-syncres
  annotations:
    argocd.argoproj.io/sync-wave: "01"
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
    metadata:
      labels:
        app: "sync-job"
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: atlas-process-user-secret
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          env:

            - name: ACCOUNT_ID
              value: "{{ .Values.account_id }}"
            - name: CLUSTER_ID
              value: "{{ .Values.cluster_id }}"
            - name: MAS_INSTANCE_ID
              value: "{{ .Values.instance_id }}"
            - name: ATLAS_PROJECT_ID
              value: "{{ .Values.mongo.project_id }}"
            - name: ATLAS_NAMESPACE
              value: "{{ .Values.mongo.namespace }}"
            - name: VPC_ENDPOINT_ID
              value: "{{ .Values.mongo.vpcEndpointId }}"
            - name: MONGODB_PROVIDER
              value: "{{ .Values.mongo.mongodb_provider }}"
            - name: UPDATE_INSTANCE_MONGO_SECRET
              value: "{{ .Values.mongo.update_instance_mongo_secret }}"

            # Atlas namespace where the password secret is located
            - name: ATLAS_PASSWORD_SECRET_NAME
              value: "{{ .Values.instance_id }}-atlas-user-password"

            # AWS Secrets Manager credentials
            - name: SM_AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_default_region
            - name: SM_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_access_key_id
            - name: SM_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws
                  key: aws_secret_access_key

          command:
            - /bin/sh
            - -c
            - |

              set -ex

              echo
              echo "================================================================================"
              echo "Atlas Instance User Secret Management"
              echo "================================================================================"

              # Retrieve password from secret in Atlas namespace
              echo "Retrieving instance user password from secret in ${ATLAS_NAMESPACE} namespace..."
              ATLAS_INSTANCE_PASSWORD=$(oc get secret ${ATLAS_PASSWORD_SECRET_NAME} -n ${ATLAS_NAMESPACE} -o jsonpath='{.data.password}' | base64 -d)
              
              if [ -z "$ATLAS_INSTANCE_PASSWORD" ]; then
                echo "ERROR: Could not retrieve password from secret ${ATLAS_PASSWORD_SECRET_NAME} in namespace ${ATLAS_NAMESPACE}"
                exit 1
              fi
              
              echo "Password retrieved successfully"

              ATLAS_INSTANCE_USERNAME="masinst_${MAS_INSTANCE_ID}"

              echo "Params:"
              echo "    - ACCOUNT_ID              ................... ${ACCOUNT_ID}"
              echo "    - CLUSTER_ID              ................... ${CLUSTER_ID}"
              echo "    - MAS_INSTANCE_ID         ................... ${MAS_INSTANCE_ID}"
              echo "    - ATLAS_PROJECT_ID        ................... ${ATLAS_PROJECT_ID}"
              echo "    - ATLAS_NAMESPACE         ................... ${ATLAS_NAMESPACE}"
              echo "    - ATLAS_INSTANCE_USERNAME ................... ${ATLAS_INSTANCE_USERNAME}"
              echo "    - ATLAS_INSTANCE_PASSWORD ................... ${ATLAS_INSTANCE_PASSWORD:0:2}<snip>"
              echo "    - UPDATE_INSTANCE_MONGO_SECRET .............. ${UPDATE_INSTANCE_MONGO_SECRET}"
              echo "    - SM_AWS_REGION           ................... ${SM_AWS_REGION}"
              echo "    - SM_AWS_ACCESS_KEY_ID    ................... ${SM_AWS_ACCESS_KEY_ID:0:2}<snip>"
              echo "    - SM_AWS_SECRET_ACCESS_KEY ................ ${SM_AWS_SECRET_ACCESS_KEY:0:2}<snip>"
              echo

              # Wait for AtlasDeployment to be ready
              echo "================================================================================"
              echo "Waiting for AtlasDeployment to be ready"
              echo "================================================================================"

              MAX_RETRIES=60
              RETRY_COUNT=0
              
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                DEPLOYMENT_STATUS=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${ATLAS_NAMESPACE} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
                
                if [ "$DEPLOYMENT_STATUS" = "True" ]; then
                  echo "AtlasDeployment is ready!"
                  break
                fi
                
                echo "Waiting for AtlasDeployment to be ready... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT + 1))
              done
              
              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "ERROR: AtlasDeployment not ready after $MAX_RETRIES attempts"
                exit 1
              fi

              # Get private endpoint connection string from AtlasDeployment
              echo "================================================================================"
              echo "Retrieving Private Endpoint Connection Information"
              echo "================================================================================"

              echo "Looking for connection string matching VPC Endpoint: ${VPC_ENDPOINT_ID}"
              
              # Get all private endpoints from AtlasDeployment status
              PRIVATE_ENDPOINTS_JSON=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${ATLAS_NAMESPACE} -o jsonpath='{.status.connectionStrings.privateEndpoint}' 2>/dev/null || echo "")
              
              if [ -z "$PRIVATE_ENDPOINTS_JSON" ] || [ "$PRIVATE_ENDPOINTS_JSON" = "null" ]; then
                echo "ERROR: Could not retrieve private endpoints from AtlasDeployment status"
                echo "AtlasDeployment connectionStrings status:"
                oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${ATLAS_NAMESPACE} -o jsonpath='{.status.connectionStrings}' | jq '.'
                exit 1
              fi
              
              echo "Private endpoints retrieved successfully"
              
              # Find the connection string for the matching VPC endpoint ID
              STANDARD_CONN_STRING=""
              ENDPOINT_INDEX=0
              
              # Get the number of private endpoints
              NUM_ENDPOINTS=$(echo "$PRIVATE_ENDPOINTS_JSON" | jq '. | length')
              
              echo "Found ${NUM_ENDPOINTS} private endpoint(s), searching for VPC endpoint: ${VPC_ENDPOINT_ID}"
              
              # Loop through each private endpoint to find the matching VPC endpoint ID
              while [ $ENDPOINT_INDEX -lt $NUM_ENDPOINTS ]; do
                # Get the endpoints array for this private endpoint
                ENDPOINT_IDS=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${ATLAS_NAMESPACE} -o jsonpath="{.status.connectionStrings.privateEndpoint[${ENDPOINT_INDEX}].endpoints[*].endpointId}" 2>/dev/null || echo "")
                
                echo "Checking private endpoint index ${ENDPOINT_INDEX}: ${ENDPOINT_IDS}"
                
                # Check if our VPC endpoint ID is in this endpoints array
                if echo "$ENDPOINT_IDS" | grep -q "${VPC_ENDPOINT_ID}"; then
                  echo "Found matching VPC endpoint at index ${ENDPOINT_INDEX}"
                  
                  # Get the connection string for this private endpoint
                  STANDARD_CONN_STRING=$(oc get atlasdeployment ${CLUSTER_ID}-atlas-cluster -n ${ATLAS_NAMESPACE} -o jsonpath="{.status.connectionStrings.privateEndpoint[${ENDPOINT_INDEX}].connectionString}" 2>/dev/null || echo "")
                  
                  if [ -n "$STANDARD_CONN_STRING" ]; then
                    echo "Connection string retrieved for VPC endpoint ${VPC_ENDPOINT_ID}"
                    break
                  fi
                fi
                
                ENDPOINT_INDEX=$((ENDPOINT_INDEX + 1))
              done
              
              if [ -z "$STANDARD_CONN_STRING" ]; then
                echo "ERROR: Could not find connection string for VPC endpoint ID: ${VPC_ENDPOINT_ID}"
                echo "Available private endpoints:"
                echo "$PRIVATE_ENDPOINTS_JSON" | jq '.'
                exit 1
              fi
              
              echo "Using connection string for VPC endpoint ${VPC_ENDPOINT_ID}"
              echo "Connection string: ${STANDARD_CONN_STRING}"

              # Parse connection string to extract shard hosts
              echo "Parsing MongoDB shard hosts from connection string..."
              
              # Extract hosts from connection string
              # Format: mongodb://host1:port1,host2:port2,host3:port3/?params
              HOSTS_STRING=$(echo "$STANDARD_CONN_STRING" | sed -n 's|mongodb://\([^/?]*\).*|\1|p')
              
              if [ -z "$HOSTS_STRING" ]; then
                echo "ERROR: Could not extract hosts from connection string"
                exit 1
              fi

              echo "Extracted shard hosts: $HOSTS_STRING"

              # Get CA certificate - download MongoDB Atlas CA certificate
              # MongoDB Atlas uses GTS Root R1 from Google Trust Services
              echo "Fetching MongoDB Atlas CA certificate (GTS Root R1)..."
              CA_CERT=$(curl -s https://pki.goog/repo/certs/gtsr1.pem)
              
              if [ -z "$CA_CERT" ]; then
                echo "ERROR: Could not download GTS Root R1 certificate from Google PKI"
                exit 1
              fi
              
              echo "CA certificate retrieved successfully"

              # Create YAML info structure with hosts
              INFO_YAML=$(cat <<'EOFINFO'
              config:
                hosts:
              EOFINFO
              )
              
              # Parse and add each host
              IFS=',' read -ra HOSTS <<< "$HOSTS_STRING"
              for HOST_PORT in "${HOSTS[@]}"; do
                HOST=$(echo "$HOST_PORT" | cut -d':' -f1)
                PORT=$(echo "$HOST_PORT" | cut -d':' -f2)
                if [ -z "$PORT" ]; then
                  PORT="27017"
                fi
                INFO_YAML+=$(cat <<EOFHOST
              
                - host: $HOST
                  port: $PORT
              EOFHOST
              )
              done

              # Add remaining config with fetched CA certificate
              INFO_YAML+=$(cat <<EOFCONFIG
              
                configDb: admin
                authMechanism: DEFAULT
              certificates:
                - alias: ca
                  crt: |
              EOFCONFIG
              )
              
              # Append the CA certificate with proper indentation (20 spaces for YAML literal block)
              INFO_YAML+=$'\n'
              INFO_YAML+=$(echo "$CA_CERT" | sed 's/^/                    /')

              # Escape the YAML for JSON
              ESCAPED_INFO=${INFO_YAML//\"/\\\"}
              ESCAPED_INFO=${ESCAPED_INFO//$'\n'/\\n}

              SECRETS_KEY_SEPERATOR="/"
              SECRET_NAME_MONGO="${ACCOUNT_ID}${SECRETS_KEY_SEPERATOR}${CLUSTER_ID}${SECRETS_KEY_SEPERATOR}${MAS_INSTANCE_ID}${SECRETS_KEY_SEPERATOR}mongo"

              echo
              echo "================================================================================"
              echo "Atlas Instance MongoDB Connection Secret Details"
              echo "================================================================================"
              echo "Secret Name: $SECRET_NAME_MONGO"
              echo "Region: ${SM_AWS_REGION}"
              echo "    - ATLAS_INSTANCE_USERNAME ................... ${ATLAS_INSTANCE_USERNAME}"
              echo "    - ATLAS_INSTANCE_PASSWORD ................... ${ATLAS_INSTANCE_PASSWORD:0:2}<snip>"
              echo "    - ESCAPED_INFO ................... ${ESCAPED_INFO:0:100}<snip>"
              echo "================================================================================"

              # Conditionally create/update AWS Secrets Manager secret
              # Only update if update_instance_mongo_secret=true AND mongodb_provider=yaml
              if [ "${UPDATE_INSTANCE_MONGO_SECRET}" = "true" ] && [ "${MONGODB_PROVIDER}" = "yaml" ]; then
                echo ""
                echo "================================================================================"
                echo "Updating Instance Mongo Secret in AWS Secrets Manager"
                echo "================================================================================"

                # Source gitops utilities for AWS Secrets Manager functions
                source /mascli/functions/gitops_utils
                sm_login

                # Create/update the secret in AWS Secrets Manager
                TAGS="[{\"Key\": \"source\", \"Value\": \"atlas-add-user\"}, {\"Key\": \"account\", \"Value\": \"${ACCOUNT_ID}\"}, {\"Key\": \"cluster\", \"Value\": \"${CLUSTER_ID}\"}]"
                
                # Write JSON to temporary file to avoid "Argument list too long" error
                SECRET_JSON_FILE=$(mktemp)
                echo "{\"info\":\"$ESCAPED_INFO\", \"username\":\"$ATLAS_INSTANCE_USERNAME\", \"password\":\"$ATLAS_INSTANCE_PASSWORD\"}" > "$SECRET_JSON_FILE"
                
                sm_update_secret $SECRET_NAME_MONGO "file://$SECRET_JSON_FILE" "${TAGS}" || exit $?
                rm -f "$SECRET_JSON_FILE"

                echo "AWS Secrets Manager secret updated successfully!"
              else
                echo ""
                echo "AWS Secrets Manager secret update SKIPPED"
                if [ "${UPDATE_INSTANCE_MONGO_SECRET}" != "true" ]; then
                  echo "Reason: update_instance_mongo_secret=${UPDATE_INSTANCE_MONGO_SECRET} (must be 'true')"
                fi
                if [ "${MONGODB_PROVIDER}" != "yaml" ]; then
                  echo "Reason: mongodb_provider=${MONGODB_PROVIDER} (must be 'yaml')"
                fi
                echo "To enable secret creation/update, set mongo.update_instance_mongo_secret=true AND mongo.mongodb_provider=yaml in your configuration"
              fi

              echo
              echo "================================================================================"
              echo "Atlas instance user job completed successfully!"
              echo "================================================================================"

      restartPolicy: Never
      serviceAccountName: atlas-user-job
  backoffLimit: 4
{{- end }}
