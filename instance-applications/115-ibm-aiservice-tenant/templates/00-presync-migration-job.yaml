###################################################################################################
# For 9.2 migrations, this pre-sync job blocks the sync of tenant resources until the 9.1 tenant
# operator is deleted. This allows the safe migration of resources to the tenant namespace from the
# AI Service namespace without triggering for example the tenant operator finalizer, i.e. tenant
# deprovisioning.
###################################################################################################

{{- $_job_name_prefix := "presync-tenant-migration" }}
{{- $_cli_image_digest := "sha256:8c4a6d183315f7dc5628a40773602b625f8b9aabecd54b24a968b8fffdf87923" }}
{{- $_job_config_values := omit .Values "junitreporter" }}
{{- $_job_version := "v2" }}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}
{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash ) }}
{{- $_job_cleanup_group := cat $_job_name_prefix | sha1sum }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: presync-tenant-migration
  namespace: {{ .Values.tenantNamespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "presync-tenant-migration-{{ .Values.tenantNamespace }}"
  namespace: {{ .Values.aiservice_namespace  }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "presync-tenant-migration-{{ .Values.tenantNamespace }}"
  namespace: {{ .Values.aiservice_namespace  }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: presync-tenant-migration
    namespace: {{ .Values.tenantNamespace }}
roleRef:
  kind: Role
  name: "presync-tenant-migration-{{ .Values.tenantNamespace }}"
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: presync-tenant-migration
  namespace: {{ .Values.tenantNamespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: presync-tenant-migration
  namespace: {{ .Values.tenantNamespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: presync-tenant-migration
    namespace: {{ .Values.tenantNamespace }}
roleRef:
  kind: Role
  name: presync-tenant-migration
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: presync-tenant-migration
  namespace: "{{ .Values.tenantNamespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  podSelector:
    matchLabels:
      app: presync-job
  egress:
    - {}
  policyTypes:
    - Egress

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  namespace: {{ .Values.tenantNamespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  activeDeadlineSeconds: 3600 # 1 hour
  template:
    metadata:
      labels:
        app: presync-job
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: presync-tenant-migration
      restartPolicy: OnFailure
      containers:
        - name: main
          image: quay.io/ibmmas/cli@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          env:
            - name: CATALOG_CHANNEL
              value: "{{ .Values.catalog_channel }}"
            - name: AISERVICE_INSTANCE_ID
              value: "{{ .Values.aiservice_instance_id }}"
            - name: AISERVICE_NAMESPACE
              value: "{{ .Values.aiservice_namespace }}"
            - name: TENANT_NAMESPACE
              value: "{{ .Values.tenantNamespace }}"
              # Secrets to copy from AI Service namespace to tenant namespace. They will be further processed
              # later in the sync cycle.
            - name: SLS_SECRET_NAME
              value: "{{ .Values.tenantNamespace }}----sls-secret"
            - name: API_KEY_SECRET_NAME
              value: "{{ .Values.tenantNamespace }}----apikey-secret"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              function copy_resource() {
                local resource_type="${1}"
                local resource_name="${2}"
                local new_resource_name="${3}"
                local source_namespace="${4}"
                local target_namespace="${5}"
                if oc get ${resource_type} ${resource_name} -n ${source_namespace} -o json > /tmp/${resource_name}.json; then
                  echo "[INFO] Copying ${resource_type} ${resource_name} from namespace ${source_namespace} to namespace ${target_namespace}"
                  # Clean metadata fields to avoid resourceVersion conflicts. Delete the owner refs to prevent garbage collection.
                  jq 'del(.metadata.ownerReferences, .metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.selfLink, .metadata.managedFields)' /tmp/${resource_name}.json \
                    | sed "s/\"namespace\": \"${source_namespace}\"/\"namespace\": \"${target_namespace}\"/" > /tmp/${resource_name}_clean.json
                  # These resources are not defined in Git so exclude them from ArgoCD's reconcilliation.
                  jq '.metadata.annotations = (.metadata.annotations // {}) + {"argocd.argoproj.io/sync-options": "IgnoreExtraneous,Prune=false"}' /tmp/${resource_name}_clean.json > /tmp/${resource_name}_annotated.json
                  # Change the name to avoid possibly conflicting with the secret synced by ArgoCD
                  jq --arg name "${new_resource_name}" --arg namespace "${target_namespace}" '.metadata.name = $name | .metadata.namespace = $namespace' /tmp/${resource_name}_annotated.json > /tmp/${resource_name}_renamed.json
                  oc apply -f /tmp/${resource_name}_renamed.json
                else
                echo "[WARNING] ${resource_type} ${resource_name} not found in ${source_namespace} => cannot copy resource to namespace ${target_namespace}"
                fi
              }

              echo "[INFO] Running tenant pre-sync migration at $(date)"
              echo "[INFO] Catalog channel = ${CATALOG_CHANNEL}"
              if [[ "${CATALOG_CHANNEL}" == 9.2.* ]]; then

                function is_v91_installed() {
                  if oc get deployment ${AISERVICE_INSTANCE_ID}-entitymgr-tenant -n ${AISERVICE_NAMESPACE} &>/dev/null; then
                    export IS_V91_INSTALLED="true"
                  else
                    export IS_V91_INSTALLED="false"
                  fi
                }

                function is_api_ready() {
                  local response=$(curl -k -H 'Accept: application/json' https://aibroker.${AISERVICE_NAMESPACE}.svc/ibm/aibroker/service/rest/api/v1/health)
                  if [ "$(echo "${response}" | jq -r '.healthy')" = "true" ]; then
                    export IS_API_READY="true"
                  else
                    export IS_API_READY="false"
                  fi
                }

                copy_resource secret "${SLS_SECRET_NAME}" "${SLS_SECRET_NAME}-copy" "${AISERVICE_NAMESPACE}" "${TENANT_NAMESPACE}"
                copy_resource secret "${API_KEY_SECRET_NAME}" "${API_KEY_SECRET_NAME}" "${AISERVICE_NAMESPACE}" "${TENANT_NAMESPACE}"

                is_v91_installed
                while [[ "${IS_V91_INSTALLED}" == "true" ]]; do
                  echo "[INFO] ibm-aiservice-tenant operator v9.1 is deployed so cannot proceed. Checking again in 30 seconds ..."
                  sleep 30
                  is_v91_installed
                done
                echo "[INFO] ibm-aiservice-tenant operator v9.1 is not deployed. Proceeding ..."

                is_api_ready
                while [[ "${IS_API_READY}" != "true" ]]; do
                  echo "[INFO] API Broker is not ready. Checking again in 30 seconds ..."
                  sleep 30
                  is_api_ready
                done
                echo "[INFO] API Broker is ready. Proceeding ..."

              elif [[ "${CATALOG_CHANNEL}" == 9.1.* ]]; then
              
                # We cannot know for sure if we are in a rollback scenario.
                # So, check if API key and SLS secrets exist in the tenant namespace.
                # If they do, we assume that 9.2.x was previously installed so we copy the secrets
                # back to the AI Service namespace for processing later.

                if oc get secret "${SLS_SECRET_NAME}" -n "${TENANT_NAMESPACE}" --ignore-not-found &>/dev/null && \
                  oc get secret "${API_KEY_SECRET_NAME}" -n "${TENANT_NAMESPACE}" --ignore-not-found &>/dev/null; then
                    echo "[WARNING] Tenant API key secret and SLS secret found in tenant namespace => assuming the deployment is a rollback from 9.2.x"
                    copy_resource secret "${SLS_SECRET_NAME}" "${SLS_SECRET_NAME}-copy" "${TENANT_NAMESPACE}" "${AISERVICE_NAMESPACE}"
                    copy_resource secret "${API_KEY_SECRET_NAME}" "${API_KEY_SECRET_NAME}" "${TENANT_NAMESPACE}" "${AISERVICE_NAMESPACE}"
                else
                    echo "[INFO] Tenant API key secret and SLS secret not found in tenant namespace => assuming the deployment is not a rollback"
                fi

              else
                echo "[INFO] Catalog channel is not 9.1.x or 9.2.x => no pre-sync migration required"
              fi

              exit 0
