---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Values.tenantNamespace }}----sls-secret"
  {{- if hasPrefix "9.1." (toString .Values.catalog_channel) }}
  namespace: "{{ .Values.aiservice_namespace }}"
  {{- else }}
  namespace: "{{ .Values.tenantNamespace }}"
  {{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "302"
    argocd.argoproj.io/compare-options: IgnoreExtraneous # This secret is updated by the tenant operator
  labels:
    aiservice.ibm.com/instanceId: "{{ .Values.aiservice_instance_id }}"
    {{- if .Values.custom_labels }}
    {{- range $key, $val := .Values.custom_labels }}
    {{ $key | quote }}: {{ $val | quote }}
    {{- end }}
    {{- end }}
type: Opaque
data:
  SLS_REGISTRATION_KEY: {{ .Values.slscfg_registration_key   | default "" | toString | b64enc }}
