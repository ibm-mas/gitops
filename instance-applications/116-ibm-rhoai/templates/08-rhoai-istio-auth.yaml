---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ .Values.rhoai_applications_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "132"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mtls:
    mode: PERMISSIVE
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ds-pipeline-instance
  namespace: {{ .Values.rhoai_applications_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "133"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: ds-pipeline-instance.{{ .Values.rhoai_applications_namespace }}.svc.cluster.local
  trafficPolicy:
    portLevelSettings:
      - port:
          number: 8888
        tls:
          mode: ISTIO_MUTUAL
