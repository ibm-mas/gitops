{{- if .Values.application_admin_role }}
{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
*/}}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}

---
# Service account that is authorized to read k8s secrets (needed by the job)
kind: ServiceAccount
apiVersion: v1
metadata:
  name: "presync-sa-{{ .Values.db2_instance_name }}"
  namespace: "{{ .Values.db2_namespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}


---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "db2-database-presync-sa-role-{{ .Values.db2_instance_name }}"
  namespace: "{{ .Values.db2_namespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
rules:
- apiGroups:
    - db2u.databases.ibm.com
  resources:
    - db2uinstances
  verbs:
    - get
    - list



---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: "db2-database-presync-sa-rb-{{ .Values.db2_instance_name }}"
  namespace: "{{ .Values.db2_namespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
subjects:
  - kind: ServiceAccount
    name: "presync-sa-{{ .Values.db2_instance_name }}"
    namespace: "{{ .Values.db2_namespace }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "db2-database-presync-sa-role-{{ .Values.db2_instance_name }}"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: "presync-await-crd-{{ .Values.db2_instance_name }}"
  namespace: "{{ .Values.db2_namespace }}"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
{{- if .Values.custom_labels }}
    metadata:
      labels:
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: run
          image: {{ .Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env: []
          volumeMounts: []
          command:
            - /bin/sh
            - -c
            - |

              set -e

              

              # Wait for DB2 CRD to be available by checking if we can query the resource
              # This approach uses namespace-scoped permissions instead of cluster-scoped CRD access
              wait_period=0
              
              echo "Waiting for DB2 CRD (db2uinstances) to be available..."
              
              while true
              do
                wait_period=$(($wait_period+10))
                if [ $wait_period -gt 300 ];then
                  echo "DB2 CRD db2uinstances is not ready within 300 seconds, exiting"
                  exit 1
                fi
                
                sleep 10
                
                # Try to query db2uinstances - if CRD exists, this will succeed (even if no instances exist)
                # If CRD doesn't exist, we'll get an error about unknown resource type
                if oc get db2uinstances -n {{ .Values.db2_namespace }} --no-headers 2>/dev/null; then
                  echo "DB2 CRD db2uinstances.db2u.databases.ibm.com is available"
                  break
                fi
                
                echo "DB2 CRD not yet available, waiting... (${wait_period}s elapsed)"
              done
              
              echo "DB2 CRD is ready"

      restartPolicy: Never

      # TODO: is this the correct SA to use here?
      # No, probably want to add a more restricted SA that can just do things that these post-sync jobs need to do
      serviceAccountName: "presync-sa-{{ .Values.db2_instance_name }}"
      volumes: []
  backoffLimit: 4
{{- end }}
