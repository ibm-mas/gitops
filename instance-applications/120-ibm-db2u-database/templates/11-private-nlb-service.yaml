{{- if .Values.private_nlb.enabled }}
{{- if not .Values.private_nlb.subnet_ids }}
{{- fail "private_nlb.subnet_ids must be provided when private_nlb.enabled is true" }}
{{- end }}
{{- if not .Values.private_nlb.allowed_cidrs }}
{{- fail "private_nlb.allowed_cidrs must be provided when private_nlb.enabled is true — restrict access to customer CIDRs only" }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.db2_instance_name }}-private-nlb
  namespace: {{ .Values.db2_namespace }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-subnets: {{ .Values.private_nlb.subnet_ids | join "," | quote }}
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "traffic-port"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  loadBalancerSourceRanges:
    {{- range .Values.private_nlb.allowed_cidrs }}
    - {{ . }}
    {{- end }}
  ports:
    - name: db2-ssl
      protocol: TCP
      port: {{ .Values.private_nlb.port | default 50001 }}
      targetPort: 50001
  selector:
    app: {{ .Values.db2_instance_name }}
    component: db2wh
    formation_id: {{ .Values.db2_instance_name }}
    name: dashmpp-head-0
    role: db
    type: engine
{{- end }}
