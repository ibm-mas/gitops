---
instance_id: xxx
db2_instance_name: xxx
db2_namespace: xxxx
db2_instance_home_path: /mnt/blumeta0/home/db2inst1

sm_aws_access_key_id: xxx
sm_aws_secret_access_key: xxxx

# Private NLB for customer TGW connectivity (A.4 Option 2)
# When enabled, ROSA provisions an internal AWS NLB in the specified subnets.
# ROSA automatically manages the required EC2 worker node security group rules.
# Default: disabled — existing instances are unaffected.
private_nlb:
  enabled: false
  subnet_ids: []    # private-connectivity-edge subnet IDs, one per AZ
  allowed_cidrs: [] # customer CIDRs — restricts NLB access via loadBalancerSourceRanges
  port: 50001       # Db2 SSL port
