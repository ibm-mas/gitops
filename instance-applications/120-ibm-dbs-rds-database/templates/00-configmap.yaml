---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.scriptConfigMapName | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "135"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
data:
  dbs-rds-init.py: |
    import ibm_db as db2
    import os
    import sys

    # Initialization of 
    #mas_application_id = os.getenv("MAS_APP_ID")
    mas_application_id = 'facilities'
    database_name = os.getenv("DB_NAME")
    created_any = False
    
    ssl_cert_path = os.environ.get("SSL_CERT_PATH", "/etc/mas/rds-ssl/global-bundle.pem")
        
    with open("/etc/mas/dbs-rds-creds/username", 'r') as f:
      username = f.read().strip()
    
    with open("/etc/mas/dbs-rds-creds/password", 'r') as f:
      password = f.read().strip()
    
    # Creating database connection string for rdsadmin user
    conn_rds_admin_str = (
        f"DATABASE={os.environ['RDS_ADMIN_DB']};"
        f"HOSTNAME={os.environ['DB_HOST']};"
        f"PORT={os.environ['DB_PORT']};"
        f"PROTOCOL=TCPIP;"
        f"UID={username};"
        f"PWD={password};"
        f"SECURITY=SSL;"
        f"SSLServerCertificate={ssl_cert_path};"
    )
    
    # Creating database connection string for db2rds user
    conn_rds_db2_str = (
        f"DATABASE={os.environ['DB_NAME']};"
        f"HOSTNAME={os.environ['DB_HOST']};"
        f"PORT={os.environ['DB_PORT']};"
        f"PROTOCOL=TCPIP;"
        f"UID={username};"
        f"PWD={password};"
        f"SECURITY=SSL;"
        f"SSLServerCertificate={ssl_cert_path};"
    )

    try:
        admin_conn = db2.connect(conn_rds_admin_str, "", "")
        print("✅ Connected to Db2 as rdsadmin user")
    
        db2_conn   = db2.connect(conn_rds_db2_str, "", "")
        print("✅ Connected to Db2 as db2rds user")
    except Exception as e:
        print(f"❌ Connection failed: {e}")
        sys.exit(1)

    # Call the RDS admin procedure to list tablespaces
    def list_tablespaces():
        stmt = db2.exec_immediate(conn_str, "CALL rdsadmin.list_tablespaces()")
        return stmt


    def bufferpool_exists(name):
      # Use parameterized SQL to avoid injection
      query = "SELECT COUNT(*) FROM syscat.bufferpools WHERE bpname = ?"
      stmt = db2.prepare(db2_conn, query)
      db2.execute(stmt, (name.upper(),))  # Ensure uppercase as bpname is stored in uppercase
      result = db2.fetch_tuple(stmt)
      return int(result[0]) > 0

    def tablespace_exists(tablespace_name):
      stmt = db2.prepare(db2_conn, "SELECT COUNT(*) FROM syscat.tablespaces WHERE tbspace = ?")
      db2.execute(stmt, (tablespace_name.upper(),))
      return int(db2.fetch_tuple(stmt)[0]) > 0
    

    def create_bufferpool(bpname, pagesize=32768):
        sql = f"""
          CALL rdsadmin.create_bufferpool(
              '{database_name}',
              '{bpname}',
               NULL,
              'Y',
              'N',
              {pagesize},
              -1
          )
          """
        db2.exec_immediate(admin_conn, sql)
        print(f"✅ Created bufferpool: {bpname}")

    def create_tablespace(
        tbname,
        bufferpool,
        pagesize=16384,
        initialsize=5000,
        increasesize=10000,
        tablespace_type="U",
    ):
        sql = f"""
          CALL rdsadmin.create_tablespace(
              '{database_name}',
              '{tbname}',
              '{bufferpool}',
              {pagesize},
              '{initialsize}',
              '{increasesize}',
              '{tablespace_type}'
          )
          """
        db2.exec_immediate(admin_conn, sql)
        print(f"✅ Created tablespace: {tbname}")


    # 1. Bufferpools
    manage_bufferpools = ["MAXBUFPOOL", "MAXBUFPOOLINDX", "MAXTEMPBP"]
    facilities_bufferpools = [
        "TRIBUFPOOL",
        "TRIBUFPOOLINDEX",
        "TRITEMPBP",
        "DEDICATEDBPDATA",
        "DEDICATEDBPINDX",
        "DEDICATEDBPLOB",
    ]

    if mas_application_id == "manage":
        for bp in manage_bufferpools:
            if bufferpool_exists(bp):
                print(f"ℹ️ Bufferpool '{bp}' already exists")
            else:
                create_bufferpool(bp)
                created_any = True
    elif mas_application_id == "facilities":
        for bp in facilities_bufferpools:
            if bufferpool_exists(bp):
                print(f"ℹ️ Bufferpool '{bp}' already exists")
            else:
                create_bufferpool(bp)
                created_any = True
    else:
        print(f"ℹ️ BUFFERPOOL CHAIN : mas_application_id is not provided ")
    
    # 2. Tablespaces
    manage_tablespaces = [
        ("MAXDATA", "MAXBUFPOOL"),
        ("MAXINDEX", "MAXBUFPOOLINDX"),
        ("MAXTEMP", "MAXTEMPBP"),
    ]
    facilities_tablespaces = [
        ("TRIDATA_DATA", "TRIBUFPOOL"),
        ("TRIDATA_INDX", "TRIBUFPOOLINDEX"),
        ("TRITEMP", "TRITEMPBP"),
        ("DEDICATED_DATA", "DEDICATEDBPDATA"),
        ("DEDICATED_INDEX", "DEDICATEDBPINDX"),
        ("DEDICATED_LOBS", "DEDICATEDBPLOB"),
    ]

    if mas_application_id == "manage":
        for tsp, bp in manage_tablespaces:
          if tablespace_exists(tsp):
              print(f"ℹ️ Tablespace '{tsp}' already exists")
          else:
              create_tablespace(tsp, bp)
              created_any = True
    elif mas_application_id == "facilities":
        for tsp, bp in facilities_tablespaces:
          if tablespace_exists(tsp):
              print(f"ℹ️ Tablespace '{tsp}' already exists")
          else:
              if tsp == "TRITEMP":
                  create_tablespace(tsp, bp, tablespace_type="T")
              else:
                  create_tablespace(tsp, bp)
              created_any = True
    else:
        print(f"ℹ️ TABLESPACE CHAIN: mas_application_id is not provided ")

    if created_any:
        print("✅ Db2 RDS bufferpools and tablespaces created or updated.")
    else:
        print("✅ All bufferpools and tablespaces already existed or not created — please check.")

    # 3. Apply DB2 Instance Registry Configuration
    db2_instance_registry = os.environ.get('DB2_INSTANCE_REGISTRY', '')
    if db2_instance_registry:
        print("\n📝 Applying DB2 Instance Registry settings...")
        import json
        registry = json.loads(db2_instance_registry)
        for key, value in registry.items():
            try:
                # Try RDS procedure first (Amazon RDS for Db2)
                sql = f"CALL rdsadmin.update_db_param('{database_name}', '{key}', '{value}')"
                db2.exec_immediate(admin_conn, sql)
                print(f"  ✅ Set {key} = {value} (RDS)")
            except Exception:
                try:
                    # Standard DB2 fallback using ADMIN_CMD
                    sql = f"CALL SYSPROC.ADMIN_CMD('UPDATE DB CFG FOR {database_name} USING {key} {value}')"
                    db2.exec_immediate(admin_conn, sql)
                    print(f"  ✅ Set {key} = {value} (DB CFG)")
                except Exception as e:
                    print(f"  ⚠️  Failed to set {key}: {e}")
    
    # 4. Apply DB2 Database Configuration
    db2_database_config = os.environ.get('DB2_DATABASE_CONFIG', '')
    restart_required_params = []
    if db2_database_config:
        print("\n📝 Applying DB2 Database Configuration settings...")
        import json
        config = json.loads(db2_database_config)
        
        # Parameters that require database restart
        restart_params = ['CHNGPGS_THRESH', 'CUR_COMMIT', 'DEC_TO_CHAR_FMT',
                         'LOCKTIMEOUT', 'NUM_IOCLEANERS', 'NUM_IOSERVERS']
        
        for key, value in config.items():
            try:
                # First, check current value of the parameter
                check_sql = f"SELECT VALUE FROM SYSIBMADM.DBCFG WHERE NAME = '{key.upper()}'"
                stmt = db2.exec_immediate(db2_conn, check_sql)
                result = db2.fetch_tuple(stmt)
                
                current_value = result[0].strip() if result else None
                desired_value = str(value).strip()
                
                if current_value == desired_value:
                    print(f"  ℹ️  {key} already set to {value} (no change needed)")
                    continue
                
                print(f"  📝 Updating {key}: {current_value} → {desired_value}")
                
                # Try RDS procedure first with appropriate flags
                try:
                    if key.upper() in restart_params:
                        sql = f"CALL rdsadmin.update_db_param('{database_name}', '{key}', '{value}', 'RESTART_DATABASE', 'YES')"
                        restart_required_params.append(key)
                    else:
                        sql = f"CALL rdsadmin.update_db_param('{database_name}', '{key}', '{value}')"
                    
                    db2.exec_immediate(admin_conn, sql)
                    print(f"  ✅ Set {key} = {value} (RDS)")
                except Exception as rds_error:
                    error_msg = str(rds_error)
                    # If RDS procedure fails, try standard DB2 command using ADMIN_CMD
                    if 'SQL0440N' in error_msg or 'SQL0438N' in error_msg:
                        try:
                            # Fallback to standard DB2 using ADMIN_CMD
                            sql = f"CALL SYSPROC.ADMIN_CMD('UPDATE DB CFG FOR {database_name} USING {key} {value} IMMEDIATE')"
                            db2.exec_immediate(admin_conn, sql)
                            print(f"  ✅ Set {key} = {value} (DB CFG)")
                            if key.upper() in restart_params:
                                restart_required_params.append(key)
                        except Exception as fallback_error:
                            print(f"  ⚠️  Failed to set {key}: {fallback_error}")
                    elif 'not supported or not modifiable' in error_msg:
                        print(f"  ℹ️  Skipping {key} (not modifiable in RDS)")
                    else:
                        print(f"  ⚠️  Failed to set {key}: {rds_error}")
                    
            except Exception as e:
                print(f"  ⚠️  Failed to set {key}: {e}")
    
    # 5. Apply DB2 Instance DBM Configuration
    db2_instance_dbm_config = os.environ.get('DB2_INSTANCE_DBM_CONFIG', '')
    if db2_instance_dbm_config:
        print("\n📝 Applying DB2 Instance DBM Configuration settings...")
        import json
        config = json.loads(db2_instance_dbm_config)
        
        for key, value in config.items():
            try:
                # Try RDS procedure first
                sql = f"CALL rdsadmin.update_db_param('{database_name}', '{key}', '{value}')"
                db2.exec_immediate(admin_conn, sql)
                print(f"  ✅ Set {key} = {value} (RDS)")
            except Exception:
                try:
                    # Fallback for standard DB2 using ADMIN_CMD
                    sql = f"CALL SYSPROC.ADMIN_CMD('UPDATE DBM CFG USING {key} {value} IMMEDIATE')"
                    db2.exec_immediate(admin_conn, sql)
                    print(f"  ✅ Set {key} = {value} (DBM CFG)")
                except Exception as e:
                    error_msg = str(e)
                    if 'not supported or not modifiable' in error_msg.lower():
                        print(f"  ℹ️  Skipping {key} (not modifiable)")
                    else:
                        print(f"  ⚠️  Failed to set {key}: {e}")

    # 6. Handle database restart warning if required
    if restart_required_params:
        print("\n" + "="*80)
        print("  ⚠️  DATABASE RESTART PENDING")
        print("="*80)
        print(f"\n  The following parameters have been updated but require a database restart to take effect:")
        for param in restart_required_params:
            print(f"     - {param}")
        
        print(f"\n  ⚠️  IMPORTANT: These changes are PENDING and will NOT be active until the database is restarted.")
        print(f"\n  Options to restart the RDS DB2 instance:")
        print(f"  1. Using AWS Console:")
        print(f"     - Navigate to RDS → Databases → Select your DB instance")
        print(f"     - Actions → Reboot")
        print(f"\n  2. Using AWS CLI:")
        print(f"     aws rds reboot-db-instance --db-instance-identifier <your-db-instance-id>")
        print(f"\n  3. Using DB2 procedure (if authorized):")
        print(f"     CALL rdsadmin.restart_database('{database_name}')")
        print("\n" + "="*80)
        
        # Close connections
        try:
            db2.close(admin_conn)
            db2.close(db2_conn)
        except:
            pass
    else:
        print("\n✅ All DB2 configurations applied successfully")
        db2.close(admin_conn)
        db2.close(db2_conn)
