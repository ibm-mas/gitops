apiVersion: batch/v1
kind: Job
metadata:
  name: db2-init-job
  annotations:
    argocd.argoproj.io/sync-wave: "135"
spec:
  template:
    spec:
      containers:
        - name: db2-init
          image: {{ .Values.image | quote }}
          command: ["python", "/scripts/db2_init.py"]
          env:
            - name: MAS_APP_ID
              value: {{ .Values.mas_application_id | quote }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName | quote }}
                  key: db2_endpoint
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName | quote }}
                  key: db2_port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName | quote }}
                  key: db2_name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName | quote }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName | quote }}
                  key: password
          volumeMounts:
            - name: script-vol
              mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: script-vol
          configMap:
            name: {{ .Values.scriptConfigMapName | quote }}
  backoffLimit: 1
