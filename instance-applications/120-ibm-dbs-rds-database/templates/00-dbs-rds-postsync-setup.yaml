apiVersion: batch/v1
kind: Job
metadata:
  name: db2-init-job
  annotations:
    argocd.argoproj.io/sync-wave: "135"
spec:
  template:
    spec:
      containers:
        - name: db2-init
          image: {{ .Values.image }}
          command: ["python", "/scripts/db2_init.py"]
          env:
            - name: MAS_APP_ID
              value: {{ .Values.mas_application_id | quote }}
            - name: DB_HOST
              value: {{ .Values.host | quote }}
            - name: DB_PORT
              value: {{ .Values.port | quote }}
            - name: DB_NAME
              value: {{ .Values.dbname | quote }}
            - name: DB_USER
              value: {{ .Values.user | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.password | quote }}
          volumeMounts:
            - name: script-vol
              mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: script-vol
          configMap:
            name: {{ .Values.scriptConfigMapName }}
  backoffLimit: 1
