{{- if .Values.application_admin_role }}
{{- $_job_name_prefix := "dbs-rds-presync-create-db" }}
{{- $_cli_image_digest := "sha256:4636b74525a46ebd88cd540794e8e23143f0112ea85149f9dfc78d02704ad5a6" }}
{{- $_job_config_values := omit .Values "junitreporter" }}
{{- $_job_version := "v1" }}
{{- $_job_hash := print ($_job_config_values | toYaml) $_cli_image_digest $_job_version | adler32sum }}
{{- $_job_name := join "-" (list $_job_name_prefix $_job_hash ) }}
{{- $_job_cleanup_group := cat $_job_name_prefix .Values.db2_rds_instance_name | sha1sum }}

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.db2_rds_instance_name }}-create-db-secret
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
data:
  username: {{ .Values.user | b64enc }}
  password: {{ .Values.password | b64enc }}

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.db2_rds_instance_name }}-aws-creds
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
data:
  aws_access_key_id: {{ .Values.sm_aws_access_key_id | b64enc }}
  aws_secret_access_key: {{ .Values.sm_aws_secret_access_key | b64enc }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $_job_name }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  backoffLimit: 4
  template:
{{- if .Values.custom_labels }}
    metadata:
      labels:
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      restartPolicy: Never
      containers:
        - name: create-database
          image: quay.io/ibmmas/cli@{{ $_cli_image_digest }}
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              
              # Source MAS CLI utilities for Secrets Manager functions
              source /mascli/functions/gitops_utils
              
              echo "================================================================================"
              echo "RDS Database Creation Job"
              echo "================================================================================"
              echo "Database Name: ${DB_NAME}"
              echo "RDS Host: ${DB_HOST}"
              echo "RDS Port: ${DB_PORT}"
              echo "Account ID: ${ACCOUNT_ID}"
              echo "Cluster ID: ${CLUSTER_ID}"
              echo "Instance ID: ${INSTANCE_ID}"
              echo "MAS Application ID: ${MAS_APP_ID}"
              echo "================================================================================"
              
              echo "Step 1: Checking if database already exists..."
              if [ -n "${DB_NAME}" ]; then
                echo ""
                echo "================================================================================"
                echo "ℹ️  Database Already Exists"
                echo "================================================================================"
                echo "Database name '${DB_NAME}' was provided - assuming database already exists"
                echo "Skipping database creation and Secrets Manager update"
                echo ""
                echo "================================================================================"
                echo "✅ RDS Database Creation Job Completed (No Action Needed)"
                echo "================================================================================"
                exit 0
              fi
              echo "No database name provided - proceeding with database creation"
              
              echo "Step 2: Installing system dependencies for ibm_db..."
              if command -v microdnf &> /dev/null; then
                microdnf install -y libxcrypt-compat
              elif command -v dnf &> /dev/null; then
                dnf install -y libxcrypt-compat
              elif command -v apt-get &> /dev/null; then
                apt-get update && apt-get install -y libcrypt1
              else
                echo "⚠️  No package manager found, attempting to create symlink..."
                ln -sf /usr/lib64/libcrypt.so.2 /usr/lib64/libcrypt.so.1 || \
                ln -sf /usr/lib/x86_64-linux-gnu/libcrypt.so.2 /usr/lib/x86_64-linux-gnu/libcrypt.so.1 || \
                echo "Could not create symlink, proceeding anyway..."
              fi
              echo "✅ System dependencies installed"
              
              echo "Step 3: Downloading RDS SSL certificate..."
              mkdir -p /etc/mas/rds-ssl
              curl -sSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /etc/mas/rds-ssl/global-bundle.pem
              echo "✅ Certificate downloaded"
              
              echo "Step 4: Installing Python packages..."
              pip install --no-cache-dir ibm_db boto3
              echo "✅ Python packages installed"
              
              echo "Step 5: Running database creation script..."
              
              # Generate database name from instance and app IDs if not provided
              if [ -z "${DB_NAME}" ]; then
                # Convert to uppercase and remove hyphens/special chars
                INSTANCE_UPPER=$(echo "${INSTANCE_ID}" | tr '[:lower:]' '[:upper:]' | tr -d '-')
                APP_UPPER=$(echo "${MAS_APP_ID}" | tr '[:lower:]' '[:upper:]' | tr -d '-')
                
                # DB2 database name constraints: Maximum 8 characters
                # Strategy: First 5 chars of instance + First 3 chars of app (after removing vowels)
                INST_SHORT=$(echo "${INSTANCE_UPPER}" | cut -c1-5)
                
                # Remove vowels from app name to compress it
                APP_NO_VOWELS=$(echo "${APP_UPPER}" | tr -d 'AEIOU')
                APP_SHORT=$(echo "${APP_NO_VOWELS}" | cut -c1-3)
                
                # Combine and truncate to 8 characters
                COMBINED="${INST_SHORT}${APP_SHORT}"
                export DB_NAME=$(echo "${COMBINED}" | cut -c1-8)
                
                echo "Generated database name: ${DB_NAME} (from ${INSTANCE_ID}[1-5] + ${MAS_APP_ID}[no vowels, 1-3])"
              fi
              
              # Validate DB2 database name constraints
              if [ ${#DB_NAME} -gt 8 ]; then
                echo "⚠️  Warning: Database name '${DB_NAME}' exceeds 8 characters, truncating..."
                export DB_NAME=$(echo "${DB_NAME}" | cut -c1-8)
              fi
              
              echo "Final database name: ${DB_NAME}"
              
              export SSL_CERT_PATH=/etc/mas/rds-ssl/global-bundle.pem
              python3 << 'PYTHON_SCRIPT'
              import ibm_db as db2
              import os
              import sys
              import re
              import time
              import json
              import boto3
              from botocore.exceptions import ClientError
              
              # Read credentials from mounted secrets
              with open("/etc/mas/dbs-rds-creds/username", 'r') as f:
                  username = f.read().strip()
              
              with open("/etc/mas/dbs-rds-creds/password", 'r') as f:
                  password = f.read().strip()
              
              # Get environment variables (DB_NAME is generated by shell script before Python runs)
              database_name = os.getenv("DB_NAME")
              rds_admin_db = os.getenv("RDS_ADMIN_DB", "rdsadmin")
              db_host = os.getenv("DB_HOST")
              db_port = os.getenv("DB_PORT", "50000")
              jdbc_url = os.getenv("JDBC_CONNECTION_URL", "")
              ssl_cert_path = os.getenv("SSL_CERT_PATH", "/etc/mas/rds-ssl/global-bundle.pem")
              
              print(f"Target database name: {database_name}")
              
              # AWS Secrets Manager configuration
              sm_region = os.getenv("SM_AWS_SECRET_REGION", "us-east-1")
              sm_secret_path = os.getenv("SM_SECRET_PATH", "")
              
              # Extract SSL version from JDBC URL
              ssl_version = 'TLSv1.2'
              if jdbc_url:
                  ssl_match = re.search(r'sslVersion=([^;]+)', jdbc_url, re.IGNORECASE)
                  if ssl_match:
                      ssl_version = ssl_match.group(1)
              
              print(f"Connecting to RDS admin database: {rds_admin_db}")
              
              # Connection string for rdsadmin database
              conn_str = (
                  f"DATABASE={rds_admin_db};"
                  f"HOSTNAME={db_host};"
                  f"PORT={db_port};"
                  f"PROTOCOL=TCPIP;"
                  f"UID={username};"
                  f"PWD={password};"
                  f"SECURITY=SSL;"
                  f"SSLVersion={ssl_version};"
                  f"SSLServerCertificate={ssl_cert_path};"
              )
              
              try:
                  conn = db2.connect(conn_str, "", "")
                  print(f"✅ Connected to RDS instance as {username}")
              except Exception as e:
                  print(f"❌ Connection failed: {e}")
                  sys.exit(1)
              
              # Check if database exists by trying to connect to it
              def database_exists(db_name):
                  test_conn_str = (
                      f"DATABASE={db_name};"
                      f"HOSTNAME={db_host};"
                      f"PORT={db_port};"
                      f"PROTOCOL=TCPIP;"
                      f"UID={username};"
                      f"PWD={password};"
                      f"SECURITY=SSL;"
                      f"SSLVersion={ssl_version};"
                      f"SSLServerCertificate={ssl_cert_path};"
                  )
                  
                  try:
                      test_conn = db2.connect(test_conn_str, "", "")
                      db2.close(test_conn)
                      return True
                  
                  except Exception as e:
                      error_msg = str(e)
                      
                      # ✅ Database not found errors
                      if "SQLSTATE=42705" in error_msg:
                          return False
                      
                      if "SQL1013N" in error_msg:
                          return False
                      
                      if "SQL30061N" in error_msg or "SQLSTATE=08004" in error_msg:
                          # Database was not found at the remote node
                          return False
                      
                      # ⚠️ Handle auth separately (DB exists but creds wrong)
                      if "SQL30082N" in error_msg:
                          print("❌ Authentication failed - database likely exists")
                          return True
                      
                      # ⚠️ Unknown error - DON'T silently assume
                      raise RuntimeError(f"Unable to determine database existence: {error_msg}")
              
              # Create database if it doesn't exist
              database_created = False
              if database_exists(database_name):
                  print(f"ℹ️  Database '{database_name}' already exists, skipping creation")
                  print(f"ℹ️  Schema creation will be skipped (database already exists)")
              else:
                  print(f"Creating database '{database_name}'...")
                  try:
                      sql = f"CALL rdsadmin.create_database('{database_name}')"
                      db2.exec_immediate(conn, sql)
                      print(f"✅ Database creation initiated")
                      
                      # Wait for database to be created (async operation)
                      print(f"⏳ Waiting for database creation to complete...")
                      max_retries = 12
                      retry_delay = 10
                      
                      for attempt in range(max_retries):
                          time.sleep(retry_delay)
                          
                          try:
                              exists = database_exists(database_name)
                              
                              if exists:
                                  print(f"✅ Database '{database_name}' is available (verified after {(attempt + 1) * retry_delay} seconds)")
                                  database_created = True
                                  break
                              else:
                                  print(f"⏳ Attempt {attempt + 1}/{max_retries}: Database not yet visible")
                          
                          except RuntimeError as e:
                              error_msg = str(e)
                              
                              # 🔁 Transient state: DB is being activated
                              if "SQLSTATE=57019" in error_msg or "SQL1035N" in error_msg:
                                  print(f"⏳ Attempt {attempt + 1}/{max_retries}: Database activating...")
                                  continue
                              
                              # 🌐 Optional: handle connection issues separately
                              elif "SQL30081N" in error_msg:
                                  print(f"⚠️  Attempt {attempt + 1}/{max_retries}: Network issue, retrying...")
                                  continue
                              
                              # ❌ Unknown error → fail fast
                              else:
                                  raise
                      else:
                          print(f"❌ Database '{database_name}' not found after {max_retries * retry_delay} seconds")
                          sys.exit(1)
                  except Exception as e:
                      print(f"❌ Error creating database: {e}")
                      sys.exit(1)
              
              # Schema creation is handled by the Manage application
              if database_created:
                  print(f"\nℹ️  Database '{database_name}' created successfully")
                  print(f"   Schema will be created by the Manage application")
                  
                  # Verify connection to the newly created database (as RDS admin)
                  print(f"\n{'='*80}")
                  print(f"Verifying Connection to Database '{database_name}'")
                  print(f"{'='*80}")
                  
                  try:
                      # Build connection string for the new database (using RDS admin credentials)
                      verify_conn_str = (
                          f"DATABASE={database_name};"
                          f"HOSTNAME={db_host};"
                          f"PORT={db_port};"
                          f"PROTOCOL=TCPIP;"
                          f"UID={username};"
                          f"PWD={password};"
                          f"Security=SSL;"
                          f"SSLServerCertificate={ssl_cert_path};"
                          f"SSLVersion={ssl_version};"
                      )
                      
                      print(f"Attempting to connect to database '{database_name}' as RDS admin...")
                      verify_conn = db2.connect(verify_conn_str, "", "")
                      
                      # Run a simple query to verify the connection works
                      stmt = db2.exec_immediate(verify_conn, "SELECT CURRENT TIMESTAMP FROM SYSIBM.SYSDUMMY1")
                      result = db2.fetch_tuple(stmt)
                      
                      if result:
                          print(f"✅ Connection verified successfully!")
                          print(f"   Database timestamp: {result[0]}")
                      
                      db2.close(verify_conn)
                      print(f"✅ Database '{database_name}' is ready for use")
                      
                  except Exception as e:
                      print(f"❌ Connection verification failed: {e}")
                      print(f"⚠️  Database was created but connection test failed")
                      print(f"   This may indicate a transient issue - the database should still be usable")
              
              db2.close(conn)
              print(f"\n✅ Database creation process completed successfully")
              PYTHON_SCRIPT
              
              # Update AWS Secrets Manager using MAS CLI utilities
              echo ""
              echo "================================================================================"
              echo "Updating AWS Secrets Manager"
              echo "================================================================================"
              
              # Check if required values are provided
              if [ -z "${ACCOUNT_ID}" ] || [ -z "${CLUSTER_ID}" ] || [ -z "${INSTANCE_ID}" ]; then
                echo "⚠️  Skipping Secrets Manager update - account_id, cluster_id, or instance_id not provided"
                echo "   This is expected for testing/development environments"
              elif [ ! -f /etc/mas/creds/aws/aws_access_key_id ] || [ ! -f /etc/mas/creds/aws/aws_secret_access_key ]; then
                echo "⚠️  Skipping Secrets Manager update - AWS credentials not mounted"
                echo "   This is expected for testing/development environments"
              else
                export SM_AWS_ACCESS_KEY_ID=$(cat /etc/mas/creds/aws/aws_access_key_id)
                export SM_AWS_SECRET_ACCESS_KEY=$(cat /etc/mas/creds/aws/aws_secret_access_key)
                export SM_AWS_REGION=${SM_AWS_SECRET_REGION}
                
                SECRET_PATH="${ACCOUNT_ID}/${CLUSTER_ID}/${INSTANCE_ID}/jdbc/{{ .Values.db2_rds_instance_name }}/config"
                echo "Secret Path: ${SECRET_PATH}"
                
                # Login to Secrets Manager
                sm_login
                
                # Fetch existing secret to merge with
                EXISTING_SECRET=$(sm_get_secret_value "${SECRET_PATH}" 2>/dev/null || echo "{}")
                
                # Update db2_name in the secret
                DB_NAME="${DB_NAME:-BLUDB1}"
                UPDATED_SECRET=$(echo "${EXISTING_SECRET}" | jq --arg dbname "${DB_NAME}" '. + {db2_name: $dbname}')
                
                # Update JDBC URL if provided
                if [ -n "${JDBC_CONNECTION_URL}" ]; then
                  # Replace database name in JDBC URL (format: jdbc:db2://host:port/database:params)
                  # Makes parameters optional with (:.*)?$ to handle URLs with or without params
                  NEW_JDBC_URL=$(printf '%s\n' "${JDBC_CONNECTION_URL}" | \
                    sed -E "s|(jdbc:db2://[^/]+/)([^:]*)(:.*)?$|\\1${DB_NAME}\\3|")
                  
                  UPDATED_SECRET=$(echo "${UPDATED_SECRET}" | \
                    jq --arg url "${NEW_JDBC_URL}" '. + {jdbc_connection_url: $url}')
                fi
                
                # Update the secret
                TAGS="[{\"Key\": \"source\", \"Value\": \"presync-create-database\"}, {\"Key\": \"account\", \"Value\": \"${ACCOUNT_ID}\"}, {\"Key\": \"cluster\", \"Value\": \"${CLUSTER_ID}\"}, {\"Key\": \"instance\", \"Value\": \"${INSTANCE_ID}\"}]"
                
                echo "Updating AWS Secrets Manager secret..."
                sm_update_secret "${SECRET_PATH}" "${UPDATED_SECRET}" "${TAGS}" || echo "⚠️  Warning: Failed to update Secrets Manager (non-fatal)"
                
                echo "✅ Secrets Manager update completed"
              fi
              
              echo ""
              echo "================================================================================"
              echo "✅ RDS Database Creation Job Completed"
              echo "================================================================================"
          env:
            - name: DB_NAME
              value: {{ .Values.dbname | default "" | quote }}
            - name: DB_HOST
              value: {{ .Values.host | quote }}
            - name: DB_PORT
              value: {{ .Values.port | default "50000" | quote }}
            - name: RDS_ADMIN_DB
              value: {{ .Values.rds_admin_db_name | default "rdsadmin" | quote }}
            - name: JDBC_CONNECTION_URL
              value: {{ .Values.jdbc_connection_url | default "" | quote }}
            - name: SSL_CERT_PATH
              value: "/etc/mas/rds-ssl/global-bundle.pem"
            - name: ACCOUNT_ID
              value: {{ .Values.account_id | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.cluster_id | quote }}
            - name: INSTANCE_ID
              value: {{ .Values.instance_id | quote }}
            - name: MAS_APP_ID
              value: {{ .Values.mas_application_id | default "" | quote }}
            - name: SM_AWS_SECRET_REGION
              value: {{ .Values.sm_aws_secret_region | default "us-east-1" | quote }}
          volumeMounts:
            - name: dbs-rds-create-db-secret
              mountPath: /etc/mas/dbs-rds-creds/
            - name: aws
              mountPath: /etc/mas/creds/aws
      volumes:
        - name: dbs-rds-create-db-secret
          secret:
            secretName: {{ .Values.db2_rds_instance_name }}-create-db-secret
            defaultMode: 420
            optional: false
        - name: aws
          secret:
            secretName: {{ .Values.db2_rds_instance_name }}-aws-creds
            defaultMode: 420
            optional: false
{{- end }}
