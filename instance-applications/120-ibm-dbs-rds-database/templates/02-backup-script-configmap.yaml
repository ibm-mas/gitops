---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.scriptConfigMapName }}-backup"
  annotations:
    argocd.argoproj.io/sync-wave: "137"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
data:
  rds-db2-backup.py: |
    #!/usr/bin/env python3
    """
    RDS DB2 Backup Script
    Performs FULL or INCREMENTAL backups of RDS DB2 database to S3
    """
    import ibm_db as db2
    import os
    import sys
    import time
    from datetime import datetime

    # Configuration from environment variables
    backup_type = 'FULL'  # FULL or INCREMENTAL
    database_name = os.getenv("DB_NAME")
    s3_bucket_name = os.getenv("S3_BUCKET_NAME")
    s3_prefix = os.getenv("S3_PREFIX", "db2-backups")
    compression = os.getenv("COMPRESSION", "INCLUDE")
    util_impact_priority = os.getenv("UTIL_IMPACT_PRIORITY", "50")
    num_files = os.getenv("NUM_FILES", "4")
    parallelism = os.getenv("PARALLELISM", "4")
    num_buffers = os.getenv("NUM_BUFFERS", "8")
    
    ssl_cert_path = os.environ.get("SSL_CERT_PATH", "/etc/mas/rds-ssl/global-bundle.pem")
    jdbc_connection_url = os.environ.get("JDBC_CONNECTION_URL", "")
    
    # Read credentials (matching the init script format)
    with open("/etc/mas/dbs-rds-creds/username", 'r') as f:
        username = f.read().strip()
    
    with open("/etc/mas/dbs-rds-creds/password", 'r') as f:
        password = f.read().strip()
    
    # Extract SSL version from JDBC URL if provided (matching init script)
    ssl_version = 'TLSv1.2'  # Default value
    if jdbc_connection_url:
        import re
        ssl_version_match = re.search(r'sslVersion=([^;]+)', jdbc_connection_url, re.IGNORECASE)
        if ssl_version_match:
            ssl_version = ssl_version_match.group(1)
            print(f"✅ Extracted SSL Version from JDBC URL: {ssl_version}")
        else:
            print(f"ℹ️  SSL Version not found in JDBC URL, using default: {ssl_version}")
    else:
        print(f"ℹ️  No JDBC URL provided, using default SSL Version: {ssl_version}")
    
    # Create connection string for rdsadmin database
    # Note: Connect to rdsadmin to execute administrative procedures
    conn_rds_admin_str = (
        f"DATABASE={os.environ['RDS_ADMIN_DB']};"
        f"HOSTNAME={os.environ['DB_HOST']};"
        f"PORT={os.environ['DB_PORT']};"
        f"PROTOCOL=TCPIP;"
        f"UID={username};"
        f"PWD={password};"
        f"SECURITY=SSL;"
        f"SSLVersion={ssl_version};"
        f"SSLServerCertificate={ssl_cert_path};"
    )
    
    print(f"{'='*80}")
    print(f"RDS DB2 Backup Script")
    print(f"{'='*80}")
    print(f"Timestamp: {datetime.now().isoformat()}")
    print(f"Database: {database_name}")
    print(f"Backup Type: {backup_type}")
    print(f"S3 Bucket: {s3_bucket_name}")
    print(f"S3 Prefix: {s3_prefix}")
    print(f"{'='*80}\n")
    
    # Validate required parameters
    if not database_name:
        print("❌ ERROR: DB_NAME environment variable is required")
        sys.exit(1)
    
    if not s3_bucket_name:
        print("❌ ERROR: S3_BUCKET_NAME environment variable is required")
        sys.exit(1)
    
    try:
        # Connect to rdsadmin database to execute backup procedure
        print(f"📡 Connecting to RDS DB2 rdsadmin database...")
        admin_conn = db2.connect(conn_rds_admin_str, "", "")
        print("✅ Connected successfully\n")
        
        # Step 1: Check VPC Gateway Endpoint for S3
        print("🔍 Step 1: Checking VPC Gateway Endpoint for S3...")
        print("   (This should be configured at the VPC level)")
        print("   ✅ Assuming VPC Gateway Endpoint is configured\n")
        
        # Step 2: Configure S3 Integration (IAM roles, bucket permissions)
        print("🔧 Step 2: S3 Integration Configuration...")
        print("   (IAM roles and bucket permissions should be pre-configured)")
        print("   ✅ Assuming S3 integration is configured\n")
        
        # Step 3: Prepare backup parameters
        timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
        # Shorten the path to avoid AWS RDS DB2 parameter length limits (typically 64 chars for S3 URI)
        # Use ultra-compact format: prefix/type-timestamp (no underscore, single char type)
        # The full S3 URI (s3://bucket/path) must be under 64 characters
        backup_type_short = "f" if backup_type.upper() == "FULL" else "i"
        # Remove prefix if it makes URI too long, use just type-timestamp
        s3_backup_path = f"{backup_type_short}-{timestamp}"
        
        print(f"📦 Step 3: Preparing backup parameters...")
        print(f"   Database: {database_name}")
        print(f"   Backup Type: {backup_type}")
        print(f"   S3 Path: s3://{s3_bucket_name}/{s3_backup_path}")
        print(f"   Path Length: {len(s3_backup_path)} characters")
        print(f"   Compression: {compression}")
        print(f"   Util Impact Priority: {util_impact_priority}")
        print(f"   Num Files: {num_files}")
        print(f"   Parallelism: {parallelism}")
        print(f"   Num Buffers: {num_buffers}\n")
        
        # Step 4: Call rdsadmin.backup_database stored procedure
        print(f"🚀 Step 4: Initiating {backup_type} backup...")
        
        # Prepare parameters for the stored procedure
        # AWS RDS DB2 backup_database stored procedure signature:
        # CALL rdsadmin.backup_database(
        #    ?,                    -- 1. Output: Task ID
        #    'database_name',      -- 2. Database Name
        #    's3_bucket_name',     -- 3. S3 Bucket Name
        #    's3_prefix',          -- 4. S3 Prefix (path within bucket)
        #    'backup_type',        -- 5. Backup Type (OFFLINE/ONLINE/INCREMENTAL)
        #    'compression',        -- 6. Compression (INCLUDE/EXCLUDE/NONE)
        #    'util_impact',        -- 7. Util Impact Priority (0-100)
        #    'num_buffers',        -- 8. Number of Buffers
        #    'parallelism',        -- 9. Parallelism
        #    'buffer_size'         -- 10. Buffer Size
        # )
        
        print(f"   Executing backup procedure...")
        print(f"   Parameters:")
        print(f"     - Database Name: {database_name}")
        print(f"     - S3 Bucket: {s3_bucket_name}")
        print(f"     - S3 Prefix: {s3_backup_path}")
        print(f"     - Backup Type: {backup_type}")
        print(f"     - Compression: {compression}")
        print(f"     - Util Impact Priority: {util_impact_priority}")
        print(f"     - Num Buffers: {num_buffers}")
        print(f"     - Parallelism: {parallelism}")
        print(f"     - Buffer Size: {num_buffers}")
        
        # Use ibm_db.callproc for stored procedure call (consistent with other RDS operations)
        try:
            # Call the stored procedure using ibm_db.callproc with correct parameter order
            print(f"   Executing: ibm_db.callproc(rdsadmin.backup_database, (None, '{database_name}', '{s3_bucket_name}', '{s3_backup_path}', '{backup_type}', '{compression}', '{util_impact_priority}', '{num_buffers}', '{parallelism}', '{num_buffers}'))")
            
            result = db2.callproc(
                admin_conn,
                "rdsadmin.backup_database",
                (
                    None,                    # 1. Output: Task ID
                    database_name,           # 2. Database Name (BLUDB - target to backup)
                    s3_bucket_name,          # 3. S3 Bucket Name
                    s3_backup_path,          # 4. S3 Prefix
                    backup_type,             # 5. Backup Type
                    compression,             # 6. Compression
                    util_impact_priority,    # 7. Util Impact Priority
                    num_buffers,             # 8. Number of Buffers
                    parallelism,             # 9. Parallelism
                    num_buffers              # 10. Buffer Size
                )
            )
            
            task_id = None
            if result:
                # The first element of the result tuple is the task_id
                task_id = result[0]
                print(f"   ✅ Backup task initiated successfully")
                print(f"   📋 Task ID: {task_id}\n")
            else:
                print(f"   ⚠️ Backup procedure executed but no task ID returned")
        except Exception as proc_error:
            print(f"   ❌ Failed to call stored procedure: {str(proc_error)}")
            raise
        
        if result and task_id:
            task_id = str(task_id).strip()
            print(f"   Using Task ID: {task_id}")
            
            # Step 5: Monitor backup status
            print(f"⏳ Step 5: Monitoring backup status...")
            max_wait_time = 3600  # 1 hour max wait
            check_interval = 30  # Check every 30 seconds
            elapsed_time = 0
            
            while elapsed_time < max_wait_time:
                status_sql = f"CALL rdsadmin.get_task_status('{task_id}')"
                status_stmt = db2.exec_immediate(admin_conn, status_sql)
                status_result = db2.fetch_tuple(status_stmt)
                
                if status_result:
                    task_status = status_result[0]
                    task_message = status_result[1] if len(status_result) > 1 else ""
                    
                    print(f"   Status: {task_status} - {task_message}")
                    
                    if task_status in ['COMPLETED', 'SUCCESS']:
                        print(f"\n   ✅ Backup completed successfully!")
                        break
                    elif task_status in ['FAILED', 'ERROR']:
                        print(f"\n   ❌ Backup failed: {task_message}")
                        sys.exit(1)
                    elif task_status in ['RUNNING', 'IN_PROGRESS']:
                        print(f"   ⏳ Backup in progress... (elapsed: {elapsed_time}s)")
                        time.sleep(check_interval)
                        elapsed_time += check_interval
                    else:
                        print(f"   ℹ️  Unknown status: {task_status}")
                        time.sleep(check_interval)
                        elapsed_time += check_interval
                else:
                    print(f"   ⚠️  Could not retrieve task status")
                    break
            
            if elapsed_time >= max_wait_time:
                print(f"\n   ⚠️  Backup monitoring timed out after {max_wait_time}s")
                print(f"   ℹ️  Backup may still be running. Check task {task_id} manually.")
        else:
            print(f"   ⚠️  Could not retrieve task ID from backup procedure")
        
        # Step 6: Verify upload to S3 (optional)
        print(f"\n📊 Step 6: Backup Summary")
        print(f"   Backup Type: {backup_type}")
        print(f"   Database: {database_name}")
        print(f"   S3 Location: s3://{s3_bucket_name}/{s3_backup_path}")
        print(f"   Timestamp: {timestamp}")
        print(f"   ✅ Backup process completed\n")
        
        # Step 7: Terminate connection
        print(f"🔌 Step 7: Closing database connection...")
        db2.close(admin_conn)
        print(f"   ✅ Connection closed\n")
        
        print(f"{'='*80}")
        print(f"✅ RDS DB2 {backup_type} Backup Completed Successfully")
        print(f"{'='*80}")
        
    except Exception as e:
        print(f"\n{'='*80}")
        print(f"❌ ERROR: Backup failed")
        print(f"{'='*80}")
        print(f"Error details: {str(e)}")
        import traceback
        traceback.print_exc()
        sys.exit(1)