# Basic connection configuration
rds_admin_db_name: "rdsadmin"
host: "xyz.db"
port: 50000
dbname: "rds1"
user: "dummy"
password: "dummy"

# Additional basic values
db2_namespace: ""
mas_application_id: ""  # manage, facilities, or iot
jdbc_connection_url: ""
replica_db: false

# DB2 Database Configuration
db2_database_db_config: {}

# Script and application configuration
db2_rds_instance_name: dbs-rds-inst1-manage
scriptConfigMapName: dbs-rds-init-script

# Backup Configuration
backup:
  enabled: true  # Enable/disable backup cron jobs
  s3_bucket_name: ""  # S3 bucket name for backups
  s3_prefix: "db2-backups"  # S3 prefix/folder for backups

  # Common backup parameters (shared by both full and incremental)
  compression: "INCLUDE"  # INCLUDE or EXCLUDE
  util_impact_priority: 50  # 1-100, higher = more resources
  num_files: 4  # Number of parallel backup files
  parallelism: 4  # Degree of parallelism
  num_buffers: 8  # Number of buffers

  # Full backup configuration (Sundays at 2 AM)
  full:
    enabled: true
    schedule: "0 2 * * 0"  # Cron: Every Sunday at 2 AM

  # Incremental backup configuration (Daily at 2 AM except Sundays)
  incremental:
    enabled: true
    schedule: "0 2 * * 1-6"  # Cron: Monday-Saturday at 2 AM