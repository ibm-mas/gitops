---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Values.mas_config_name }}-wait-workspace"
  namespace: "mas-{{ .Values.instance_id }}-core"
  annotations:
    argocd.argoproj.io/sync-wave: "210"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
    metadata:
      labels:
        app: aicfg-presync
    spec:
      containers:
        - name: wait-workspace
          image: "quay.io/openshift/origin-cli:4.15"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for workspace to be ready..."
              
              # Wait for workspace CR to exist (no timeout)
              while true; do
                if oc get workspace -n mas-{{ .Values.instance_id }}-core 2>/dev/null | grep -q .; then
                  echo "Workspace CR found"
                  break
                fi
                echo "Waiting for workspace CR..."
                sleep 10
              done
              
              # Wait for workspace to be ready (no timeout)
              echo "Waiting for workspace to be ready..."
              while true; do
                if oc get workspace -n mas-{{ .Values.instance_id }}-core -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | grep -q "True"; then
                  echo "Workspace is ready. Proceeding with AiCfg deployment."
                  break
                fi
                echo "Workspace not ready yet, waiting..."
                sleep 10
              done
      restartPolicy: Never
      serviceAccountName: openshift-gitops-argocd-application-controller
  backoffLimit: 3

