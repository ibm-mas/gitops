---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Values.mas_config_name }}-postdelete"
  namespace: "mas-{{ .Values.instance_id }}-core"
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
    metadata:
      name: "{{ .Values.mas_config_name }}-postdelete"
{{- if .Values.custom_labels }}
      labels:
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: run
          image: quay.io/ibmmas/cli:latest
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: INSTANCE_ID
              value: "{{ .Values.instance_id }}"
            - name: MAS_CONFIG_NAME
              value: "{{ .Values.mas_config_name }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo ""
              echo "================================================================================"
              echo "PostDelete Hook: Delete AiCfg CR"
              echo "================================================================================"
              echo "Instance ID ............... ${INSTANCE_ID}"
              echo "Config Name ............... ${MAS_CONFIG_NAME}"
              echo ""

              # Delete the AiCfg CR
              echo "Deleting AiCfg CR ${MAS_CONFIG_NAME} in namespace mas-${INSTANCE_ID}-core"
              oc delete aicfg ${MAS_CONFIG_NAME} -n mas-${INSTANCE_ID}-core --ignore-not-found=true

              # Delete the credentials secret
              echo "Deleting Secret ${MAS_CONFIG_NAME}-credentials in namespace mas-${INSTANCE_ID}-core"
              oc delete secret ${MAS_CONFIG_NAME}-credentials -n mas-${INSTANCE_ID}-core --ignore-not-found=true

              echo ""
              echo "PostDelete Hook: Complete"
      restartPolicy: Never
      serviceAccountName: "{{ .Values.instance_id }}-config-job"
  backoffLimit: 4
