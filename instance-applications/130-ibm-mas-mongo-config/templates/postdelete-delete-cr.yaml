{{- if .Values.use_postdelete_hooks }}

{{ $cr_name := .Values.mas_config_name }}
{{ $cr_kind := .Values.mas_config_kind }}
{{ $cr_api_version := .Values.mas_config_api_version }}

{{ $job_name := printf "postdelete-delete-cr-job-%s" $cr_name }}

# NOTE: depends on resources created in ibm-mas-suite chart (01-postdelete-crs-resources)
# The values below must align with the values in that file
{{ $role_name := "postdelete-delete-cr-r" }}
{{ $sa_name :=   "postdelete-delete-cr-sa" }}
{{ $rb_name :=   "postdelete-delete-cr-rb" }}
{{ $np_name :=   "postdelete-delete-cr-np" }}
{{ $job_label := "postdelete-delete-cr-job" }}
{{ $ns := printf "mas-%s-core" .Values.instance_id }}
{{ $mas_instance_id := printf "%s" .Values.instance_id }}
{{ $mas_wipe_mongo_data := printf "%s" .Values.mas_wipe_mongo_data }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $job_name }}
  namespace: {{ $ns }}
  #annotations:
  #  argocd.argoproj.io/hook: PostDelete
  #  argocd.argoproj.io/hook-delete-policy: HookSucceeded
  annotations:
    argocd.argoproj.io/sync-wave: "132"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  template:
    metadata:
      labels:
        app: {{ $job_label }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: run
          # TODO: use a dedicated image with a smaller footprint for this sort of thing?
          # Just using cli for now since it has all the deps we need to talk with AWS SM
          image: quay.io/ibmmas/cli:9.4.0-pre.gitops
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            - name: CR_NAMESPACE
              value: {{ $ns }}
            - name: CR_NAME
              value: {{ $cr_name }}

            - name: CR_API_VERSION
              value: {{ $cr_api_version }}

            - name: CR_KIND
              value: {{ $cr_kind }}

            - name: MAS_INSTANCE_ID
              value: {{ $mas_instance_id }}

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-db
                  key: mongo_username

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-db
                  key: mongo_password

            - name: MAS_WIPE_MONGO_DATA
              value: {{ $mas_wipe_mongo_data }}

            - name: MONGO_INFO
              valueFrom:
                secretKeyRef:
                  name: mongo-db
                  key: mongo_info

          volumeMounts: []
          command:
            - /bin/sh
            - -c
            - |

              set -e


      restartPolicy: Never
      serviceAccountName: {{ $sa_name }}
      volumes: []
  backoffLimit: 4
{{- end }}
