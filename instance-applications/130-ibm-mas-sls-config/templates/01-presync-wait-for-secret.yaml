{{- if .Values.application_admin_role }}

  {{- /*
        Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
    */}}
  {{- $_cli_image_digest := "sha256:14c852062a8c6149820d9aa7b8315d83f25bb29172b0f318e4fe10af613533f3" }}

  {{ $ns := printf "mas-%s-core" .Values.instance_id }}
  {{ $prefix := printf "pre-sls-wait-secret-%s" .Values.mas_config_name }}
  {{ $sa := printf "%s-sa" $prefix }}
  {{ $np := printf "%s-np" $prefix }}
  {{ $job := printf "%s-job" $prefix }}

---
kind: Secret
apiVersion: v1
metadata:
  name: "aws-{{ .Values.mas_config_name }}"
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  {{- if .Values.custom_labels }}
labels:
  {{ .Values.custom_labels | toYaml | indent 4 }}
    {{- end }}
data:
  aws_access_key_id: {{ .Values.sm_aws_access_key_id | b64enc }}
  aws_secret_access_key: {{ .Values.sm_aws_secret_access_key | b64enc }}
type: Opaque

---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  {{- if .Values.custom_labels }}
labels:
  {{ .Values.custom_labels | toYaml | indent 4 }}
    {{- end }}

---
# Permit outbound communication by the Job pods
# (Needed to communicate with AWS Secrets Manager)
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ $np }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  {{- if .Values.custom_labels }}
labels:
  {{ .Values.custom_labels | toYaml | indent 4 }}
    {{- end }}
spec:
  podSelector:
    matchLabels:
      app: {{ $job }}
  egress:
    - {}
  policyTypes:
    - Egress

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $job }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  {{- if .Values.custom_labels }}
labels:
  {{ .Values.custom_labels | toYaml | indent 4 }}
    {{- end }}
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app: {{ $job }}
    {{- if .Values.custom_labels }}
    {{ .Values.custom_labels | toYaml | indent 8 }}
    {{- end }}
    spec:
      serviceAccountName: {{ $sa }}
      containers:
      - name: wait-for-secret
        image: quay.io/ibmmas/cli@{{ $_cli_image_digest }}
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 64Mi
        env:
          - name: ACCOUNT_ID
            value: {{ .Values.account_id }}
          - name: REGION_ID
            value: {{ .Values.region_id }}
          - name: CLUSTER_ID
            value: {{ .Values.cluster_id }}
          - name: MAS_INSTANCE_ID
            value: {{ .Values.instance_id }}
          - name: MAS_CONFIG_NAME
            value: {{ .Values.mas_config_name }}
        volumeMounts:
          - name: aws
            mountPath: /etc/mas/creds/aws
        command:
          - /bin/sh
          - -c
          - |
            
            set -e
            
            source /mascli/functions/gitops_utils
            
            echo ""
            echo "================================================================================"
            echo "Wait for AWS Secrets Manager Secret (2026-06-26)"
            echo "================================================================================"
            echo "ACCOUNT_ID .......................... ${ACCOUNT_ID}"
            echo "REGION_ID ........................... ${REGION_ID}"
            echo "CLUSTER_ID .......................... ${CLUSTER_ID}"
            echo "MAS_INSTANCE_ID ..................... ${MAS_INSTANCE_ID}"
            echo "MAS_CONFIG_NAME ..................... ${MAS_CONFIG_NAME}"
            echo ""
            
            export SM_AWS_ACCESS_KEY_ID=$(cat /etc/mas/creds/aws/aws_access_key_id)
            export SM_AWS_SECRET_ACCESS_KEY=$(cat /etc/mas/creds/aws/aws_secret_access_key)
            export SM_AWS_REGION=${REGION_ID}


            # TODO: replace these hard-coded values
            ICN="3000000000"
            SUBSCRIPTION_ID="subid1"
            AWS_ACCOUNT_ID="341174173920"
            AWS_PARTITION="aws-us-gov"
            
            
            SECRET_PATH="${ACCOUNT_ID}/${ICN}/${SUBSCRIPTION_ID}/sls"
            SECRET_ARN="arn:${AWS_PARTITION}:secretsmanager:${REGION_ID}:${AWS_ACCOUNT_ID}:secret:${SECRET_PATH}"
            
            
            MAX_ATTEMPTS=60
            ATTEMPT=0
            
            echo "Waiting for secret to exist in AWS Secrets Manager..."
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT+1))
              echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: Checking if secret exists..."
              
              if aws secretsmanager describe-secret \
                --secret-id "${SECRET_ARN}" \
                --region "${SM_AWS_REGION}" 2>/dev/null; then
                echo ""
                echo "✓ Secret exists! Proceeding with sync."
                exit 0
              fi
              
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "  Secret not found, waiting 30 seconds..."
                sleep 30
              fi
            done
            
            echo ""
            echo "ERROR: Secret ${SECRET_ARN} not found after ${MAX_ATTEMPTS} attempts (30 minutes)"
            echo "This secret should be created by another application's PostSync job."
            echo "Please verify that the dependent application has completed successfully."
            exit 1
      restartPolicy: Never
      volumes:
        - name: aws
          secret:
            secretName: "aws-{{ .Values.mas_config_name }}"
            defaultMode: 420
{{- end }}

