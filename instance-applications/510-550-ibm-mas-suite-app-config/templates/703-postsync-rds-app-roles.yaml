{{- if not (empty .Values.mas_rds_databases) }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
*/}}
{{- $_cli_image_digest := "sha256:55b5d6dd185503f14c112836a9a4899347d28e7b6545e0b9cf21d87f9526fb40" }}

{{ $app_ns          := .Values.mas_app_namespace }}
{{ $np_name            := "postsync-app-rds-roles-np" }}
{{ $sa_name            := "postsync-app-rds-roles-sa" }}
{{ $job_label          := "postsync-app-rds-roles-job" }}

---
{{- /*
  Permit outbound communication by the Job pod (Needed to communicate with RDS)
  This single policy is shared by all per-rds job instances
*/}}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ $np_name }}
  namespace: {{ $app_ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "600"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  podSelector:
    matchLabels:
      app: {{ $job_label }}
  egress:
    - {}
  policyTypes:
    - Egress

---
{{- /*
  Service account for the job
  This single service account is shared by all per-rds job instances
*/}}
kind: ServiceAccount
apiVersion: v1
metadata:
  name: "{{ $sa_name }}"
  namespace: "{{ $app_ns }}"
  annotations:
    argocd.argoproj.io/sync-wave: "600"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}


{{- /*
  A separate CronJob is created in the app namespace per RDS instance reserved for use by MAS applications (Manage or Facilities).
  This job runs periodically to check if application-specific tables exist and creates required roles.

  NOTE: When inside the range loop below, make sure you prefix any references to chart values NOT under .Values.manage_rds_databases with $.
        For example: {{ $.Values.custom_labels }} (instead of {{ .Values.custom_labels }} )
*/}}
{{- range $i, $db := .Values.mas_rds_databases }}

{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "postsync-rds-roles" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := $db }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource instead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print  ( $_job_config_values  |  toYaml ) $_cli_image_digest  $_job_version  |  adler32sum  }}

{{- $_cronjob_name := join "-" (list $_job_name_prefix $_job_hash) }}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

When the auto_delete flag is not set on the root application, a CronJob in the cluster uses this label 
to identify old Job resources that should be pruned on behalf of ArgoCD.

Any Job resources in the same namespace that have the mas.ibm.com/job-cleanup-group with this value
will be considered to belong to the same cleanup group. All but the most recent (i.e. with the latest "creation_timestamp")
Jobs will be automatically deleted.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional discriminators
must be added to $_job_cleanup_group.
NOTE: this is one of those cases; we need a separate cleanup group for each per-rds Job.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.
*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix $db.rds_instance_name | sha1sum }}

{{ $rds_host           := $db.rds_host }}
{{ $rds_port           := $db.rds_port }}
{{ $rds_dbname         := $db.rds_dbname }}
{{ $rds_instance_name  := $db.rds_instance_name }}
{{ $rds_admin_user     := $db.rds_admin_user }}
{{ $rds_admin_password := $db.rds_admin_password }}

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $_cronjob_name }}
  namespace: "{{ $app_ns }}"
  annotations:
    argocd.argoproj.io/sync-wave: "600"
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  schedule: "* * * * *"  # Run every minute run 30 minute */30 * * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: {{ $job_label }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      template:
        metadata:
          labels:
            app: {{ $job_label }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 12 }}
{{- end }}
        spec:
          containers:
            - name: run
              image: {{ $.Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  cpu: 200m
                  memory: 512Mi
                requests:
                  cpu: 10m
                  memory: 64Mi
              env:
                - name: RDS_HOST
                  value: "{{ $rds_host }}"
                - name: RDS_PORT
                  value: "{{ $rds_port }}"
                - name: RDS_DBNAME
                  value: "{{ $rds_dbname }}"
                - name: RDS_INSTANCE_NAME
                  value: "{{ $rds_instance_name }}"
                - name: RDS_ADMIN_USER
                  value: "{{ $rds_admin_user }}"
                - name: RDS_ADMIN_PASSWORD
                  value: "{{ $rds_admin_password }}"
                - name: MAS_APP_ID
                  value: "{{ $.Values.mas_app_id }}"
                - name: OPERATIONAL_MODE
                  value: "{{ $.Values.operational_mode }}"

              volumeMounts: []
              command:
                - /bin/sh
                - -c
                - |

                  set -e
                  source /mascli/functions/gitops_utils

                  echo ""
                  echo "================================================================================"
                  echo "Settings"
                  echo "================================================================================"
                  echo "RDS_INSTANCE_NAME ................... ${RDS_INSTANCE_NAME}"
                  echo "RDS_DBNAME .......................... ${RDS_DBNAME}"
                  echo "RDS_HOST ............................ ${RDS_HOST}"
                  echo "RDS_PORT ............................ ${RDS_PORT}"
                  echo "OPERATIONAL_MODE .................... ${OPERATIONAL_MODE}"

                  echo ""
                  echo "Downloading RDS SSL certificate..."
                  echo "--------------------------------------------------------------------------------"
                  mkdir -p /tmp/rds-ssl
                  curl -sSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /tmp/rds-ssl/global-bundle.pem
                  echo "✅ Certificate downloaded"

                  # Path to the shell script for DB2 operations
                  RDS_ROLES_SCRIPT="/tmp/create_rds_roles.sh"

                  echo ""
                  echo "Create ${RDS_ROLES_SCRIPT}"
                  echo "--------------------------------------------------------------------------------"

                  # Generate a shell script using db2 CLI commands instead of Python ibm_db
                  cat > ${RDS_ROLES_SCRIPT} << 'EOFSHELL'
                  #!/bin/bash
                  set -e
                  
                  # Get environment variables
                  RDS_HOST="${RDS_HOST}"
                  RDS_PORT="${RDS_PORT}"
                  RDS_DBNAME="${RDS_DBNAME}"
                  RDS_ADMIN_USER="${RDS_ADMIN_USER}"
                  RDS_ADMIN_PASSWORD="${RDS_ADMIN_PASSWORD}"
                  SSL_CERT_PATH="/tmp/rds-ssl/global-bundle.pem"
                  
                  echo "Connecting to RDS DB2 instance: ${RDS_HOST}:${RDS_PORT}/${RDS_DBNAME}"
                  echo "Creating roles for MAS applications: manage, facilities"
                  echo "Note: IoT uses admin user (DB2_iot) with full admin privileges - no separate roles"
                  
                  # Function to execute DB2 SQL
                  execute_db2_sql() {
                      local sql="$1"
                      local description="$2"
                      
                      echo "Executing: ${description}"
                      
                      # Build connection string with SSL security
                      local conn_str="DATABASE=${RDS_DBNAME};HOSTNAME=${RDS_HOST};PORT=${RDS_PORT};PROTOCOL=TCPIP;UID=${RDS_ADMIN_USER};PWD=${RDS_ADMIN_PASSWORD};SECURITY=SSL;SSLServerCertificate=${SSL_CERT_PATH};"
                      
                      # Use db2 command with connection string
                      db2 "CONNECT USING '${conn_str}'" >/dev/null 2>&1 || {
                          echo "❌ Failed to connect to database"
                          return 1
                      }
                      
                      # Execute the SQL
                      result=$(db2 -x "${sql}" 2>&1)
                      exit_code=$?
                      
                      if [ $exit_code -eq 0 ]; then
                          echo "✅ ${description}"
                          echo "${result}"
                      else
                          # Check if error is because object already exists
                          if echo "${result}" | grep -qi "already exists\|duplicate"; then
                              echo "ℹ️  ${description} - already exists"
                          else
                              echo "⚠️  ${description} - ${result}"
                          fi
                      fi
                      
                      db2 "CONNECT RESET" >/dev/null 2>&1 || true
                      return 0
                  }
                  
                  # Function to check if table exists
                  check_table_exists() {
                      local schema="$1"
                      local table="$2"
                      
                      # Build connection string with SSL security
                      local conn_str="DATABASE=${RDS_DBNAME};HOSTNAME=${RDS_HOST};PORT=${RDS_PORT};PROTOCOL=TCPIP;UID=${RDS_ADMIN_USER};PWD=${RDS_ADMIN_PASSWORD};SECURITY=SSL;SSLServerCertificate=${SSL_CERT_PATH};"
                      
                      db2 "CONNECT USING '${conn_str}'" >/dev/null 2>&1 || {
                          echo "❌ Failed to connect to database"
                          return 1
                      }
                      
                      result=$(db2 -x "SELECT COUNT(*) FROM SYSCAT.TABLES WHERE TABSCHEMA='${schema}' AND TABNAME='${table}'" 2>&1)
                      db2 "CONNECT RESET" >/dev/null 2>&1 || true
                      
                      if echo "${result}" | grep -q "^[[:space:]]*[1-9]"; then
                          return 0  # Table exists
                      else
                          return 1  # Table doesn't exist
                      fi
                  }
                  
                  # Process MANAGE application
                  echo ""
                  echo "============================================================"
                  echo "Processing MANAGE application"
                  echo "============================================================"
                  
                  if check_table_exists "MAXIMO" "MAXUSERS"; then
                      echo "✅ Table MAXIMO.MAXUSERS exists. Proceeding with role creation..."
                      
                      # Create roles
                      execute_db2_sql "CREATE ROLE MAXIMO_READ" "Create MAXIMO_READ role"
                      execute_db2_sql "CREATE ROLE MAXIMO_WRITE" "Create MAXIMO_WRITE role"
                      execute_db2_sql "CREATE ROLE MAXIMO_SEQ" "Create MAXIMO_SEQ role"
                      execute_db2_sql "CREATE ROLE EXPLAIN" "Create EXPLAIN role"
                      
                      # Grant permissions to MAXIMO_READ
                      echo ""
                      echo "Granting permissions to MAXIMO_READ role..."
                      execute_db2_sql "GRANT SELECT ON TABLE MAXIMO.MAXUSERS TO ROLE MAXIMO_READ" "Grant SELECT on MAXUSERS"
                      execute_db2_sql "GRANT SELECT ON SCHEMA MAXIMO TO ROLE MAXIMO_READ" "Grant SELECT on MAXIMO schema"
                      
                      # Grant permissions to MAXIMO_WRITE
                      echo ""
                      echo "Granting permissions to MAXIMO_WRITE role..."
                      execute_db2_sql "GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE MAXIMO.MAXUSERS TO ROLE MAXIMO_WRITE" "Grant DML on MAXUSERS"
                      execute_db2_sql "GRANT SELECT, INSERT, UPDATE, DELETE ON SCHEMA MAXIMO TO ROLE MAXIMO_WRITE" "Grant DML on MAXIMO schema"
                      
                      # Grant permissions to MAXIMO_SEQ
                      echo ""
                      echo "Granting permissions to MAXIMO_SEQ role..."
                      execute_db2_sql "GRANT USAGE ON SEQUENCE MAXIMO.MAXSEQ TO ROLE MAXIMO_SEQ" "Grant USAGE on MAXSEQ"
                      execute_db2_sql "GRANT ALTER ON SEQUENCE MAXIMO.MAXSEQ TO ROLE MAXIMO_SEQ" "Grant ALTER on MAXSEQ"
                      
                      # Grant permissions to EXPLAIN
                      echo ""
                      echo "Granting permissions to EXPLAIN role..."
                      execute_db2_sql "GRANT EXECUTE ON PACKAGE NULLID.SYSSH200 TO ROLE EXPLAIN" "Grant EXECUTE on SYSSH200"
                      execute_db2_sql "GRANT SELECT ON TABLE SYSTOOLS.EXPLAIN_INSTANCE TO ROLE EXPLAIN" "Grant SELECT on EXPLAIN_INSTANCE"
                  else
                      echo "⚠️  Table MAXIMO.MAXUSERS does not exist yet. Skipping manage role creation."
                  fi
                  
                  # Process FACILITIES application
                  echo ""
                  echo "============================================================"
                  echo "Processing FACILITIES application"
                  echo "============================================================"
                  
                  if check_table_exists "TRIDATA" "TRIDATA_DATA"; then
                      echo "✅ Table TRIDATA.TRIDATA_DATA exists. Proceeding with role creation..."
                      
                      # Create roles
                      execute_db2_sql "CREATE ROLE TRIDATA_READ" "Create TRIDATA_READ role"
                      execute_db2_sql "CREATE ROLE TRIDATA_WRITE" "Create TRIDATA_WRITE role"
                      
                      # Grant permissions to TRIDATA_READ
                      echo ""
                      echo "Granting permissions to TRIDATA_READ role..."
                      execute_db2_sql "GRANT SELECT ON TABLE TRIDATA.TRIDATA_DATA TO ROLE TRIDATA_READ" "Grant SELECT on TRIDATA_DATA"
                      execute_db2_sql "GRANT SELECT ON SCHEMA TRIDATA TO ROLE TRIDATA_READ" "Grant SELECT on TRIDATA schema"
                      
                      # Grant permissions to TRIDATA_WRITE
                      echo ""
                      echo "Granting permissions to TRIDATA_WRITE role..."
                      execute_db2_sql "GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE TRIDATA.TRIDATA_DATA TO ROLE TRIDATA_WRITE" "Grant DML on TRIDATA_DATA"
                      execute_db2_sql "GRANT SELECT, INSERT, UPDATE, DELETE ON SCHEMA TRIDATA TO ROLE TRIDATA_WRITE" "Grant DML on TRIDATA schema"
                  else
                      echo "⚠️  Table TRIDATA.TRIDATA_DATA does not exist yet. Skipping facilities role creation."
                  fi
                  
                  echo ""
                  echo "============================================================"
                  echo "✅ Role creation and permission grants completed"
                  echo "============================================================"
                  
                  exit 0
                  EOFSHELL
                  # IMPORTANT: Do not make any changes to the "EOFSHELL" line above (including its indentation)

                  echo ""
                  echo "Executing ${RDS_ROLES_SCRIPT}"
                  echo "--------------------------------------------------------------------------------"
                  chmod +x ${RDS_ROLES_SCRIPT}
                  ${RDS_ROLES_SCRIPT} || exit $?

                  echo ""
                  echo "RDS role creation job completed successfully"

          restartPolicy: Never
          serviceAccountName: "{{ $sa_name }}"
          volumes: []
      backoffLimit: 4
{{- end }}
{{- end }}

