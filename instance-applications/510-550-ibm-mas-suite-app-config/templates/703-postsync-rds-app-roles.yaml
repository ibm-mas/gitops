{{- if not (empty .Values.mas_rds_databases) }}

{{- /*
Use the build/bin/set-cli-image-digest.sh script to update this value across all charts.
*/}}
{{- $_cli_image_digest := "sha256:1b88f88a1a719d006ea1f4b8dcfd1c2625fa7ecc529c3267e7b4b6afaa1c8da0" }}

{{ $app_ns          := .Values.mas_app_namespace }}
{{ $np_name            := "postsync-app-rds-roles-np" }}
{{ $sa_name            := "postsync-app-rds-roles-sa" }}
{{ $job_label          := "postsync-app-rds-roles-job" }}

---
{{- /*
  Permit outbound communication by the Job pod (Needed to communicate with RDS)
  This single policy is shared by all per-rds job instances
*/}}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ $np_name }}
  namespace: {{ $app_ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "600"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  podSelector:
    matchLabels:
      app: {{ $job_label }}
  egress:
    - {}
  policyTypes:
    - Egress

---
{{- /*
  Service account for the job
  This single service account is shared by all per-rds job instances
*/}}
kind: ServiceAccount
apiVersion: v1
metadata:
  name: "{{ $sa_name }}"
  namespace: "{{ $app_ns }}"
  annotations:
    argocd.argoproj.io/sync-wave: "600"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}


{{- /*
  A separate CronJob is created in the app namespace per RDS instance reserved for use by MAS applications (Manage or Facilities).
  This job runs periodically to check if application-specific tables exist and creates required roles.

  NOTE: When inside the range loop below, make sure you prefix any references to chart values NOT under .Values.manage_rds_databases with $.
        For example: {{ $.Values.custom_labels }} (instead of {{ .Values.custom_labels }} )
*/}}
{{- range $i, $db := .Values.mas_rds_databases }}

{{- /*
Meaningful prefix for the job resource name. Must be under 52 chars in length to leave room for the 11 chars reserved for '-' and $_job_hash.
*/}}
{{- $_job_name_prefix := "postsync-rds-roles" }}

{{- /*
A dict of values that influence the behaviour of the job in some way.
Any changes to values in this dict will trigger a rerun of the job.
Included in $_job_hash (see below).
*/}}
{{- $_job_config_values := $db }}

{{- /*
Increment this value whenever you make a change to an immutable field of the Job resource.
E.g. passing in a new environment variable.
Included in $_job_hash (see below).
*/}}
{{- $_job_version := "v1" }}

{{- /*
10 char hash appended to the job name taking into account $_job_config_values, $_job_version and $_cli_image_digest
This is to ensure ArgoCD will create a new job resource instead of attempting (and failing) to update an
immutable field of any existing Job resource.
*/}}
{{- $_job_hash := print  ( $_job_config_values  |  toYaml ) $_cli_image_digest  $_job_version  |  adler32sum  }}

{{- $_cronjob_name := join "-" (list $_job_name_prefix $_job_hash) }}

{{- /*
Set as the value for the mas.ibm.com/job-cleanup-group label on the Job resource.

When the auto_delete flag is not set on the root application, a CronJob in the cluster uses this label 
to identify old Job resources that should be pruned on behalf of ArgoCD.

Any Job resources in the same namespace that have the mas.ibm.com/job-cleanup-group with this value
will be considered to belong to the same cleanup group. All but the most recent (i.e. with the latest "creation_timestamp")
Jobs will be automatically deleted.

$_job_cleanup_group can usually just be based on $_job_name_prefix. There are some special cases
where multiple Jobs are created in our templates using a Helm loop. In those cases, additional discriminators
must be added to $_job_cleanup_group.
NOTE: this is one of those cases; we need a separate cleanup group for each per-rds Job.

By convention, we sha1sum this value to guarantee we never exceed the 63 char limit regardless of which discriminators
are required here.
*/}}
{{- $_job_cleanup_group := cat $_job_name_prefix $db.rds_instance_name | sha1sum }}

{{ $rds_host           := $db.rds_host }}
{{ $rds_port           := $db.rds_port }}
{{ $rds_dbname         := $db.rds_dbname }}
{{ $rds_instance_name  := $db.rds_instance_name }}
{{ $rds_admin_user     := $db.rds_admin_user }}
{{ $rds_admin_password := $db.rds_admin_password }}

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $_cronjob_name }}
  namespace: "{{ $app_ns }}"
  annotations:
    argocd.argoproj.io/sync-wave: "600"
  labels:
    mas.ibm.com/job-cleanup-group: {{ $_job_cleanup_group }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  schedule: "* * * * *"  # Run every minute run 30 minute */30 * * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: {{ $job_label }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 8 }}
{{- end }}
    spec:
      template:
        metadata:
          labels:
            app: {{ $job_label }}
{{- if $.Values.custom_labels }}
{{ $.Values.custom_labels | toYaml | indent 12 }}
{{- end }}
        spec:
          containers:
            - name: run
              image: {{ $.Values.cli_image_repo | default "quay.io/ibmmas/cli" }}@{{ $_cli_image_digest }}
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  cpu: 200m
                  memory: 512Mi
                requests:
                  cpu: 10m
                  memory: 64Mi
              env:
                - name: RDS_HOST
                  value: "{{ $rds_host }}"
                - name: RDS_PORT
                  value: "{{ $rds_port }}"
                - name: RDS_DBNAME
                  value: "{{ $rds_dbname }}"
                - name: RDS_INSTANCE_NAME
                  value: "{{ $rds_instance_name }}"
                - name: RDS_ADMIN_USER
                  value: "{{ $rds_admin_user }}"
                - name: RDS_ADMIN_PASSWORD
                  value: "{{ $rds_admin_password }}"
                - name: MAS_APP_ID
                  value: "{{ $.Values.mas_app_id }}"
                - name: OPERATIONAL_MODE
                  value: "{{ $.Values.operational_mode }}"

              volumeMounts: []
              command:
                - /bin/sh
                - -c
                - |

                  set -e

                  echo ""
                  echo "================================================================================"
                  echo "Settings"
                  echo "================================================================================"
                  echo "RDS_INSTANCE_NAME ................... ${RDS_INSTANCE_NAME}"
                  echo "RDS_DBNAME .......................... ${RDS_DBNAME}"
                  echo "RDS_HOST ............................ ${RDS_HOST}"
                  echo "RDS_PORT ............................ ${RDS_PORT}"
                  echo "OPERATIONAL_MODE .................... ${OPERATIONAL_MODE}"

                  echo ""
                  echo "Installing required Python packages..."
                  echo "--------------------------------------------------------------------------------"
                  pip install ibm_db

                  echo ""
                  echo "Downloading RDS SSL certificate..."
                  echo "--------------------------------------------------------------------------------"
                  mkdir -p /tmp/rds-ssl
                  curl -sSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /tmp/rds-ssl/global-bundle.pem
                  echo "✅ Certificate downloaded"

                  # Path to the Python script for DB2 operations
                  RDS_ROLES_SCRIPT="/tmp/create_rds_roles.py"

                  echo ""
                  echo "Create ${RDS_ROLES_SCRIPT}"
                  echo "--------------------------------------------------------------------------------"

                  # Generate a Python script using ibm_db
                  cat > ${RDS_ROLES_SCRIPT} << 'EOFPYTHON'
                  import ibm_db
                  import os
                  import sys
                  
                  # Get environment variables
                  rds_host = os.getenv('RDS_HOST')
                  rds_port = os.getenv('RDS_PORT')
                  rds_dbname = os.getenv('RDS_DBNAME')
                  rds_admin_user = os.getenv('RDS_ADMIN_USER')
                  rds_admin_password = os.getenv('RDS_ADMIN_PASSWORD')
                  ssl_cert_path = '/tmp/rds-ssl/global-bundle.pem'
                  
                  # Build connection string with SSL
                  conn_str = (
                      f"DATABASE={rds_dbname};"
                      f"HOSTNAME={rds_host};"
                      f"PORT={rds_port};"
                      f"PROTOCOL=TCPIP;"
                      f"UID={rds_admin_user};"
                      f"PWD={rds_admin_password};"
                      f"SECURITY=SSL;"
                      f"SSLServerCertificate={ssl_cert_path};"
                  )
                  
                  print(f"Connecting to RDS DB2 instance: {rds_host}:{rds_port}/{rds_dbname}")
                  print("Creating roles for MAS applications: manage, facilities")
                  print("Note: IoT uses admin user (DB2_iot) with full admin privileges - no separate roles")
                  
                  def execute_db2_sql(conn, sql, description):
                      """Execute a DB2 SQL statement"""
                      print(f"Executing: {description}")
                      try:
                          stmt = ibm_db.exec_immediate(conn, sql)
                          print(f"✅ {description}")
                          return True
                      except Exception as e:
                          error_msg = str(e)
                          # Check if error is because object already exists
                          if "already exists" in error_msg.lower() or "duplicate" in error_msg.lower():
                              print(f"ℹ️  {description} - already exists")
                              return True
                          else:
                              print(f"⚠️  {description} - {error_msg}")
                              return False
                  
                  def check_table_exists(conn, schema, table):
                      """Check if a table exists in the database"""
                      try:
                          sql = f"SELECT COUNT(*) FROM SYSCAT.TABLES WHERE TABSCHEMA='{schema}' AND TABNAME='{table}'"
                          stmt = ibm_db.exec_immediate(conn, sql)
                          result = ibm_db.fetch_tuple(stmt)
                          if result and result[0] > 0:
                              return True
                          return False
                      except Exception as e:
                          print(f"⚠️  Error checking table existence: {str(e)}")
                          return False
                  
                  try:
                      # Connect to the database
                      conn = ibm_db.connect(conn_str, "", "")
                      print("✅ Successfully connected to RDS DB2")
                  
                      # Process MANAGE application
                      print("\n" + "=" * 60)
                      print("Processing MANAGE application")
                      print("=" * 60)
                      
                      if check_table_exists(conn, "MAXIMO", "MAXUSERS"):
                          print("✅ Table MAXIMO.MAXUSERS exists. Proceeding with role creation...")
                          
                          # Create roles
                          execute_db2_sql(conn, "CREATE ROLE MAXIMO_READ", "Create MAXIMO_READ role")
                          execute_db2_sql(conn, "CREATE ROLE MAXIMO_WRITE", "Create MAXIMO_WRITE role")
                          execute_db2_sql(conn, "CREATE ROLE MAXIMO_SEQ", "Create MAXIMO_SEQ role")
                          execute_db2_sql(conn, "CREATE ROLE EXPLAIN", "Create EXPLAIN role")
                          
                          # Grant permissions to MAXIMO_READ
                          print("\nGranting permissions to MAXIMO_READ role...")
                          execute_db2_sql(conn, "GRANT SELECT ON TABLE MAXIMO.MAXUSERS TO ROLE MAXIMO_READ", "Grant SELECT on MAXUSERS")
                          execute_db2_sql(conn, "GRANT SELECT ON SCHEMA MAXIMO TO ROLE MAXIMO_READ", "Grant SELECT on MAXIMO schema")
                          
                          # Grant permissions to MAXIMO_WRITE
                          print("\nGranting permissions to MAXIMO_WRITE role...")
                          execute_db2_sql(conn, "GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE MAXIMO.MAXUSERS TO ROLE MAXIMO_WRITE", "Grant DML on MAXUSERS")
                          execute_db2_sql(conn, "GRANT SELECT, INSERT, UPDATE, DELETE ON SCHEMA MAXIMO TO ROLE MAXIMO_WRITE", "Grant DML on MAXIMO schema")
                          
                          # Grant permissions to MAXIMO_SEQ
                          print("\nGranting permissions to MAXIMO_SEQ role...")
                          execute_db2_sql(conn, "GRANT USAGE ON SEQUENCE MAXIMO.MAXSEQ TO ROLE MAXIMO_SEQ", "Grant USAGE on MAXSEQ")
                          execute_db2_sql(conn, "GRANT ALTER ON SEQUENCE MAXIMO.MAXSEQ TO ROLE MAXIMO_SEQ", "Grant ALTER on MAXSEQ")
                          
                          # Grant permissions to EXPLAIN
                          print("\nGranting permissions to EXPLAIN role...")
                          execute_db2_sql(conn, "GRANT EXECUTE ON PACKAGE NULLID.SYSSH200 TO ROLE EXPLAIN", "Grant EXECUTE on SYSSH200")
                          execute_db2_sql(conn, "GRANT SELECT ON TABLE SYSTOOLS.EXPLAIN_INSTANCE TO ROLE EXPLAIN", "Grant SELECT on EXPLAIN_INSTANCE")
                      else:
                          print("⚠️  Table MAXIMO.MAXUSERS does not exist yet. Skipping manage role creation.")
                      
                      # Process FACILITIES application
                      print("\n" + "=" * 60)
                      print("Processing FACILITIES application")
                      print("=" * 60)
                      
                      if check_table_exists(conn, "TRIDATA", "TRIDATA_DATA"):
                          print("✅ Table TRIDATA.TRIDATA_DATA exists. Proceeding with role creation...")
                          
                          # Create roles
                          execute_db2_sql(conn, "CREATE ROLE TRIDATA_READ", "Create TRIDATA_READ role")
                          execute_db2_sql(conn, "CREATE ROLE TRIDATA_WRITE", "Create TRIDATA_WRITE role")
                          
                          # Grant permissions to TRIDATA_READ
                          print("\nGranting permissions to TRIDATA_READ role...")
                          execute_db2_sql(conn, "GRANT SELECT ON TABLE TRIDATA.TRIDATA_DATA TO ROLE TRIDATA_READ", "Grant SELECT on TRIDATA_DATA")
                          execute_db2_sql(conn, "GRANT SELECT ON SCHEMA TRIDATA TO ROLE TRIDATA_READ", "Grant SELECT on TRIDATA schema")
                          
                          # Grant permissions to TRIDATA_WRITE
                          print("\nGranting permissions to TRIDATA_WRITE role...")
                          execute_db2_sql(conn, "GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE TRIDATA.TRIDATA_DATA TO ROLE TRIDATA_WRITE", "Grant DML on TRIDATA_DATA")
                          execute_db2_sql(conn, "GRANT SELECT, INSERT, UPDATE, DELETE ON SCHEMA TRIDATA TO ROLE TRIDATA_WRITE", "Grant DML on TRIDATA schema")
                      else:
                          print("⚠️  Table TRIDATA.TRIDATA_DATA does not exist yet. Skipping facilities role creation.")
                      
                      print("\n" + "=" * 60)
                      print("✅ Role creation and permission grants completed")
                      print("=" * 60)
                      
                      # Close connection
                      ibm_db.close(conn)
                      sys.exit(0)
                  
                  except Exception as e:
                      print(f"❌ Error: {str(e)}")
                      sys.exit(1)
                  EOFPYTHON
                  # IMPORTANT: Do not make any changes to the "EOFPYTHON" line above (including its indentation)

                  echo ""
                  echo "Executing ${RDS_ROLES_SCRIPT}"
                  echo "--------------------------------------------------------------------------------"
                  python ${RDS_ROLES_SCRIPT} || exit $?

                  echo ""
                  echo "RDS role creation job completed successfully"

          restartPolicy: Never
          serviceAccountName: "{{ $sa_name }}"
          volumes: []
      backoffLimit: 4
{{- end }}
{{- end }}

