{{- if .Values.production_database_access }}
---
apiVersion: addons.mas.ibm.com/v1
kind: GenericAddon
metadata:
  name: "{{ .Values.instance_id }}-addons-production-database-access"
  namespace: mas-{{ .Values.instance_id }}-core
  annotations:
    argocd.argoproj.io/sync-wave: "559"
  labels:
  mas.ibm.com/configScope: system
  mas.ibm.com/instanceId: {{ .Values.instance_id }}
{{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
spec:
  displayName: "{{ .Values.instance_id }}-ProductionDatabaseAccess"
  addonType: production-database-access
  config:
    addonIdentifier: {{ .Values.instance_id }}
    accessTypes:
{{- if .Values.production_database_access.accessTypes }}
{{- range .Values.production_database_access.accessTypes }}
      - type: {{ .type }}
        points: {{ .points }}
{{- end }}
{{- end }}
      []
{{- end }}
{{- end }}