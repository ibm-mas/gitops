---
# ClusterRole for read-only cluster access
# Based on rbac/kustomize/components/cluster-readonly/application-admin-clusterrole-readonly.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "application-admin-rbac.clusterRoleName" . }}
  annotations:
    description: ClusterRole for read-only cluster access when cluster_admin_role=false and application_admin_role=true
rules:
- apiGroups:
  - ''
  resources:
  - namespaces
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch


