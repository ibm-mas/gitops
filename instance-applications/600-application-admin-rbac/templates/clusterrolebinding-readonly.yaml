---
# ClusterRoleBinding for read-only cluster access
# Based on rbac/kustomize/components/cluster-readonly/application-admin-clusterrolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "application-admin-rbac.clusterRoleBindingName" . }}
  annotations:
    description: "Binds mas-application-admin-readonly ClusterRole to service account"
subjects:
- kind: ServiceAccount
  name: {{ include "application-admin-rbac.serviceAccountName" . }}
  namespace: {{ include "application-admin-rbac.serviceAccountNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "application-admin-rbac.clusterRoleName" . }}

