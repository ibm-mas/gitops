---
# Instance ID for namespace generation
instance_id: ""

# ArgoCD namespace (used to derive service account)
argo_namespace: "openshift-gitops"

# Service account configuration
# If not specified, defaults to: {argo_namespace}-argocd-application-controller
service_account:
  name: ""
  namespace: ""

# Namespace patterns to check for RBAC application
# These will be templated with instance_id
namespace_patterns:
  - "db2u-{inst}"
  - "mas-{inst}-core"
  - "mas-{inst}-manage"
  - "mas-{inst}-sls"
  - "mas-{inst}-syncres"
  - "mas-{inst}-visualinspection"

# Custom labels to apply to all resources
custom_labels: {}

# JUnit reporter configuration
junitreporter:
  reporter_name: ""
  cluster_id: ""
  instance_id: ""
  devops_mongo_uri: ""
  devops_build_number: ""
  gitops_version: ""
  cli_image_repo: ""

