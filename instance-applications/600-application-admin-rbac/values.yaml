---
# Instance ID for namespace generation
instance_id: ""

# ArgoCD namespace (used to derive service account)
argo_namespace: "openshift-gitops"

# Service account configuration
# If not specified, defaults to: {argo_namespace}-argocd-application-controller
service_account:
  name: ""
  namespace: ""

# Namespace patterns for RBAC application
# These will be templated with instance_id (e.g., {inst} becomes the actual instance ID)
namespace_patterns:
  - "db2u-{inst}"
  - "mas-{inst}-core"
  - "mas-{inst}-manage"
  - "mas-{inst}-sls"
  - "mas-{inst}-syncres"
  - "mas-{inst}-visualinspection"

# Deployment flags (set by parent Application based on what's actually deployed)
# These control whether RBAC resources are created for each namespace
# If a flag is not set or false, RBAC for that namespace will be skipped
ibm_mas_suite_deployed: false
ibm_db2u_deployed: false
ibm_suite_app_manage_deployed: false
ibm_suite_app_assist_deployed: false
ibm_suite_app_iot_deployed: false
ibm_suite_app_monitor_deployed: false
ibm_suite_app_health_deployed: false
ibm_suite_app_optimizer_deployed: false
ibm_suite_app_predict_deployed: false
ibm_suite_app_visualinspection_deployed: false
ibm_suite_app_facilities_deployed: false
ibm_sls_deployed: false

# Custom labels to apply to all resources
custom_labels: {}

# JUnit reporter configuration
junitreporter:
  reporter_name: ""
  cluster_id: ""
  instance_id: ""
  devops_mongo_uri: ""
  devops_build_number: ""
  gitops_version: ""
  cli_image_repo: ""


