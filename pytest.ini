[pytest]
# Pytest configuration for gitops repository

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = build/bin/tests
pythonpath = build/bin rbac

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for complete workflows
    slow: Tests that take longer to run
    requires_filesystem: Tests that require filesystem access

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=build/bin --cov-report=html --cov-report=term

# Ignore patterns
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    *.egg-info
    site
    .pytest_cache

# Minimum Python version
minversion = 3.8

