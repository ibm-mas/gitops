---
# Namespace-scoped Role for MAS GitOps deployments
# This role provides permissions for deploying MAS applications within a specific namespace
# The namespace will be set by kustomize overlays
#
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mas-application-admin
  annotations:
    description: "Role for MAS GitOps deployments within this namespace"
rules:
# Core Kubernetes resources
- apiGroups: [""]
  resources:
    - configmaps
    - secrets
    - services
    - serviceaccounts
    - persistentvolumeclaims
    - pods
    - pods/log
    - pods/exec
    - resourcequotas
    - limitranges
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Apps resources
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Batch resources
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# RBAC resources (namespace-scoped only)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Networking resources
- apiGroups: ["networking.k8s.io"]
  resources:
    - networkpolicies
    - ingresses
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# OpenShift Route resources
- apiGroups: ["route.openshift.io"]
  resources:
    - routes
    - routes/custom-host
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Cert-manager resources
- apiGroups: ["cert-manager.io"]
  resources:
    - certificates
    - certificaterequests
    - issuers
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# MAS Core resources
- apiGroups: ["core.mas.ibm.com"]
  resources:
    - suites
    - workspaces
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# MAS Config resources
- apiGroups: ["config.mas.ibm.com"]
  resources:
    - appcfgs
    - bascfgs
    - idpcfgs
    - jdbccfgs
    - kafkacfgs
    - mongocfgs
    - objectstoragecfgs
    - slscfgs
    - smtpcfgs
    - watsonstudiocfgs
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# MAS Addons resources
- apiGroups: ["addons.mas.ibm.com"]
  resources:
    - genericaddons
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# SLS resources
- apiGroups: ["sls.ibm.com"]
  resources:
    - licenseservices
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# DB2U resources
- apiGroups: ["db2u.databases.ibm.com"]
  resources:
    - db2uinstances
    - db2uclusters
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Cloud Pak for Data resources
- apiGroups: ["cpd.ibm.com"]
  resources:
    - ibmcpds
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["wml.cpd.ibm.com"]
  resources:
    - wmlbases
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["ws.cpd.ibm.com"]
  resources:
    - ws
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["spssmodeler.cpd.ibm.com"]
  resources:
    - spss
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["ae.cpd.ibm.com"]
  resources:
    - analyticsengines
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# AI Service resources
- apiGroups: ["aiservice.ibm.com"]
  resources:
    - aiserviceapps
    - aiservicetenants
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# OpenDataHub resources
- apiGroups: ["datasciencecluster.opendatahub.io"]
  resources:
    - datascienceclusters
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["dscinitialization.opendatahub.io"]
  resources:
    - dscinitializations
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# IBM Common Services resources
- apiGroups: ["operator.ibm.com"]
  resources:
    - ibmlicensings
    - namespacescopes
    - operandconfigs
    - operandregistries
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Istio resources
- apiGroups: ["networking.istio.io"]
  resources:
    - destinationrules
    - virtualservices
    - gateways
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

- apiGroups: ["security.istio.io"]
  resources:
    - peerauthentications
    - authorizationpolicies
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# ArgoCD resources
- apiGroups: ["argoproj.io"]
  resources:
    - applications
    - applicationsets
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Monitoring and observability resources
- apiGroups: ["monitoring.coreos.com"]
  resources:
    - servicemonitors
    - podmonitors
    - prometheusrules
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

