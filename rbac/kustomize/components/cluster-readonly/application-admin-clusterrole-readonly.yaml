---
# ClusterRole with read-only permissions for cluster-scoped resources
# Use this in combination with namespace-scoped Roles to provide the minimum
# cluster-wide access needed for MAS application deployments
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mas-application-admin-readonly
  annotations:
    description: "Read-only ClusterRole for cluster-scoped resources needed by MAS applications"
rules:
# Read-only access to cluster-scoped resources needed for operations
- apiGroups: [""]
  resources:
    - namespaces
    - nodes
  verbs: ["get", "list", "watch"]

- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
  verbs: ["get", "list", "watch"]

- apiGroups: ["operators.coreos.com"]
  resources:
    - catalogsources
    - clusterserviceversions
    - installplans
    - subscriptions
    - operatorgroups
  verbs: ["get", "list", "watch"]

# Read-only access to CRDs for validation
- apiGroups: ["apiextensions.k8s.io"]
  resources:
    - customresourcedefinitions
  verbs: ["get", "list", "watch"]

# ArgoCD Application resources (read-only for status checking)
- apiGroups: ["argoproj.io"]
  resources:
    - applications
    - applicationsets
  verbs: ["get", "list", "watch"]

# Read-only access to cluster configuration
- apiGroups: ["config.openshift.io"]
  resources:
    - clusterversions
    - infrastructures
    - networks
  verbs: ["get", "list", "watch"]

