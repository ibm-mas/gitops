---
# ClusterRoleBinding for read-only cluster access
# The service account details will be set by kustomize overlays.
#
# IMPORTANT: The subjects[0].name and subjects[0].namespace fields below are
# placeholder values.  They MUST be overridden by a patch in every overlay
# (see the generate-rbac-overlays.py script or the kustomize/README.md for
# the required patch structure).  Do NOT apply the component directly.
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mas-application-admin-readonly
  annotations:
    description: "Binds mas-application-admin-readonly ClusterRole to service account"
subjects:
- kind: ServiceAccount
  name: PLACEHOLDER_SERVICE_ACCOUNT
  namespace: PLACEHOLDER_NAMESPACE
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mas-application-admin-readonly

