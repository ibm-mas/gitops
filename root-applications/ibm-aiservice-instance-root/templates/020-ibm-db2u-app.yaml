{{- if not (empty .Values.ibm_db2u) }}
---
# IBM DB2U Application for AI Service
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db2u.{{ .Values.cluster.id }}.{{ .Values.instance.id }}
  namespace: {{ .Values.argo.namespace }}
  labels:
    environment: '{{ .Values.account.id }}'
    region: '{{ .Values.region.id }}'
    cluster: '{{ .Values.cluster.id }}'
    {{- if .Values.argo.instance }}
    argocd.argoproj.io/instance: '{{ .Values.argo.instance }}'
    {{- end }}
    instance: '{{ .Values.instance.id }}'
  annotations:
    argocd.argoproj.io/sync-wave: "020"
    healthCheckTimeout: "1800"
    {{- if and .Values.notifications .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-failed.workspace1: {{ .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-succeeded.workspace1: {{ .Values.notifications.slack_channel_id }}
    {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: "{{ .Values.argo.projects.apps }}"
  destination:
    server: {{ .Values.cluster.url }}
    namespace: "{{ .Values.ibm_db2u.db2_namespace }}"
  source:
    repoURL: "{{ .Values.source.repo_url }}"
    path: instance-applications/120-ibm-db2u-database
    targetRevision: "{{ .Values.source.revision }}"
    plugin:
      name: {{ .Values.avp.name }} 
      env:
        - name: {{ .Values.avp.values_varname }}
          value: |
            argo_namespace: "{{ .Values.argo.namespace }}"
            db2_namespace: "{{ .Values.ibm_db2u.db2_namespace }}"
            cli_image_repo: {{ .Values.cli_image_repo }}
            cluster_admin_role: {{ .Values.cluster_admin_role }}
            application_admin_role: {{ .Values.application_admin_role }}
            ibm_entitlement_key: "{{ .Values.ibm_db2u.ibm_entitlement_key }}"
            db2_channel: "{{ .Values.ibm_db2u.db2_channel }}"
            db2_install_plan: "{{ .Values.ibm_db2u.db2_install_plan }}"
            
            {{- if .Values.custom_labels }}
            custom_labels: {{ .Values.custom_labels | toYaml | nindent 14 }}
            {{- end }}
            
            # Pass all DB2 configuration values from ibm-db2u.yaml
            {{- if .Values.db2_instance_name }}
            db2_instance_name: "{{ .Values.db2_instance_name }}"
            {{- end }}
            {{- if .Values.db2_dbname }}
            db2_dbname: "{{ .Values.db2_dbname }}"
            {{- end }}
            {{- if .Values.db2_version }}
            db2_version: "{{ .Values.db2_version }}"
            {{- end }}
            {{- if .Values.db2_action }}
            db2_action: "{{ .Values.db2_action }}"
            {{- end }}
            {{- if .Values.db2_type }}
            db2_type: "{{ .Values.db2_type }}"
            {{- end }}
            {{- if .Values.db2_mln_count }}
            db2_mln_count: {{ .Values.db2_mln_count }}
            {{- end }}
            {{- if .Values.db2_num_pods }}
            db2_num_pods: {{ .Values.db2_num_pods }}
            {{- end }}
            {{- if .Values.db2_table_org }}
            db2_table_org: "{{ .Values.db2_table_org }}"
            {{- end }}
            {{- if .Values.db2_cpu_requests }}
            db2_cpu_requests: "{{ .Values.db2_cpu_requests }}"
            {{- end }}
            {{- if .Values.db2_memory_requests }}
            db2_memory_requests: "{{ .Values.db2_memory_requests }}"
            {{- end }}
            {{- if .Values.db2_cpu_limits }}
            db2_cpu_limits: "{{ .Values.db2_cpu_limits }}"
            {{- end }}
            {{- if .Values.db2_memory_limits }}
            db2_memory_limits: "{{ .Values.db2_memory_limits }}"
            {{- end }}
            {{- if .Values.db2_meta_storage_class }}
            db2_meta_storage_class: "{{ .Values.db2_meta_storage_class }}"
            {{- end }}
            {{- if .Values.db2_meta_storage_accessmode }}
            db2_meta_storage_accessmode: "{{ .Values.db2_meta_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_meta_storage_size }}
            db2_meta_storage_size: "{{ .Values.db2_meta_storage_size }}"
            {{- end }}
            {{- if .Values.db2_backup_storage_class }}
            db2_backup_storage_class: "{{ .Values.db2_backup_storage_class }}"
            {{- end }}
            {{- if .Values.db2_backup_storage_accessmode }}
            db2_backup_storage_accessmode: "{{ .Values.db2_backup_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_backup_storage_size }}
            db2_backup_storage_size: "{{ .Values.db2_backup_storage_size }}"
            {{- end }}
            {{- if .Values.db2_data_storage_class }}
            db2_data_storage_class: "{{ .Values.db2_data_storage_class }}"
            {{- end }}
            {{- if .Values.db2_data_storage_accessmode }}
            db2_data_storage_accessmode: "{{ .Values.db2_data_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_data_storage_size }}
            db2_data_storage_size: "{{ .Values.db2_data_storage_size }}"
            {{- end }}
            {{- if .Values.db2_temp_storage_class }}
            db2_temp_storage_class: "{{ .Values.db2_temp_storage_class }}"
            {{- end }}
            {{- if .Values.db2_temp_storage_accessmode }}
            db2_temp_storage_accessmode: "{{ .Values.db2_temp_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_temp_storage_size }}
            db2_temp_storage_size: "{{ .Values.db2_temp_storage_size }}"
            {{- end }}
            {{- if .Values.db2_logs_storage_class }}
            db2_logs_storage_class: "{{ .Values.db2_logs_storage_class }}"
            {{- end }}
            {{- if .Values.db2_logs_storage_accessmode }}
            db2_logs_storage_accessmode: "{{ .Values.db2_logs_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_logs_storage_size }}
            db2_logs_storage_size: "{{ .Values.db2_logs_storage_size }}"
            {{- end }}
            {{- if .Values.db2_audit_logs_storage_class }}
            db2_audit_logs_storage_class: "{{ .Values.db2_audit_logs_storage_class }}"
            {{- end }}
            {{- if .Values.db2_audit_logs_storage_accessmode }}
            db2_audit_logs_storage_accessmode: "{{ .Values.db2_audit_logs_storage_accessmode }}"
            {{- end }}
            {{- if .Values.db2_audit_logs_storage_size }}
            db2_audit_logs_storage_size: "{{ .Values.db2_audit_logs_storage_size }}"
            {{- end }}
            {{- if .Values.db2_ldap_enabled }}
            db2_ldap_enabled: {{ .Values.db2_ldap_enabled }}
            {{- end }}
            {{- if .Values.sm }}
            sm:
              aws_access_key_id: "{{ .Values.sm.aws_access_key_id }}"
              aws_secret_access_key: "{{ .Values.sm.aws_secret_access_key }}"
            {{- end }}
            
            junitreporter:
              reporter_name: "ibm-db2u-{{ .Values.instance.id }}"
              cluster_id: "{{ .Values.cluster.id }}"
              instance_id: "{{ .Values.instance.id }}"
              devops_mongo_uri: "{{ .Values.devops.mongo_uri }}"
              devops_build_number: "{{ .Values.devops.build_number }}"
              gitops_version: "{{ .Values.source.revision }}"
              cli_image_repo: {{ .Values.cli_image_repo }}
            
        - name: ARGOCD_APP_NAME
          value: db2uapp
        {{- if not (empty .Values.avp.secret) }}
        - name: AVP_SECRET
          value: {{ .Values.avp.secret }}
        {{- end }}
  syncPolicy:
    automated:
      {{- if .Values.auto_delete }}
      prune: true
      {{- end }}
      selfHeal: true
    retry:
      limit: 20
    syncOptions:
      - CreateNamespace=true
{{- if or .Values.custom_labels .Values.argocluster_instance }}
    managedNamespaceMetadata:
      labels:
        {{- if .Values.argocluster_instance }}
        argocd.argoproj.io/managed-by: {{ .Values.argocluster_instance }}
        {{- end }}
        {{- if .Values.custom_labels }}
{{ .Values.custom_labels | toYaml | indent 8 }}
        {{- end }}
{{- end }}
{{- end }}

# Made with Bob
