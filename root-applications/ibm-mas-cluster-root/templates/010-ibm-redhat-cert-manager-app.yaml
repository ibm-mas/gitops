{{- if not (empty .Values.redhat_cert_manager) }}
---
# Redhat Cert Manager
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redhat-cert-manager.{{.Values.account.id}}.{{.Values.region.id}}.{{ .Values.cluster.id }}
  namespace: {{ .Values.argoapp_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "010"
    healthCheckTimeout: "1800"
    {{- if and .Values.notifications .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-failed.slack: {{ .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: {{ .Values.notifications.slack_channel_id }}
    {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: "{{ .Values.argo_project_apps | default "mas" }}"
  destination:
    server: {{ .Values.cluster.url }}
    namespace: default
  source:
    repoURL: "{{ .Values.source.repoURL }}"
    path: applications/010-redhat-cert-manager
    targetRevision: "{{ .Values.source.targetRevision }}"
    plugin:
      env:
        - name: HELM_ARGS
          value: >-
            --set account.id="{{ .Values.account.id }}"
            --set region.id="{{ .Values.region.id }}"
            --set cluster.id="{{ .Values.cluster.id }}"
            --set argoapp_namespace="{{ .Values.argoapp_namespace }}"
            --set aws_access_key_id="{{ .Values.aws_access_key_id }}"
            --set aws_secret_access_key="{{ .Values.aws_secret_access_key }}"
            --set run_sync_hooks={{ .Values.redhat_cert_manager.run_sync_hooks }}
            --set channel="{{ .Values.redhat_cert_manager.channel }}"
        - name: ARGOCD_APP_NAME
          value: rcmapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
{{- end }}