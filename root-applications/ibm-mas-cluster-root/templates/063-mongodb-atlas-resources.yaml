{{- if eq .Values.mongo.atlas.action "install" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.cluster.id }}-mongodb-atlas-resources
  namespace: {{ .Values.argo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "063"
    healthCheckTimeout: "1800"
    {{- if and .Values.notifications .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-failed.workspace1: {{ .Values.notifications.slack_channel_id }}
    notifications.argoproj.io/subscribe.on-sync-succeeded.workspace1: {{ .Values.notifications.slack_channel_id }}
    {{- end }}
  labels:
    environment: "{{ .Values.cluster.id }}"
    region: '{{ .Values.region.id }}'
    cluster: '{{ .Values.cluster.id }}'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: "{{ .Values.argo.projects.apps }}"
  destination:
    server: {{ .Values.cluster.url }}
    namespace: {{ .Values.mongo.atlas.namespace }}
  source:
    repoURL: "{{ .Values.source.repo_url }}"
    targetRevision: "{{ .Values.source.revision }}"
    path: cluster-applications/063-mongodb-atlas
    plugin:
      name: {{ .Values.avp.name }}
      env:
        - name: {{ .Values.avp.values_varname }}
          value: |
            account_id: "{{ .Values.account.id }}"

            cluster_id: "{{ .Values.cluster.id }}"

            mongo:
              action: "{{ .Values.mongo.atlas.action }}"
              major_db_version: "{{ .Values.mongo.atlas.major_db_version }}"
              project_id: "{{ .Values.mongo.atlas.project_id }}"
              organization_id: "{{ .Values.mongo.atlas.organization_id }}"
              instance_size: "{{ .Values.mongo.atlas.instance_size }}"
              node_count: "{{ .Values.mongo.atlas.node_count }}"
              shards: "{{ .Values.mongo.atlas.shards }}"
              backup_enabled: "{{ .Values.mongo.atlas.backup_enabled }}"
              pit_enabled: "{{ .Values.mongo.atlas.pit_enabled }}"
{{- if .Values.mongo.atlas.cross_region_copy_backup }}
              cross_region_copy_backup:
                regions:
{{ .Values.mongo.atlas.cross_region_copy_backup.regions | toYaml | indent 16 }}
                restoreWindowDays: {{ .Values.mongo.atlas.cross_region_copy_backup.restoreWindowDays }}
                backup_policy_items:
{{ .Values.mongo.atlas.cross_region_copy_backup.backup_policy_items | toYaml | indent 16 }}
{{- end }}
              helm_repo: "{{ .Values.mongo.atlas.helm_repo }}"
              namespace: "{{ .Values.mongo.atlas.namespace }}"
              mongodb_provider: "{{ .Values.mongo.atlas.mongodb_provider }}"
              publicApiKey: "{{ .Values.mongo.atlas.publicApiKey }}"
              privateApiKey: "{{ .Values.mongo.atlas.privateApiKey }}"
              update_mongo_secret: "{{ .Values.mongo.atlas.update_mongo_secret }}"
              reset_master_password: {{ .Values.mongo.atlas.reset_master_password }}
              vpcEndpointId: {{ .Values.mongo.atlas.vpcEndpointId }}
{{- if .Values.mongo.atlas.auto_scaling }}
              auto_scaling:
{{- .Values.mongo.atlas.auto_scaling | toYaml | nindent 16 }}
{{- end }}
            aws_access_key_id: "{{ .Values.sm.aws_access_key_id }}"
            aws_secret_access_key: "{{ .Values.sm.aws_secret_access_key }}"
            aws_region: "{{ .Values.region.id }}"

            junitreporter:
              reporter_name: "mongodb-atlas-resources"
              cluster_id: "{{ .Values.cluster.id }}"
              devops_mongo_uri: "{{ .Values.devops.mongo_uri }}"
              devops_build_number: "{{ .Values.devops.build_number }}"
              gitops_version: "{{ .Values.source.revision }}"
              cli_image_repo: "{{ .Values.cli_image_repo | default "" }}"
            {{- if .Values.custom_labels }}
              custom_labels: {{ .Values.custom_labels | toYaml | nindent 14 }}
            {{- end }}
        - name: ARGOCD_APP_NAME
          value: mongdbatlas
        {{- if not (empty .Values.avp.secret) }}
        - name: AVP_SECRET
          value: {{ .Values.avp.secret }}
        {{- end }}

  syncPolicy:
    automated:
      {{- if .Values.auto_delete }}
      prune: true
      {{- end }}
      selfHeal: true
    retry:
      limit: 20
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  
  # Ignore differences for fields that are patched by jobs
  ignoreDifferences:
    - group: atlas.mongodb.com
      kind: AtlasPrivateEndpoint
      jsonPointers:
        - /spec/awsConfiguration
    - group: ''
      kind: Secret
      name: {{ .Values.cluster.id }}-database-user-password
      namespace: {{ .Values.mongo.atlas.namespace }}
      jsonPointers:
        - /data/password
{{- end }}
