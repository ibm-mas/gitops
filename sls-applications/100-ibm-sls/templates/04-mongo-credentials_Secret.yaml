---
kind: Secret
apiVersion: v1
metadata:
  name: "{{ .Values.ibm_sls_standalone.sls_mongo_secret_name }}"
  namespace: mas-{{ .Values.ibm_sls_standalone.ibm_customer_number }}-{{ .Values.ibm_sls_standalone.subscription_id }}-sls
  annotations:
    argocd.argoproj.io/sync-wave: "103"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
type: Opaque
stringData:
  username: "{{ .Values.ibm_sls_standalone.sls_mongo_username }}"
  password: "{{ .Values.ibm_sls_standalone.sls_mongo_password }}"
