---
kind: Secret
apiVersion: v1
metadata:
  name: ibm-sls-sls-entitlement
  namespace: mas-{{index .path.segments 3}}={{index .path.segments 4}}-sls
  #mas-{{ .Values.ibm_sls.ibm_customer_number }}-{{ .Values.ibm_sls.subscription_id }}-sls
  annotations:
    argocd.argoproj.io/sync-wave: "104"
{{- if .Values.custom_labels }}
  labels:
{{ .Values.custom_labels | toYaml | indent 4 }}
{{- end }}
type: Opaque
stringData:
  entitlement: >-
    {{ .Values.sls_entitlement_file }}
