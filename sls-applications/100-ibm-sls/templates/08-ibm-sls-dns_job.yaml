
{{- $_cli_image_digest := "sha256:55b5d6dd185503f14c112836a9a4899347d28e7b6545e0b9cf21d87f9526fb40" }}



apiVersion: v1
kind: Secret
metadata:
  name: ibmcloud-secret
type: Opaque
stringData:
  apikey: 7ZrKJHIExk



apiVersion: batch/v1
kind: Job
metadata:
  name: cis-dns-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ibmcloud-cli
          image: quay.io/ibmmas/cli@{{ $_cli_image_digest }}

          env:
            - name: IBMCLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ibmcloud-secret
                  key: apikey

          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Logging into IBM Cloud..."
              ibmcloud login --apikey $IBMCLOUD_API_KEY -r global

              echo "Setting CIS instance..."
              ibmcloud cis instance-set "CIS - ibmmasfvt.com"

              echo "Creating DNS record..."
              ibmcloud cis dns-record-create ibmmasfvt.com mas CNAME apps.cluster.example.com
